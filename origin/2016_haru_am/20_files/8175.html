<div class="question-body">
  メインプログラムを実行した後，メインプログラムの変数<i>X</i>，<i>Y</i>の値は幾つになるか。ここで，仮引数<i>X</i>は値呼出し（call by value），仮引数<i>Y</i>は参照呼出し（call by reference）であるとする。<br>
<br>
<img src="./AP2016SA020-01.gif" align="middle" onload="this.width = this.width*0.4" width="128">
<img src="./AP2016SA020-02.gif" align="middle" onload="this.width = this.width*0.4" width="130"><br>
<br>
<img src="./AP2016SA020-03.gif" align="middle" onload="this.width = this.width*0.4" width="150"><br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
