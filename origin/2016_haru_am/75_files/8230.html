<div class="question-body">
  リーダに求められる機能として，PM理論がある。P機能（Performance function）が大きく，M機能（Maintenance function）が小さいリーダのタイプはどれか。<br>
<br>
ア　業務遂行能力が不足し，メンバの気持ちにも疎いので，目標達成ができない。<br>
イ　メンバの気持ちは大事にしているが，一向に目標達成に導けない。<br>
ウ　メンバの参加を促し，目標達成に導くので，決定事項に対するメンバの納得度が高い。<br>
エ　目標達成を急ぐ余り，一部のメンバの意見を中心にまとめてしまうので，他のメンバから抵抗を受けることが多い。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
