<div class="question-body">
  トランザクションA（処理A1→処理A2の順に実行する）とトランザクションB（処理B1→処理B2の順に実行する）が，データベースの資源SとTに対し，次のように処理A1→処理B1→処理A2→処理B2の順で専有ロックを要求する場合，デッドロックが発生する資源の組合せはどれか。<br>
　なお，ロックは処理開始時にかけ，トランザクション終了時に解除する。<br>
<br>
<img src="./AP2016SA028-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
<img src="./AP2016SA028-02.gif" align="middle" onload="this.width = this.width*0.4" width="257"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
