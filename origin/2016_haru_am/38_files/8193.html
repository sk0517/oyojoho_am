<div class="question-body">
  重要情報の取扱いを委託する場合における，委託元の情報セキュリティ管理のうち，適切なものはどれか。<br>
<br>
ア　委託先が再委託を行うかどうかは委託先の判断に委ね，事前報告も不要とする。<br>
イ　委託先の情報セキュリティ対策が確認できない場合は，短期間の業務に限定して委託する。<br>
ウ　委託先の情報セキュリティ対策が適切かどうかは，契約開始前ではなく契約終了時に評価する。<br>
エ　情報の安全管理に必要な事項を事前に確認し，それらの事項を盛り込んだ上で委託先との契約書を取り交わす。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
