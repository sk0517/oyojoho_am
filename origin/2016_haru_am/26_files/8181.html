<div class="question-body">
  コンピュータグラフィックスの要素技術に関する記述のうち，適切なものはどれか。<br>
<br>
ア　アンチエイリアシングは，周辺の画素との平均化演算などを施すことによって，斜め線や曲線のギザギザを目立たなくする。<br>
イ　メタボールは，光の相互反射を利用して物体表面の光のエネルギーを算出することによって，表面の明るさを決定する。<br>
ウ　ラジオシティは，光源からの光線の経路を計算することによって，光の反射や透過などを表現し，物体の形状を描画する。<br>
エ　レイトレーシングは，物体を球や<ruby><rb>楕</rb><rp>（</rp><rt>だ</rt><rp>）</rp></ruby>円体の集合として疑似的にモデル化する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
