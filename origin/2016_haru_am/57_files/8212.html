<div class="question-body">
  ITサービスマネジメントのプロセスの一つである構成管理を導入することによって得られるメリットはどれか。<br>
<br>
ア　ITリソースに対する，現在の需要の把握と将来の需要の予測ができる。<br>
イ　緊急事態においても最低限のITサービス基盤を提供することによって，事業の継続が可能になる。<br>
ウ　構成品目の情報を正確に把握することによって，他のプロセスの確実な実施を支援できる。<br>
エ　適正な費用で常に一定した品質でのITサービスが提供されるようになる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
