<div style="height: 5px;"></div>
<div class="question-body">
  次の表において，“在庫”表の製品番号に定義された参照制約によって拒否される可能性がある操作はどれか。ここで，実線の下線は主キーを，破線の下線は外部キーを表す。<br>
<br>
在庫（<span style="text-decoration:underline;">在庫管理番号</span>，<span style="border-bottom: dashed 1px;">製品番号</span>，在庫量）<br>
製品（<span style="text-decoration:underline;">製品番号</span>，製品名，型，単価）<br>
<br>
ア　“在庫”表の行削除<br>
イ　“在庫”表の表削除<br>
ウ　“在庫”表への行追加<br>
エ　“製品”表への行追加<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
