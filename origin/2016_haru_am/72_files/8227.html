<div class="question-body">
  EDIを説明したものはどれか。<br>
<br>
ア　OSI基本参照モデルに基づく電子メールサービスの国際規格であり，メッセージの生成，転送，処理に関する総合的なサービスである。<br>
イ　ネットワーク内で伝送されるデータを蓄積したり，データのフォーマットを変換したりするサービスなど，付加価値を加えた通信サービスである。<br>
ウ　ネットワークを介して，商取引のためのデータをコンピュータ（端末を含む）間で標準的な規約に基づいて交換することである。<br>
エ　発注情報をデータエントリ端末から入力することによって，本部又は仕入先に送信し，発注を行うシステムである。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
