<div class="question-body">
  システム開発における工数の見積りに関する記述のうち，適切なものはどれか。<br>
<br>
ア　COCOMOの使用には，自社における生産性に関する，蓄積されたデータが必要である。<br>
イ　開発要員の技量は異なるので工数は参考にならないが，過去に開発したプログラムの規模は見積りの参考になる。<br>
ウ　工数の見積りは，作業の進捗管理に有効であるが，ソフトウェアの品質管理には関係しない。<br>
エ　ファンクションポイント法による見積りでは，プログラムステップ数を把握する必要がある。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
