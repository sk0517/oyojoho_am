<div class="question-body">
  分散処理システムに関する記述のうち，アクセス透過性を説明したものはどれか。<br>
<br>
ア　遠隔地にある資源を，遠隔地での処理方式を知らなくても，手元にある資源と同じ操作で利用できる。<br>
イ　システムの運用と管理をそれぞれの組織で個別に行うことによって，その組織の実態に合ったサービスを提供することができる。<br>
ウ　集中して処理せずに，データの発生場所やサービスの要求場所で処理することによって，通信コストを削減できる。<br>
エ　対等な関係のコンピュータが複数あるので，一部が故障しても他のコンピュータによる処理が可能となり，システム全体の信頼性を向上させることができる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
