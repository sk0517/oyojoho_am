<div style="height: 5px;"></div>
<div class="question-body">
  ITILにおけるサービスデスクを配置する方法の一つである“フォロー・ザ・サン”の説明はどれか。<br>
<br>
ア　インターネット技術を利用して，単一のサービスデスクであるかのようにして運用する。<br>
イ　スタッフを物理的に一か所に集約し，複数のサービスデスクを単一の場所に統合する。<br>
ウ　地理的に分散した二つ以上のサービスデスクを組み合わせて，24時間体制でサービスを提供する。<br>
エ　夜間帯にサービスデスクで受け付けたインシデントを昼間帯のシフトリーダがフォローする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
