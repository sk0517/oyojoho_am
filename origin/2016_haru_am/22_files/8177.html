<div class="question-body">
  LSIの省電力制御技術であるパワーゲーティングの説明として，適切なものはどれか。<br>
<br>
ア　異なる電圧値の電源を複数もち，動作周波数が低い回路ブロックには低い電源電圧を供給することによって，消費電力を減らす。<br>
イ　動作する必要がない回路ブロックに供給しているクロックを停止することによって，消費電力を減らす。<br>
ウ　動作する必要がない回路ブロックへの電源供給を遮断することによって，消費電力を減らす。<br>
エ　半導体製造プロセスの微細化から生じるリーク電流の増大を，使用材料などの革新によって抑える。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
