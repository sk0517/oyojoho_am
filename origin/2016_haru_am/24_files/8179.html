<div class="question-body">
  SoCの説明として，適切なものはどれか。<br>
<br>
ア　CPU，チップセット，ビデオチップ，メモリなどコンピュータを構成するデバイスを実装した電子回路基板<br>
イ　CPU，メモリ，周辺装置などの間で発生するデータの受渡しを管理する一連の回路群を搭載した半導体チップ<br>
ウ　各機能を個別に最適化されたプロセスで製造し，パッケージ内でそれぞれのチップを適切に配線した半導体チップ<br>
エ　必要とされる全ての機能（システム）を集積した1個の半導体チップ<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
