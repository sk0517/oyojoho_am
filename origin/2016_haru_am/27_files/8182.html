  関数従属を次のように表記するとき，属性a〜eで構成される関係を第3正規形にしたものはどれか。<br>
<br>
〔関数従属〕<br>
<img src="./AP2016SA027-01.gif" align="middle" onload="this.width = this.width*0.4" width="244">　<img src="./AP2016SA027-02.gif" align="middle" onload="this.width = this.width*0.4" width="237"><br>
<br>
〔正規化する関係〕<br>
<img src="./AP2016SA027-03.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　<img src="./AP2016SA027-04.gif" align="middle" onload="this.width = this.width*0.4" width="333"><br>
イ　<img src="./AP2016SA027-05.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
ウ　<img src="./AP2016SA027-06.gif" align="middle" onload="this.width = this.width*0.4" width="332"><br>
エ　<img src="./AP2016SA027-07.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
