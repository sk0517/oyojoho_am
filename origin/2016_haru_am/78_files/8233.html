<div class="question-body">
  A社では，社員のソーシャルメディア利用に関し，業務利用だけでなく，私的利用における注意事項も取りまとめ，ソーシャルメディアガイドラインを策定した。私的利用も対象とするガイドラインが必要とされる理由として，最も適切なものはどれか。<br>
<br>
ア　ソーシャルメディアアカウントの取得や解約の手続をスムーズに進めるため<br>
イ　ソーシャルメディア上の行為は社員だけでなくA社にも影響を与えるため<br>
ウ　ソーシャルメディアの操作方法を習得するマニュアルとして利用するため<br>
エ　ソーシャルメディアの利用料金がA社に大きな負担となることを防ぐため<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
