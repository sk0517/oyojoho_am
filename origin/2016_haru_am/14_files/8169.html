<div class="question-body">
  仮想サーバの運用サービスで使用するライブマイグレーションの概念を説明したものはどれか。<br>
<br>
ア　仮想サーバで稼働しているOSやソフトウェアを停止することなく，他の物理サーバへ移し替える技術である。<br>
イ　データの利用目的や頻度などに応じて，データを格納するのに適したストレージへ自動的に配置することによって，情報活用とストレージ活用を高める技術である。<br>
ウ　複数の利用者でサーバやデータベースを共有しながら，利用者ごとにデータベースの内容を明確に分離する技術である。<br>
エ　利用者の要求に応じてリソースを動的に割り当てたり，不要になったリソースを回収して別の利用者のために移し替えたりする技術である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
