<div style="height: 5px;"></div>
<div class="question-body">
  ITサービスマネジメントにおけるサービスレベル管理の説明はどれか。<br>
<br>
ア　あらかじめ定めた間隔で，サービス目標に照らしてサービスの傾向及びパフォーマンスを監視する。<br>
イ　計画が発動された場合の可用性の目標，平常業務の状態に復帰するための取組みなどを含めた計画を作成し，導入し，維持する。<br>
ウ　サービスの品質を阻害する事象に対して，合意したサービス目標及び時間枠内に回復させる。<br>
エ　予算に照らして，費用を監視及び報告し，財務予測をレビューし，費用を管理する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
