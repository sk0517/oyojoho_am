<div class="question-body">
  外部委託管理の監査に関する記述のうち，最も適切なものはどれか。<br>
<br>
ア　請負契約においては，委託側の事務所で作業を行っている受託側要員のシステムへのアクセス管理が妥当かどうかを，委託側が監査できるように定める。<br>
イ　請負契約の場合は，受託側要員に対する委託側責任者の指揮命令が適切に行われているかどうかを，委託側で監査する。<br>
ウ　外部委託で開発した業務システムの品質管理状況は，委託側で監査する必要はなく，受託側で監査すべきである。<br>
エ　機密度が高い業務システムの開発を外部に委託している場合は，自社開発に切り替えるよう改善勧告する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
