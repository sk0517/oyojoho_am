<div class="question-body">
  ページング方式の仮想記憶において，あるプログラムを実行したとき，1回のページフォールトの平均処理時間は30ミリ秒であった。ページフォールト発生時の処理時間が次の条件であったとすると，ページアウトを伴わないページインだけの処理の割合は幾らか。<br>
<br>
〔ページフォールト発生時の処理時間〕<br>
(1）ページアウトを伴わない場合，ページインの処理時間は20ミリ秒である。<br>
(2）ページアウトを伴う場合，置換えページの選択，ページアウト，ページインの合計処理時間は60ミリ秒である。<br>
<br>
ア　0.25<br>
イ　0.33<br>
ウ　0.67<br>
エ　0.75<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
