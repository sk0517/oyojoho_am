<div class="question-body">
  IT投資評価を，個別プロジェクトの計画，実施，完了に応じて，事前評価，中間評価，事後評価として実施する。事前評価について説明したものはどれか。<br>
<br>
ア　事前に設定した効果目標の達成状況を評価し，必要に応じて目標を達成するための改善策を検討する。<br>
イ　実施計画と実績との差異及び原因を詳細に分析し，投資額や効果目標の変更が必要かどうかを判断する。<br>
ウ　投資効果の実現時期と評価に必要なデータ収集方法を事前に計画し，その時期に合わせて評価を行う。<br>
エ　投資目的に基づいた効果目標を設定し，実施可否判断に必要な情報を上位マネジメントに提供する。<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
