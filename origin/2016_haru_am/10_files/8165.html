<div class="question-body">
  USB 3.0の特徴はどれか。<br>
<br>
ア　PCなどの小型コンピュータと，磁気ディスク，レーザプリンタなどの周辺機器とを接続するパラレルインタフェースである。<br>
イ　音声，映像など，リアルタイム性が必要なデータの転送に適した高速な転送方式を採用したシリアルインタフェースであり，FireWireとも呼ばれている。<br>
ウ　モデム接続の規格であったが，PCと周辺機器とを接続するようになったシリアルインタフェースである。<br>
エ　四つの転送スピードをもつシリアルインタフェースであり，スーパースピードモードは，PCと外付け磁気ディスクとの接続などに使用される。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
