<div class="question-body">
  システムの要件を検討する際に用いるUXデザインの説明として，適切なものはどれか。<br>
<br>
ア　システム設計時に，システム稼働後の個人情報保護などのセキュリティ対策を組み込む設計思想のこと<br>
イ　システムの個々のアプリケーションを利用者が享受するサービスとして捉え，その組合せでシステムを構築する設計思想のこと<br>
ウ　システムを利用する際にシステムの機能が利用者にもたらす有効性，操作性などに加え，快適さ，安心感，楽しさなどの体験価値を重視する設計思想のこと<br>
エ　接続仕様や仕組みが公開されている他社のアプリケーションを活用してシステムを構築することによって，システム開発の生産性を高める設計思想のこと<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
