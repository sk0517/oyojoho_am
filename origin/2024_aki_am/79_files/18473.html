<div class="question-body">
  大規模なシステム開発を受注したA社では，不足する開発要員を派遣事業者であるB社からの労働者派遣によって補うことにした。A社の行為のうち，労働者派遣法に照らして適切なものはどれか。<br>
<br>
ア　システム開発が長期間となることが予想されるので，開発要員の派遣期間を3年とする契約を結ぶ。<br>
イ　派遣候補者の履歴書及び業務経歴書の提出をB社に求め，書類選考を行い，面接対象者を絞り込む。<br>
ウ　派遣された要員が大きな作業負担を負うことが見込まれるので，B社に20代男性の派遣を求める。<br>
エ　派遣労働者がA社の指揮命令に対して申し立てた苦情に自社で対応せず，その処理をB社に任せる。<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
