<div class="question-body">
  A社とB社がそれぞれ2種類の戦略を採る場合の市場シェアが表のように予想されるとき，ナッシュ均衡，すなわち互いの戦略が相手の戦略に対して最適になっている組合せはどれか。ここで，表の各欄において，左側の数値がA社のシェア，右側の数値がB社のシェアとする。<br>
<br>
<img src="./AP2024AA075-01.gif" align="middle" onload="this.width = this.width*0.5" width="333"><br>
<br>
ア　A社が戦略a1，B社が戦略b1を採る組合せ<br>
イ　A社が戦略a1，B社が戦略b2を採る組合せ<br>
ウ　A社が戦略a2，B社が戦略b1を採る組合せ<br>
エ　A社が戦略a2，B社が戦略b2を採る組合せ<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
