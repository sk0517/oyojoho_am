<div class="question-body">
  量子超越性（Quantum Supremacy）の説明として，適切なものはどれか。<br>
<br>
ア　重ね合わせという現象を用いた量子暗号が，現在の暗号化方式よりもはるかに安全であること<br>
イ　従来のコンピュータが古典物理学に依拠する段階にとどまっているのに比べて，量子コンピュータが量子力学に依拠して作られていること<br>
ウ　従来のコンピュータでは実用的な時間で処理することができない計算を，量子コンピュータでは高速に実行できること<br>
エ　同一の性能を実現した従来のコンピュータに比べて，量子コンピュータの物理的な大きさを圧倒的に小さくできること<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
