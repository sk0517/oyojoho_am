<div class="question-body">
  システム監査基準（令和5年）におけるフォローアップの説明として，適切なものはどれか。<br>
<br>
ア　監査対象先が，監査報告書の指摘事項及び改善提案を基に改善計画の策定を行うこと<br>
イ　監査部門の責任者が，監査報告書を基に監査の実施状況と指摘事項の妥当性を確認すること<br>
ウ　システム監査人が，監査報告書に記載した改善提案の実施状況に関する情報を収集し，改善状況をモニタリングすること<br>
エ　システム監査人が，時間の関係で調査が終了しなかった監査項目を追跡調査して報告すること<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
