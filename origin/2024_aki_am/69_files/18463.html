  コ・クリエーション戦略の特徴はどれか。<br>
<br>
ア　企業の営業部門と製造部門が協働し，特定の商品・サービスに限定して，徹底的に自前主義にこだわることによって強みを発揮する。<br>
イ　顧客が自らのアイデアを商品の仕様に具体的に落とし込み，企業に製品を製造してもらう。<br>
ウ　顧客や企業ネットワークの力を活用し，商品・サービスだけでなく，顧客の経験までを含めて差別化可能な価値を創造する。<br>
エ　自社に不足する経営資源をM&amp;Aによって強化し，従来にない価値をより素早く創造する。<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
