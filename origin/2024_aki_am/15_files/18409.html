<div class="question-body">
  あるクライアントサーバシステムにおいて，クライアントから要求された1件の検索を処理するために，サーバで平均100万命令が実行される。1件の検索につき，ネットワーク内で転送されるデータは平均2×10<sup>5</sup>バイトである。このサーバの性能は100MIPSであり，ネットワークの転送速度は8×10<sup>7</sup>ビット／秒である。このシステムにおいて，1秒間に処理できる検索要求は何件か。ここで，処理できる件数は，サーバとネットワークの処理能力だけで決まるものとする。また，1バイトは8ビットとする。<br>
<br>
ア　50<br>
イ　100<br>
ウ　200<br>
エ　400<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
