<div class="question-body">
  Webアプリケーションサーバの信頼性に関する記述のうち，適切なものはどれか。<br>
<br>
ア　コールドスタンバイ構成で稼働しているサーバに障害が発生した場合，サービスは中断しないが，トランザクションは継続できない。<br>
イ　コールドスタンバイ構成で稼働しているサーバに障害が発生した場合，サービスは中断するが，トランザクションは継続できる。<br>
ウ　セッションを共有しないクラスタ構成で1台のサーバに障害が発生した場合，サービスは継続できないが，トランザクションは継続できる。<br>
エ　セッションを共有するクラスタ構成で1台のサーバに障害が発生した場合，サービス及びトランザクションは継続できる。<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
