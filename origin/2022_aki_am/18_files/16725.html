<div class="question-body">
  優先度に基づくプリエンプティブなスケジューリングを行うリアルタイムOSにおける割込み処理の説明のうち，適切なものはどれか。ここで，割込み禁止状態は考慮しないものとし，割込み処理を行うプログラムを割込み処理ルーチン，割込み処理以外のプログラムをタスクと呼ぶ。<br>
<br>
ア　タスクの切替えを禁止すると，割込みが発生しても割込み処理ルーチンは呼び出されない。<br>
イ　割込み処理ルーチンの処理時間の長さは，システムの応答性に影響を与えない。<br>
ウ　割込み処理ルーチンは，最も優先度の高いタスクよりも優先して実行される。<br>
エ　割込み処理ルーチンは，割り込まれたタスクと同一のコンテキストで実行される。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
