<div class="question-body">
  ファブレスの特徴を説明したものはどれか。<br>
<br>
ア　1人又は数人が全工程を担当する生産方式であり，作業内容を変えるだけで生産品目を変更することができ，多品種少量生産への対応が容易である。<br>
イ　後工程から，部品納入の時期，数量を示した作業指示書を前工程に渡して部品供給を受ける仕組みであり，在庫を圧縮することができる。<br>
ウ　生産設備である工場をもたないので，固定費を圧縮することができ，需給変動などにも迅速に対応可能であり，企画・開発に注力することができる。<br>
エ　生産設備をもたない企業から製造を請け負う事業者・生産形態のことであり，効率の良い設備運営や高度な研究開発を行うことができる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
