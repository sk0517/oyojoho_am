<div class="question-body">
  システム監査基準の意義はどれか。<br>
<br>
ア　システム監査業務の品質を確保し，有効かつ効率的な監査を実現するためのシステム監査人の行為規範となるもの<br>
イ　システム監査の信頼性を保つために，システム監査人が保持すべき情報システム及びシステム監査に関する専門的知識・技能の水準を定めたもの<br>
ウ　情報システムのガバナンス，マネジメント，コントロールを点検・評価・検証する際の判断の尺度となるもの<br>
エ　どのような組織体においても情報システムの管理において共通して留意すべき基本事項を体系化・一般化したもの<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
