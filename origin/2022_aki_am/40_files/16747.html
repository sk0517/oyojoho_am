<div class="question-body">
  JPCERTコーディネーションセンターとIPAとが共同で運営するJVNの目的として，最も適切なものはどれか。<br>
<br>
ア　ソフトウェアに内在する<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性を検出し，情報セキュリティ対策に資する。<br>
イ　ソフトウェアの脆弱性関連情報とその対策情報とを提供し，情報セキュリティ対策に資する。<br>
ウ　ソフトウェアの脆弱性に対する汎用的な評価手法を確立し，情報セキュリティ対策に資する。<br>
エ　ソフトウェアの脆弱性のタイプを識別するための基準を提供し，情報セキュリティ対策に資する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
