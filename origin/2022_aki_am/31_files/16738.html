<div class="question-body">
  IPアドレスの自動設定をするためにDHCPサーバが設置されたLAN環境の説明のうち，適切なものはどれか。<br>
<br>
ア　DHCPによる自動設定を行うPCでは，IPアドレスは自動設定できるが，サブネットマスクやデフォルトゲートウェイアドレスは自動設定できない。<br>
イ　DHCPによる自動設定を行うPCと，IPアドレスが固定のPCを混在させることはできない。<br>
ウ　DHCPによる自動設定を行うPCに，DHCPサーバのアドレスを設定しておく必要はない。<br>
エ　一度IPアドレスを割り当てられたPCは，その後電源が切られた期間があっても必ず同じIPアドレスを割り当てられる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
