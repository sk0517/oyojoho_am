<div class="question-body">
  コンジョイント分析の説明はどれか。<br>
<br>
ア　顧客ごとの売上高，利益額などを高い順に並べ，自社のビジネスの中心をなしている顧客を分析する手法<br>
イ　商品がもつ価格，デザイン，使いやすさなど，購入者が重視している複数の属性の組合せを分析する手法<br>
ウ　同一世代は年齢を重ねても，時代が変化しても，共通の行動や意識を示すことに注目した，消費者の行動を分析する手法<br>
エ　ブランドがもつ複数のイメージ項目を散布図にプロットし，それぞれのブランドのポジショニングを分析する手法<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
