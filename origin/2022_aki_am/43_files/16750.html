<div class="question-body">
  家庭内で，PCを無線LANルータを介してインターネットに接続するとき，期待できるセキュリティ上の効果の記述のうち，適切なものはどれか。<br>
<br>
ア　IPマスカレード機能による，インターネットからの侵入に対する防止効果<br>
イ　PPPoE機能による，経路上の盗聴に対する防止効果<br>
ウ　WPA機能による，不正なWebサイトへの接続に対する防止効果<br>
エ　WPS機能による，インターネットからのマルウェア感染に対する防止効果<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
