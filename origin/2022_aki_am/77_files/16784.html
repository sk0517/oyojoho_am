<div class="question-body">
  表の製品甲と乙とを製造販売するとき，年間の最大営業利益は何千円か。ここで，甲と乙の製造には同一の機械が必要であり，機械の年間使用可能時間は延べ10,000時間，年間の固定費総額は10,000千円とする。また，甲と乙の製造に関して，機械の使用時間以外の制約条件はないものとする。<br>
<br>
<img src="./AP2022AA077-01.gif" align="middle" onload="this.width = this.width*0.5" width="428"><br>
<br>
ア　2,000<br>
イ　3,750<br>
ウ　4,750<br>
エ　6,150<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
