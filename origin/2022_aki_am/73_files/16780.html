  サイバーフィジカルシステム（CPS）の説明として，適切なものはどれか。<br>
<br>
ア　1台のサーバ上で複数のOSを動かし，複数のサーバとして運用する仕組み<br>
イ　仮想世界を現実かのように体感させる技術であり，人間の複数の感覚を同時に刺激することによって，仮想世界への没入感を与える技術のこと<br>
ウ　現実世界のデータを収集し，仮想世界で分析・加工して，現実世界側にリアルタイムにフィードバックすることによって，付加価値を創造する仕組み<br>
エ　電子データだけでやり取りされる通貨であり，法定通貨のように国家による強制通用力をもたず，主にインターネット上での取引などに用いられるもの<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
