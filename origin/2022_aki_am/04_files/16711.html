<div style="height: 5px;"></div>
<div class="question-body">
  AIにおける過学習の説明として，最も適切なものはどれか。<br>
<br>
ア　ある領域で学習した学習済みモデルを，別の領域に再利用することによって，効率的に学習させる。<br>
イ　学習に使った訓練データに対しては精度が高い結果となる一方で，未知のデータに対しては精度が下がる。<br>
ウ　期待している結果とは掛け離れている場合に，結果側から逆方向に学習させて，その差を少なくする。<br>
エ　膨大な訓練データを学習させても効果が得られない場合に，学習目標として成功と判断するための報酬を与えることによって，何が成功か分かるようにする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
