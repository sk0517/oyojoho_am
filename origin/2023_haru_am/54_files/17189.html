<div class="question-body">
  プロジェクトのリスクマネジメントにおける，リスクの特定に使用する技法の一つであるデルファイ法の説明はどれか。<br>
<br>
ア　確率分布を使用したシミュレーションを行う。<br>
イ　過去の情報や知識を基にして，あらかじめ想定されるリスクをチェックリストにまとめておき，チェックリストと照らし合わせることによってリスクを識別する。<br>
ウ　何人かが集まって，他人のアイディアを批判することなく，自由に多くのアイディアを出し合う。<br>
エ　複数の専門家から得られた見解を要約して再配布し，再度見解を求めることを何度か繰り返して収束させる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
