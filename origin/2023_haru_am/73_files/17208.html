<div class="question-body">
  各種センサーを取り付けた航空機のエンジンから飛行中に収集したデータを分析し，仮想空間に構築したエンジンのモデルに反映してシミュレーションを行うことによって，各パーツの消耗状況や交換時期を正確に予測できるようになる。このように産業機器などにIoT技術を活用し，現実世界や物理的現象をリアルタイムに仮想空間で忠実に再現することを表したものはどれか。<br>
<br>
ア　サーバ仮想化<br>
イ　スマートグリッド<br>
ウ　スマートメーター<br>
エ　デジタルツイン<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
