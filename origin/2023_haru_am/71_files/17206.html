<div style="height: 5px;"></div>
<div class="question-body">
  IoTを支える技術の一つであるエネルギーハーベスティングを説明したものはどれか。<br>
<br>
ア　IoTデバイスに対して，一定期間のエネルギー使用量や稼働状況を把握して，電力使用の最適化を図る技術<br>
イ　周囲の環境から振動，熱，光，電磁波などの微小なエネルギーを集めて電力に変換して，IoTデバイスに供給する技術<br>
ウ　データ通信に利用するカテゴリ5以上のLANケーブルによって，IoTデバイスに電力を供給する技術<br>
エ　必要な時だけ，デバイスの電源をONにして通信を行うことによって，IoTデバイスの省電力化を図る技術<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
