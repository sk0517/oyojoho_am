<div class="question-body">
  日本国特許庁において特許Aを取得した特許権者から，実施許諾を受けることが必要になる場合はどれか。<br>
<br>
ア　特許Aと同じ技術を家庭内で個人的に利用するだけの場合<br>
イ　特許Aと同じ技術を利用して日本国内で製品を製造し，その全てを日本国外に輸出する場合<br>
ウ　特許Aの出願日から25年を越えた後に，特許Aと同じ技術を新たに事業化する場合<br>
エ　特許Aの出願日より前に特許Aと同じ技術を独自に開発し，特許Aの出願日に日本国内でその技術を用いた製品を製造販売していたことが証明できる場合<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
