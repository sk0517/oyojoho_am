<div class="question-body">
  車の自動運転に使われるセンサーの一つであるLiDARの説明として，適切なものはどれか。<br>
<br>
ア　超音波を送出し，その反射波を測定することによって，対象物の有無の検知及び対象物までの距離の計測を行う。<br>
イ　道路の幅及び車線は無限遠の地平線で一点（消失点）に収束する，という遠近法の原理を利用して，対象物までの距離を計測する。<br>
ウ　ミリ波帯の電磁波を送出し，その反射波を測定することによって，対象物の有無の検知及び対象物までの距離の計測を行う。<br>
エ　レーザー光をパルス状に照射し，その反射光を測定することによって，対象物の方向，距離及び形状を計測する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
