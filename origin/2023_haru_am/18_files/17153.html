<div class="question-body">
  仮想記憶方式に関する記述のうち，適切なものはどれか。<br>
<br>
ア　LRUアルゴリズムは，使用後の経過時間が最長のページを置換対象とするページ置換アルゴリズムである。<br>
イ　アドレス変換をインデックス方式で行う場合は，主記憶に存在する全ページ分のページテーブルが必要になる。<br>
ウ　ページフォールトが発生した場合は，ガーベジコレクションが必要である。<br>
エ　ページングが繰り返されるうちに多数の小さな空きメモリ領域が発生することを，フラグメンテーションという。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
