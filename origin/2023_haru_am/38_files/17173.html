<div class="question-body">
  メッセージにRSA方式のデジタル署名を付与して2者間で送受信する。そのときのデジタル署名の検証鍵と使用方法はどれか。<br>
<br>
ア　受信者の公開鍵であり，送信者がメッセージダイジェストからデジタル署名を作成する際に使用する。<br>
イ　受信者の秘密鍵であり，受信者がデジタル署名からメッセージダイジェストを取り出す際に使用する。<br>
ウ　送信者の公開鍵であり，受信者がデジタル署名からメッセージダイジェストを取り出す際に使用する。<br>
エ　送信者の秘密鍵であり，送信者がメッセージダイジェストからデジタル署名を作成する際に使用する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
