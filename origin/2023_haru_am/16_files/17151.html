<div class="question-body">
  3台の装置X〜Zを接続したシステムA，Bの稼働率に関する記述のうち，適切なものはどれか。ここで，3台の装置の稼働率は，いずれも0より大きく1より小さいものとし，並列に接続されている部分は，どちらか一方が稼働していればよいものとする。<br>
<br>
<img src="./AP2023SA016-01.gif" align="middle" onload="this.width = this.width*0.5" width="188"><br><br>
<img src="./AP2023SA016-02.gif" align="middle" onload="this.width = this.width*0.5" width="200"><br>
<br>
ア　各装置の稼働率の値によって，AとBの稼働率のどちらが高いかは変化する。<br>
イ　常にAとBの稼働率は等しい。<br>
ウ　常にAの稼働率はBより高い<br>
エ　常にBの稼働率はAより高い。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
