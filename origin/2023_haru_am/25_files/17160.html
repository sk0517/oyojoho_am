<div class="question-body">
  コンピュータグラフィックスに関する記述のうち，適切なものはどれか。<br>
<br>
ア　テクスチャマッピングは，全てのピクセルについて，視線と全ての物体との交点を計算し，その中から視点に最も近い交点を選択することによって，隠面消去を行う。<br>
イ　メタボールは，反射・透過方向への視線追跡を行わず，与えられた空間中のデータから輝度を計算する。<br>
ウ　ラジオシティ法は，拡散反射面間の相互反射による効果を考慮して拡散反射面の輝度を決める。<br>
エ　レイトレーシングは，形状が定義された物体の表面に，別に定義された模様を張り付けて画像を作成する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
