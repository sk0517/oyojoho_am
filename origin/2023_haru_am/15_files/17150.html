<div class="question-body">
  コンピュータシステムの信頼性を高める技術に関する記述として，適切なものはどれか。<br>
<br>
ア　フェールセーフは，構成部品の信頼性を高めて，故障が起きないようにする技術である。<br>
イ　フェールソフトは，ソフトウェアに起因するシステムフォールトに対処するための技術である。<br>
ウ　フォールトアボイダンスは，構成部品に故障が発生しても運用を継続できるようにする技術である。<br>
エ　フォールトトレランスは，システムを構成する重要部品を多重化して，故障に備える技術である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
