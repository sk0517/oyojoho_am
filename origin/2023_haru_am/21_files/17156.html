<div class="question-body">
  NAND素子を用いた次の組合せ回路の出力Zを表す式はどれか。ここで，論理式中の“・”は論理積，“＋”は論理和，“<span style="text-decoration:overline;">X</span>”はXの否定を表す。<br>
<br>
<img src="./AP2023SA021-01.gif" align="middle" onload="this.width = this.width*0.5" width="290"><br>
<br>
ア　X・Y<br><br>
イ　X＋Y<br><br>
ウ　<span style="text-decoration:overline;">X・Y</span><br><br>
エ　<span style="text-decoration:overline;">X＋Y</span><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
