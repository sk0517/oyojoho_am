<div class="question-body">
  0以上255以下の整数nに対して，<br>
<br>
　　<img src="./AP2023SA001-01.gif" align="middle" onload="this.width = this.width*0.5" width="260"><br>
<br>
と定義する。next（n）と等しい式はどれか。ここで，x AND y及びx OR yは，それぞれxとyを2進数表現にして，桁ごとの論理積及び論理和をとったものとする。<br>
<br>
ア　（n＋1） AND 255<br>
イ　（n＋1） AND 256<br>
ウ　（n＋1） OR 255<br>
エ　（n＋1） OR 256<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
