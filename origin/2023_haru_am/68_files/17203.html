<div class="question-body">
  バランススコアカードで使われる戦略マップの説明はどれか。<br>
<br>
ア　切り口となる二つの要素をX軸，Y軸として，市場における自社又は自社製品のポジションを表現したもの<br>
イ　財務，顧客，内部ビジネスプロセス，学習と成長という四つの視点を基に，課題，施策，目標の因果関係を表現したもの<br>
ウ　市場の魅力度，自社の優位性という二つの軸から成る四つのセルに自社の製品や事業を分類して表現したもの<br>
エ　どのような顧客層に対して，どのような経営資源を使用し，どのような製品・サービスを提供するのかを表現したもの<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
