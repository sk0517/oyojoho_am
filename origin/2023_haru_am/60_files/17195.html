<div class="question-body">
  金融庁“財務報告に係る内部統制の評価及び監査の基準（令和元年）”における，内部統制に関係を有する者の役割と責任の記述のうち，適切なものはどれか。<br>
<br>
ア　株主は，内部統制の整備及び運用について最終的な責任を有する。<br>
イ　監査役は，内部統制の整備及び運用に係る基本方針を決定する。<br>
ウ　経営者は，取締役及び執行役の職務の執行に対する監査の一環として，独立した立場から，内部統制の整備及び運用状況を監視，検証する役割と責任を有している。<br>
エ　内部監査人は，モニタリングの一環として，内部統制の整備及び運用状況を検討，評価し，必要に応じて，その改善を促す職務を担っている。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
