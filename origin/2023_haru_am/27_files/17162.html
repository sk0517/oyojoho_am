<div class="question-body">
  クライアントサーバシステムにおけるストアドプロシージャの記述として<span style="text-decoration:underline;">誤っているもの</span>はどれか。<br>
<br>
ア　アプリケーションから一つずつSQL文を送信する必要がなくなる。<br>
イ　クライアント側のCALL文によって実行される。<br>
ウ　サーバとクライアントの間での通信トラフィックを軽減することができる。<br>
エ　データの変更を行うときに，あらかじめDBMSに定義しておいた処理を自動的に起動・実行するものである。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
