<div class="question-body">
  B. H. シュミットが提唱したCEM（Customer Experience Management）における，カスタマーエクスペリエンスの説明として，適切なものはどれか。<br>
<br>
ア　顧客が商品，サービスを購入・使用・利用する際の，満足や感動<br>
イ　顧客ロイヤルティが失われる原因となる，商品購入時のトラブル<br>
ウ　商品の購入数・購入金額などの数値で表される，顧客の購買履歴<br>
エ　販売員や接客員のスキル向上につながる，重要顧客への対応経験<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
