<div class="question-body">
  スケールインの説明として，適切なものはどれか。<br>
<br>
ア　想定されるCPU使用率に対して，サーバの能力が過剰なとき，CPUの能力を減らすこと<br>
イ　想定されるシステムの処理量に対して，サーバの台数が過剰なとき，サーバの台数を減らすこと<br>
ウ　想定されるシステムの処理量に対して，サーバの台数が不足するとき，サーバの台数を増やすこと<br>
エ　想定されるメモリ使用率に対して，サーバの能力が不足するとき，メモリの容量を増やすこと<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
