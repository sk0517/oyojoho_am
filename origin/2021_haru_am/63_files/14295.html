<div class="question-body">
  レコメンデーション（お勧め商品の提案）の例のうち，協調フィルタリングを用いたものはどれか。<br>
<br>
ア　多くの顧客の購買行動の類似性を相関分析などによって求め，顧客Aに類似した顧客Bが購入している商品を顧客Aに勧める。<br>
イ　カテゴリ別に売れ筋商品のランキングを自動抽出し，リアルタイムで売れ筋情報を発信する。<br>
ウ　顧客情報から，年齢，性別などの人口動態変数を用い，“20代男性”，“30代女性”などにセグメント化した上で，各セグメント向けの商品を提示する。<br>
エ　野球のバットを購入した人に野球のボールを勧めるなど商品間の関連に着目して，関連商品を提示する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
