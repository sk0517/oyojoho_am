<div class="question-body">
  ICカードの耐タンパ性を高める対策はどれか。<br>
<br>
ア　ICカードとICカードリーダとが非接触の状態で利用者を認証して，利用者の利便性を高めるようにする。<br>
イ　故障に備えてあらかじめ作成した予備のICカードを保管し，故障時に直ちに予備カードに交換して利用者がICカードを使い続けられるようにする。<br>
ウ　信号の読出し用プローブの取付けを検出するとICチップ内の保存情報を消去する回路を設けて，ICチップ内の情報を容易には解析できないようにする。<br>
エ　利用者認証にICカードを利用している業務システムにおいて，退職者のICカードは業務システム側で利用を停止して，他の利用者が利用できないようにする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
