<div class="question-body">
  配列<i>A</i>[1]，<i>A</i>[2]，…，<i>A</i>[<i>n</i>]で，<i>A</i>[1]を根とし，<i>A</i>[<i>i</i>]の左側の子を<i>A</i>[2<i>i</i>]，右側の子をA[2<i>i</i>＋1]とみなすことによって，2分木を表現する。このとき，配列を先頭から順に調べていくことは，2分木の探索のどれに当たるか。<br>
<br>
ア　行きがけ順（先行順）深さ優先探索<br>
イ　帰りがけ順（後行順）深さ優先探索<br>
ウ　通りがけ順（中間順）深さ優先探索<br>
エ　幅優先探索<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
