<div class="question-body">
  暗号学的ハッシュ関数における原像計算困難性，つまり一方向性の性質はどれか。<br>
<br>
ア　あるハッシュ値が与えられたとき，そのハッシュ値を出力するメッセージを見つけることが計算量的に困難であるという性質<br>
イ　入力された可変長のメッセージに対して，固定長のハッシュ値を生成できるという性質<br>
ウ　ハッシュ値が一致する二つの相異なるメッセージを見つけることが計算量的に困難であるという性質<br>
エ　ハッシュの処理メカニズムに対して，外部からの不正な観測や改変を防御できるという性質<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
