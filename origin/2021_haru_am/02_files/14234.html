<div style="height: 5px;"></div>
<div class="question-body">
  桁落ちによる誤差の説明として，適切なものはどれか。<br>
<br>
ア　値がほぼ等しい二つの数値の差を求めたとき，有効桁数が減ることによって発生する誤差<br>
イ　指定された有効桁数で演算結果を表すために，切捨て，切上げ，四捨五入などで下位の桁を削除することによって発生する誤差<br>
ウ　絶対値が非常に大きな数値と小さな数値の加算や減算を行ったとき，小さい数値が計算結果に反映されないことによって発生する誤差<br>
エ　無限級数で表される数値の計算処理を有限項で打ち切ったことによって発生する誤差<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
