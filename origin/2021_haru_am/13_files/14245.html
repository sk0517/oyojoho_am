<div class="question-body">
  システムの信頼性設計に関する記述のうち，適切なものはどれか。<br>
<br>
ア　フェールセーフとは，利用者の誤操作によってシステムが異常終了してしまうことのないように，単純なミスを発生させないようにする設計方法である。<br>
イ　フェールソフトとは，故障が発生した場合でも機能を縮退させることなく稼働を継続する概念である。<br>
ウ　フォールトアボイダンスとは，システム構成要素の個々の品質を高めて故障が発生しないようにする概念である。<br>
エ　フォールトトレランスとは，故障が生じてもシステムに重大な影響が出ないように，あらかじめ定められた安全状態にシステムを固定し，全体として安全が維持されるような設計方法である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
