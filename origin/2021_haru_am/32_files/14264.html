<div class="question-body">
  IoTで用いられる無線通信技術であり，近距離のIT機器同士が通信する無線PAN（Personal Area Network）と呼ばれるネットワークに利用されるものはどれか。<br>
<br>
ア　BLE（Bluetooth Low Energy）<br>
イ　LTE（Long Term Evolution）<br>
ウ　PLC（Power Line Communication）<br>
エ　PPP（Point-to-Point Protocol）<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
