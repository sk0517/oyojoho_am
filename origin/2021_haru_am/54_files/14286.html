<div class="question-body">
  PMBOKガイド第6版によれば，リスクにはマイナスの影響を及ぼすリスク（脅威）とプラスの影響を及ぼすリスク（好機）がある。プラスの影響を及ぼすリスクに対する“強化”の戦略はどれか。<br>
<br>
ア　いかなる積極的行動も取らないが，好機が実現したときにそのベネフィットを享受する。<br>
イ　好機が確実に起こり，発生確率が100％にまで高まると保証することによって，特別の好機に関連するベネフィットを捉えようとする。<br>
ウ　好機のオーナーシップを第三者に移転して，好機が発生した場合にそれがベネフィットの一部を共有できるようにする。<br>
エ　好機の発生確率や影響度，又はその両者を増大させる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
