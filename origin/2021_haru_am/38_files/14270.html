<div class="question-body">
  攻撃者が行うフットプリンティングに該当するものはどれか。<br>
<br>
ア　Webサイトのページを改ざんすることによって，そのWebサイトから社会的・政治的な主張を発信する。<br>
イ　攻撃前に，攻撃対象となるPC，サーバ及びネットワークについての情報を得る。<br>
ウ　攻撃前に，攻撃に使用するPCのメモリを増設することによって，効率的に攻撃できるようにする。<br>
エ　システムログに偽の痕跡を加えることによって，攻撃後に追跡を逃れる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
