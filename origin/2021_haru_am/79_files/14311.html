<div class="question-body">
  特定電子メール法における規制の対象に関する説明のうち，適切なものはどれか。<br>
<br>
ア　海外の電気通信設備から国内の電気通信設備に送信される電子メールは，広告又は宣伝が含まれていても，規制の対象外である。<br>
イ　携帯電話のショートメッセージサービス（SMS）は，広告又は宣伝が含まれていれば，規制の対象である。<br>
ウ　政治団体が，自らの政策の普及や啓発を行うために送信する電子メールは，規制の対象である。<br>
エ　取引上の条件を案内する事務連絡や料金請求のお知らせなど取引関係に係る通知を含む電子メールは，広告又は宣伝が含まれていなくても規制の対象である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
