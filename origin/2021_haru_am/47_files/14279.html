<div class="question-body">
  状態遷移表のとおりに動作し，運転状況に応じて装置の温度が上下するシステムがある。システムの状態が“レディ”のとき，①～⑥の順にイベントが発生すると，最後の状態はどれになるか。ここで，状態遷移表の空欄は状態が変化しないことを表す。<br>
<br>
〔状態遷移表〕<br>
<img src="./AP2021SA047-01_96.gif" align="middle" onload="this.width = this.width*0.5" width="428"><br>
<br>
〔発生するイベント〕<br>
①　メッセージ1を受信する。<br>
②　メッセージ1を受信する。<br>
③　装置の温度が50℃以上になる。<br>
④　メッセージ2を受信する。<br>
⑤　装置の温度が40℃未満になる。<br>
⑥　メッセージ2を受信する。<br>
<br>
ア　レディ<br>
イ　高速運転<br>
ウ　低速運転<br>
エ　一時停止<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
