<div class="question-body">
  表は，RACIチャートを用いた，ある組織の責任分担マトリックスである。条件を満たすように責任分担を見直すとき，適切なものはどれか。<br>
<br>
〔条件〕<br>
・各アクティビティにおいて，実行責任者は1人以上とする。<br>
・各アクティビティにおいて，説明責任者は1人とする。<br>
<br>
<img src="./AP2021SA052-01_96.gif" align="middle" onload="this.width = this.width*0.5" width="428"><br>
<br>
ア　アクティビティ①の菊池の責任をIに変更<br>
イ　アクティビティ②の佐藤の責任をAに変更<br>
ウ　アクティビティ③の鈴木の責任をCに変更<br>
エ　アクティビティ④の田中の責任をRに変更<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
