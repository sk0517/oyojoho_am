<div class="question-body">
  NoSQLの一種である，グラフ指向DBの特徴として，適切なものはどれか。<br>
<br>
ア　データ項目の値として階層構造のデータをドキュメントとしてもつことができる。また，ドキュメントに対しインデックスを作成することもできる。<br>
イ　ノード，リレーション，プロパティで構成され，ノード間をリレーションでつないで構造化する。ノード及びリレーションはプロパティをもつことができる。<br>
ウ　一つのキーに対して一つの値をとる形をしている。値の型は定義されていないので，様々な型の値を格納することができる。<br>
エ　一つのキーに対して複数の列をとる形をしている。関係データベースとは異なり，列の型は固定されていない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
