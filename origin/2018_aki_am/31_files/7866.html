<div class="question-body">
  2台の端末と2台のレイヤ3スイッチが図のようにLANで接続されているとき，端末Aがフレームを送信し始めてから，端末Bがそのフレームを受信し終わるまでの時間は，およそ何ミリ秒か。<br>
<br>
〔条件〕<br>
フレーム長：1,000バイト<br>
LANの伝送速度：100Mビット／秒<br>
レイヤ3スイッチにおける1フレームの処理時間：0.2ミリ秒<br>
レイヤ3スイッチは，1フレームの受信を完了してから送信を開始する。<br>
<br>
<img src="./AP2018AA031-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　0.24<br>
イ　0.43<br>
ウ　0.48<br>
エ　0.64<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
