<div class="question-body">
  安全性と信頼性について，次の方針でプログラム設計を行う場合，その方針を表す用語はどれか。<br>
<br>
〔方針〕<br>
　不特定多数の人が使用するプログラムには，自分だけが使用するプログラムに比べて，より多く，データチェックの機能を組み込む。プログラムが処理できるデータの前提条件を文書に書いておくだけでなく，プログラムについても前提条件を満たしていないデータが入力されたときは，エラーメッセージを表示して再入力を促すようなものとする。<br>
<br>
ア　フールプルーフ<br>
イ　フェールセーフ<br>
ウ　フェールソフト<br>
エ　フォールトトレランス<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
