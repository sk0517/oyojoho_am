<div class="question-body">
  クリエイティブコモンズの説明はどれか。<br>
<br>
ア　公共の図書館などにおいては，営利を目的としない場合に限り，一定の条件の下で著作物を複製し，利用者に提供することが許されるという規定<br>
イ　著作物とは，思想や感情を創作的に表現したものであり，文芸，学術，美術又は音楽の領域に属すものであるという定義<br>
ウ　著作物の共有をより円滑に行うために，再利用の許諾条件を著作者があらかじめ明示する枠組みを策定して普及させようとする活動及びその運営主体である団体名<br>
エ　著作物の保護期間は，著作者の生存期間，及び著作者の死後少なくとも50年間とし，それ以降，著作権は消滅するという考え方<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
