<div class="question-body">
  ベンダX社に対して，表に示すように要件定義フェーズから運用テストフェーズまでを委託したい。X社との契約に当たって，“情報システム・モデル取引・契約書＜第一版＞”に照らし，各フェーズの契約形態を整理した。a〜dの契約形態のうち，準委任型が適切であるとされるものはどれか。<br>
<br>
<img src="./AP2018AA066-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　a，b<br>
イ　a，d<br>
ウ　b，c<br>
エ　b，d<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
