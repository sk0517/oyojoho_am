<div style="height: 5px;"></div>
<div class="question-body">
  次の方式で画素にメモリを割り当てる640×480のグラフィックLCDモジュールがある。座標（x，y）で始点（5，4）から終点（9,8）まで直線を描画するとき，直線上のx＝7の画素に割り当てられたメモリのアドレスの先頭は何番地か。<br>
<br>
〔方式〕<br>
・メモリは0番地から昇順に使用する。<br>
・1画素は16ビットとする。<br>
・座標（0，0）から座標（639，479）まで連続して割り当てる。<br>
・各画素は，x＝0からx軸の方向にメモリを割り当てていく。<br>
・x＝639の次はx＝0とし，yを1増やす。<br>
<br>
<img src="./AP2018AA020-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　3847番地<br>
イ　7680番地<br>
ウ　7694番地<br>
エ　8978番地<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
