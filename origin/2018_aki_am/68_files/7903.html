  バリューチェーンによる分類はどれか。<br>
<br>
ア　競争要因を，新規参入の脅威，サプライヤの交渉力，買い手の交渉力，代替商品の脅威，競合企業という五つのカテゴリに分類する。<br>
イ　業務を，購買物流，製造，出荷物流，販売・マーケティング，サービスという五つの主活動と，人事・労務管理などの四つの支援活動に分類する。<br>
ウ　事業の成長戦略を，製品（既存・新規）と市場（既存・新規）の2軸を用いて，市場浸透，市場開発，製品開発，多角化という4象限のマトリックスに分類する。<br>
エ　製品を，市場の魅力度と自社の強みの2軸を用いて，花形，金のなる木，問題児，負け犬という4象限のマトリックスに分類する。<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
