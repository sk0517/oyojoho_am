<div class="question-body">
  符号化方式に関する記述のうち，ハフマン方式はどれか。<br>
<br>
ア　0と1の数字で構成する符号の中で，0又は1の連なりを一つのブロックとし，このブロックに長さを表す符号を割り当てる。<br>
イ　10進数字の0〜9を4ビット2進数の最初の10個に割り当てる。<br>
ウ　発生確率が分かっている記号群を符号化したとき，1記号当たりの平均符号長が最小になるように割り当てる。<br>
エ　連続した波を標本化と量子化によって0と1の数字で構成する符号に割り当てる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
