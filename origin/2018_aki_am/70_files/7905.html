<div class="question-body">
  MPEG4などに存在するパテントプールの説明として，適切なものはどれか。<br>
<br>
ア　国際機関及び標準化団体による公的な標準ではなく，市場の実勢によって事実上の標準とみなされるようになった規格及び製品<br>
イ　著作権表示を保持することによって，ソフトウェアの使用，複製，改変，及び再頒布が認められる仕組み<br>
ウ　特許料が無償でライセンスされている技術<br>
エ　複数の企業が自社の特許権をもち寄り，特許権を一括して管理する仕組み<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
