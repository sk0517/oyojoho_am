ア　インターネットオークションなどで，売り手と買い手の取引を安全に行うために，第三者の仲介業者が決済や商品の受渡しを行うサービスである。<br>

ウ　商品提案から販売，アフターサービスまでの，企業と顧客との双方向の対話を，AIを活用した自動応答機能などによって実現するシステムである。<br>
エ　スマートフォンのカメラなどを通して，利用者の視界に有用な情報を重ね合わせ，現実世界での行動や認知を支援する技術である。<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
