<div class="question-body">
  企業の業務システムを，自社のコンピュータでの運用からクラウドサービスの利用に切り替えるときの留意点はどれか。<br>
<br>
ア　企業が管理する顧客情報や従業員の個人情報を取り扱うシステム機能は，リスクを検討するまでもなく，クラウドサービスの対象外とする。<br>
イ　企業の情報セキュリティポリシやセキュリティ関連の社内規則と，クラウドサービスで提供される管理レベルとの不一致の存在を確認する。<br>
ウ　クラウドサービスの利用開始に備え，自社で保有しているサーバの機能強化や記憶域の増加を実施する。<br>
エ　事業継続計画は自社の資産の範囲で実施することを優先し，クラウドサービスを利用する範囲から除外する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
