<div class="question-body">
  ユーザから請け負うソフトウェア開発を下請業者に委託する場合，下請代金支払遅延等防止法で禁止されている行為はどれか。<br>
<br>
ア　交通費などの経費については金額を明記せず，実費負担とする旨を発注書面に記載する。<br>
イ　下請業者に委託する業務内容は決まっているが，ユーザとの契約代金が未定なので，下請代金の取決めはユーザとの契約決定後とする。<br>
ウ　発注書面を交付する代わりに，下請業者の承諾を得て，必要な事項を記載した電子メールで発注を行う。<br>
エ　ユーザの事情で下請予定の業務内容の一部が未定なので，その部分及び下請代金は別途取り決める。<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
