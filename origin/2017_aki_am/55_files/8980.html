<div class="question-body">
  サービス提供時間帯が毎日6〜20時のシステムにおいて，ある月の停止時間，修復時間及びシステムメンテナンス時間は次のとおりであった。この月の可用性は何％か。ここで，1か月の稼働日数は30日，可用性（％）は小数第2位を四捨五入するものとする。<br>
<br>
〔停止時間，修復時間及びシステムメンテナンス時間〕<br>
・システム障害によるサービス提供時間内の停止時間：7時間<br>
・システム障害に対処するサービス提供時間外の修復時間：3時間<br>
・サービス提供時間外のシステムメンテナンス時間：8時間<br>
<br>
ア　95.7<br>
イ　97.6<br>
ウ　98.3<br>
エ　99.0<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
