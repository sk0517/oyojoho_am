<div class="question-body">
  認証局が発行するCRLに関する記述のうち，適切なものはどれか。<br>
<br>
ア　CRLには，失効したディジタル証明書に対応する秘密鍵が登録される。<br>
イ　CRLには，有効期限内のディジタル証明書のうち失効したディジタル証明書と失効した日時の対応が提示される。<br>
ウ　CRLは，鍵の漏えい，失効申請の状況をリアルタイムに反映するプロトコルである。<br>
エ　有効期限切れで失効したディジタル証明書は，所有者が新たなディジタル証明書を取得するまでの間，CRLに登録される。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
