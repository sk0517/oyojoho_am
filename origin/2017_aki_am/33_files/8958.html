<div class="question-body">
  CSMA/CD方式に関する記述のうち，適切なものはどれか。<br>
<br>
ア　衝突発生時の再送動作によって，衝突の頻度が増すとスループットが下がる。<br>
イ　送信要求が発生したステーションは，共通伝送路の搬送波を検出してからデータを送信するので，データ送出後の衝突は発生しない。<br>
ウ　ハブによって複数のステーションが分岐接続されている構成では，衝突の検出ができないので，この方式は使用できない。<br>
エ　フレームとしては任意長のビットが直列に送出されるので，フレーム長がオクテットの整数倍である必要はない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
