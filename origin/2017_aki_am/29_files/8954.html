<div style="height: 5px;"></div>
<div class="question-body">
  トランザクションA〜Gの待ちグラフにおいて，永久待ちの状態になっているトランザクション全てを列挙したものはどれか。ここで，待ちグラフの<i>X</i>→<i>Y</i>は，トランザクション<i>X</i>はトランザクション<i>Y</i>がロックしている資源のアンロックを待っていることを表す。<br>
<br>
〔トランザクションA〜Gの待ちグラフ〕<br>
<img src="./AP2017AA029-01.gif" align="middle" onload="this.width = this.width*0.4" width="270"><br>
<br>
ア　A，B，C，D<br>
イ　B，C，D<br>
ウ　B，C，D，F<br>
エ　C，D，E，F，G<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
