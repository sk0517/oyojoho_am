<div class="question-body">
  SIEM（Security Information and Event Management）の特徴はどれか。<br>
<br>
ア　DMZを通過する全ての通信データを監視し，不正な通信を遮断する。<br>
イ　サーバやネットワーク機器のMIB（Management Information Base）情報を分析し，中間者攻撃を遮断する。<br>
ウ　ネットワーク機器のIPFIX（IP Flow Information Export）情報を監視し，攻撃者が他者のPCを不正に利用したときの通信を検知する。<br>
エ　複数のサーバやネットワーク機器のログを収集分析し，不審なアクセスを検知する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
