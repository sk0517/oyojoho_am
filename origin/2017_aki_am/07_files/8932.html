<div class="question-body">
  fact（<i>n</i>）は，非負の整数<i>n</i>に対して<i>n</i>の階乗を返す。fact（<i>n</i>）の再帰的な定義はどれか。<br>
<br>
ア　if　<i>n</i>＝0　then　return　0　else　return　<i>n</i>×fact（<i>n</i>−1）<br>
イ　if　<i>n</i>＝0　then　return　0　else　return　<i>n</i>×fact（<i>n</i>＋1）<br>
ウ　if　<i>n</i>＝0　then　return　1　else　return　<i>n</i>×fact（<i>n</i>−1）<br>
エ　if　<i>n</i>＝0　then　return　1　else　return　<i>n</i>×fact（<i>n</i>＋1）<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
