<div class="question-body">
  本社から工場まで車で行くのに，一般道路では80分掛かる。高速道路を利用すると，混雑していなければ50分，混雑していれば100分掛かる。高速道路の交通情報が“順調”ならば高速道路を利用し，“渋滞”ならば一般道路を利用するとき，期待できる平均所要時間は約何分か。ここで，高速道路の混雑具合の確率は，混雑している状態が0.4，混雑していない状態が0.6とし，高速道路の真の状態に対する交通情報の発表の確率は表のとおりとする。<br>
<br>
<img src="./AP2017AA075-01.gif" align="middle" onload="this.width = this.width*0.4" width="310"><br>
<br>
ア　62<br>
イ　66<br>
ウ　68<br>
エ　72<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
