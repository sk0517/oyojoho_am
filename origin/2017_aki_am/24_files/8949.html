<div class="question-body">
  アクセシビリティ設計に関する規格であるJIS X 8341-1:2010（高齢者・障害者等配慮設計指針−情報通信における機器，ソフトウェア及びサービス−第1部：共通指針）を適用する目的のうち，適切なものはどれか。<br>
<br>
ア　全ての個人に対して，等しい水準のアクセシビリティを達成できるようにする。<br>
イ　多様な人々に対して，利用の状況を理解しながら，多くの個人のアクセシビリティ水準を改善できるようにする。<br>
ウ　人間工学に関する規格が要求する水準よりも高いアクセシビリティを，多くの人々に提供できるようにする。<br>
エ　平均的能力をもった人々に対して，標準的なアクセシビリティが達成できるようにする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
