<div class="question-body">
  マイナンバー法におけるマイナンバー（個人番号）に関する記述のうち，適切なものはどれか。<br>
<br>
ア　国の行政機関，地方公共団体，企業などがマイナンバーの使途を自由に決定してよい。<br>
イ　日本国外に在住している場合，日本国籍があれば日本の市町村（特別区を含む）に住民票がなくてもマイナンバーは指定される。<br>
ウ　マイナンバーは主に社会保障分野で使用するので，厚生労働省が指定する。<br>
エ　漏えいして不正に用いられるおそれがあると認められる場合に限り，本人の申請又は市町村長（特別区の区長を含む）の職権によってマイナンバーは変更できる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
