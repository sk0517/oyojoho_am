<div class="question-body">
  ISO，IEC，ITUなどの国際標準に適合した製品を製造及び販売する利点として，適切なものはどれか。<br>
<br>
ア　WTO政府調達協定の加盟国では，政府調達は国際標準の仕様に従って行われる。<br>
イ　国際標準に適合しない競合製品に比べて，技術的に優位であることが保証される。<br>
ウ　国際標準に適合するために必要な特許は，全て無償でライセンスを受けられる。<br>
エ　輸出先国の国内標準及び国内法規の規制を受けることなく製品を輸出できる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
