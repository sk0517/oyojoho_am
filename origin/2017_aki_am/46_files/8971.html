<div class="question-body">
  モジュール設計に関する記述のうち，モジュール強度（結束性）が最も強いものはどれか。<br>
<br>
ア　ある木構造データを扱う機能をこのデータとともに一つにまとめ，木構造データをモジュールの外から見えないようにした。<br>
イ　複数の機能のそれぞれに必要な初期設定の操作が，ある時点で一括して実行できるので，一つのモジュールにまとめた。<br>
ウ　二つの機能A，Bのコードは重複する部分が多いので，A，Bを一つのモジュールにまとめ，A，Bの機能を使い分けるための引数を設けた。<br>
エ　二つの機能A，Bは必ずA，Bの順番に実行され，しかもAで計算した結果をBで使うことがあるので，一つのモジュールにまとめた。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
