<div class="question-body">
  ドライブバイダウンロード攻撃の説明はどれか。<br>
<br>
ア　PCにUSBメモリが接続されたとき，USBメモリに保存されているプログラムを自動的に実行する機能を用いてマルウェアを実行し，PCをマルウェアに感染させる。<br>
イ　PCに格納されているファイルを勝手に暗号化して，復号することと引換えに金銭を要求する。<br>
ウ　不正にアクセスする目的で，建物の外部に漏れた無線LANの電波を傍受して，セキュリティの設定が<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱な無線LANのアクセスポイントを見つけ出す。<br>
エ　利用者がWebサイトを閲覧したとき，利用者に気付かれないように，利用者のPCに不正プログラムを転送させる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
