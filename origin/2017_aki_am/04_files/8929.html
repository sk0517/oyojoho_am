<div class="question-body">
  UTF-8の説明に関する記述として，適切なものはどれか。<br>
<br>
ア　1文字を1バイトから4バイト（又は6バイト）までの可変長で表現しており，ASCIIと上位互換性がある。<br>
イ　2バイトで表現する領域に収まらない文字は，上位サロゲートと下位サロゲートを組み合わせて4バイトで表現する。<br>
ウ　ASCII文字だけを使用することが前提の電子メールで利用するために，7ビットで表現する。<br>
エ　各符号位置が4バイトの固定長で表現される符号化形式である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
