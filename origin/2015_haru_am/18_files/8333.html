<div class="question-body">
  500kバイトの連続した空き領域に，複数のプログラムモジュールをオーバレイ方式で読み込んで実行する。読込み順序Aと読込み順序Bにおいて，最後の120kバイトのモジュールを読み込む際，読込み可否の組合せとして適切なものはどれか。ここで，数値は各モジュールの大きさをkバイトで表したものであり，モジュールを読み込む領域は，ファーストフイット方式で求めることとする。<br>
<br>
〔読込み順序A〕<br>
　100 → 200 → 200解放 → 150 → 100解放 → 80 → 100 → 120<br>
〔読込み順序B〕<br>
　200 → 100 → 150 → 100解放 → 80 → 200解放 → 100 → 120<br>
<br>
<img src="./AP2015SA018-01.gif" align="middle" onload="this.width = this.width*0.4" width="256"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
