<div class="question-body">
  プロセスのスケジューリングに関する記述のうち，ラウンドロビン方式の説明として，適切なものはどれか。<br>
<br>
ア　各プロセスに優先度が付けられていて，後に到着してもプロセスの優先度が実行中のプロセスよりも高ければ，実行中のものを中断し，到着プロセスを実行する。<br>
イ　各プロセスに優先度が付けられていて，イベントの発生を契機に，その時点で最高優先度のプロセスを実行する。<br>
ウ　各プロセスの処理時間に比例して，プロセスのタイムクウォンタムを変更する。<br>
エ　各プロセスを待ち行列の順にタイムクウォンタムずつ実行し，終了しないときは待ち行列の最後につなぐ｡<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
