<div class="question-body">
  拡張現実（AR：Augmented Reality）の例として，最も適切なものはどれか。<br>
<br>
ア　SF映画で都市空間を乗り物が走り回るアニメーションを，3次元空間上に設定した経路に沿って視点を動かして得られる視覚情報を基に作成する。<br>
イ　アバタの操作によって，インターネット上で現実世界を模した空間を動きまわったり，会話したりする。<br>
ウ　実際には存在しない衣料品を仮想的に試着したり，過去の建築物を3次元CGで実際の画像上に再現したりする。<br>
エ　臨場感を高めるために大画面を用いて，振動装置が備わった乗り物に見立てた機器に人間が搭乗し，インタラクティブ性が高いアトラクションを体感できる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
