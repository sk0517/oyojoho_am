<div class="question-body">
  DNSキャッシュポイズニングに分類される攻撃内容はどれか。<br>
<br>
ア　DNSサーバのソフトウェアのバージョン情報を入手して，DNSサーバのセキュリティホールを特定する。<br>
イ　PCが参照するDNSサーバに偽のドメイン情報を注入して，偽装されたサーバにPCの利用者を誘導する。<br>
ウ　攻撃対象のサービスを妨害するために，攻撃者がDNSサーバを踏み台に利用して再帰的な問合せを大量に行う。<br>
エ　内部情報を入手するために，DNSサーバが保存するゾーン情報をまとめて転送させる。<br>
<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
