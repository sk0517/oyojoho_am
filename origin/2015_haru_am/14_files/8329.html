<div class="question-body">
  システムの信頼性向上技術に関する記述のうち，適切なものはどれか。<br>
<br>
ア　故障が発生したときに，あらかじめ指定されている安全な状態にシステムを保つことを，フェールソフトという。<br>
イ　故障が発生したときに，あらかじめ指定されている縮小した範囲のサービスを提供することを，フォールトマスキングという。<br>
ウ　故障が発生したときに，その影響が誤りとなって外部に出ないように訂正することを，フェールセーフという。<br>
エ　故障が発生したときに対処するのではなく，品質管理などを通じてシステム構成要素の信頼性を高めることを，フォールトアボイダンスという。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
