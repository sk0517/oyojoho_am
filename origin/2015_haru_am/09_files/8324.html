<div class="question-body">
  スーパスカラの説明として，適切なものはどれか。<br>
<br>
ア　処理すべきベクトルの長さがベクトルレジスタよりも長い場合，ベクトルレジスタ長の組に分割して処理を繰り返す方式である。<br>
イ　パイプラインを更に細分化することによって，高速化を図る方式である。<br>
ウ　複数のパイプラインを用い，同時に複数の命令を実行可能にすることによって，高速化を図る方式である。<br>
エ　命令語を長く取り，一つの命令で複数の機能ユニットを同時に制御することによって，高速化を図る方式である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
