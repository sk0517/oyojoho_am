<div class="question-body">
  プロジェクトマネジメントにおけるリスクの対応例のうち，PMBOKのリスク対応戦略の一つである転嫁に該当するものはどれか。<br>
<br>
ア　あるサブプロジェクトの損失を，他のサブプロジェクトの利益と相殺する。<br>
イ　個人情報の漏えいが起こらないように，システムテストで使用する本番データの個人情報部分はマスキングする。<br>
ウ　損害の発生に備えて，損害賠償保険を掛ける。<br>
エ　取引先の業績が悪化して，信用に不安があるので，新規取引を止める。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
