<div class="question-body">
  DBMSに実装すべき原子性（atomicity）を説明したものはどれか。<br>
<br>
ア　同一データベースに対する同一処理は，何度実行しても結果は同じである。<br>
イ　トランザクション完了後にハードウェア障害が発生しても，更新されたデータベースの内容は保証される。<br>
ウ　トランザクション内の処理は，全てが実行されるか，全てが取り消されるかのいずれかである。<br>
エ　一つのトランザクションの処理結果は，他のトランザクション処理の影響を受けない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
