<div class="question-body">
  IT投資ポートフォリオの目的はどれか。<br>
<br>
ア　IT投資を事業別，システム別，ベンダ別，品目別などに分類して，経年推移や構成比率の変化などを分析し，投資額削減の施策を検討する。<br>
イ　個別のIT投資案件について，情報戦略との適合性，投資額や投資効果の妥当性，投資リスクの明瞭性などの観点から投資判断を行う。<br>
ウ　個別プロジェクトの計画，実施，完了に応じて，IT投資の事前評価，中間評価，事後評価を一貫して行い，戦略目標に対する達成度を評価する。<br>
エ　投資リスクや投資価値の類似性で分類したカテゴリごとのIT投資について，企業レベルで最適な資源配分を行う。<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
