<div class="question-body">
  ノードN<sub>1</sub>とノードN<sub>2</sub>で通信を行うデータ伝送網がある。図のようにN<sub>1</sub>とN<sub>2</sub>間にノードNを入れてA案，B案で伝送網を構成したとき，システム全体の稼働率の比較として適切なものはどれか。ここで，各ノード間の経路（パス）の稼働率は，全て等しくρ（0＜ρ＜1）であるものとする。また，各ノードは故障しないものとする。<br>
<br>
<img src="./AP2015SA015-01.gif" align="middle" onload="this.width = this.width*0.4" width="144">　<img src="./AP2015SA015-02.gif" align="middle" onload="this.width = this.width*0.4" width="177"><br>
<br>
ア　A案，B案の稼働率の大小関係は，ρの値によって変化する。<br>
イ　A案，B案の稼働率は等しい。<br>
ウ　A案の方が，B案よりも稼働率が高い。<br>
エ　B案の方が，A案よりも稼働率が高い。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
