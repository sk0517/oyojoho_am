<div class="question-body">
  自然数をキーとするデータを，ハッシュ表を用いて管理する。キー<i>x</i>のハッシュ関数<i>h</i>(<i>x</i>)を<br>
　　　　<i>h</i>(<i>x</i>)＝<i>x</i> mod <i>n</i><br>
とすると，キー<i>a</i>と<i>b</i>が衝突する条件はどれか。ここで，<i>n</i>はハッシュ表の大きさであり，<i>x</i> mod <i>n</i>は<i>x</i>を<i>n</i>で割った余りを表す。<br>
<br>
ア　<i>a</i>＋<i>b</i>が<i>n</i>の倍数<br>
イ　<i>a</i>−<i>b</i>が<i>n</i>の倍数<br>
ウ　<i>n</i>が<i>a</i>＋<i>b</i>の倍数<br>
エ　<i>n</i>が<i>a</i>−<i>b</i>の倍数<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
