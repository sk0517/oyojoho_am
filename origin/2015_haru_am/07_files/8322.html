<div class="question-body">
  プログラムの実行に関する次の記述の下線部a〜dのうち，いずれかに誤りがある。誤りの箇所と正しい字句の適切な組合せはどれか。<br>
<br>
　自分自身を呼び出すことができるプログラムは，<sub>a </sub><span style="text-decoration:underline;">再帰的</span>であるという。このようなプログラムを実行するときは，<sub>b </sub><span style="text-decoration:underline;">スタック</span>に局所変数，<sub>c </sub><span style="text-decoration:underline;">仮引数</span>及び戻り番地を格納して呼び出し，復帰するときは<sub> d </sub><span style="text-decoration:underline;">FIFO（First In First Out）</span>方式で格納したデータを取り出して復元する必要がある。<br>
<br>
<img src="./AP2015SA007-01.gif" align="middle" onload="this.width = this.width*0.4" width="298"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
