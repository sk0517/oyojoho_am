<div class="question-body">
  労働施策総合推進法に関する記述として，適切なものはどれか。<br>
<br>
ア　いわゆるパワーハラスメントに関し，労働者の相談に応ずることや適切に対応する体制を整備することなどを事業主に義務付けている。<br>
イ　大学生や高校生が適職を選択して，適切な就職活動を行うために，教育機関が関与すべきインターンシップの理念・原則を定めている。<br>
ウ　都道府県ごとに時給という形式で金額が決められている最低賃金を労働施策の基礎として位置付け，それを決定する手順を定めている。<br>
エ　労働組合と使用者との団体交渉が労働条件改善の基本的な方策であると示し，労働組合活動を総合的に推進することを義務付けている。<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
