<div class="question-body">
  生成AIの処理などで用いられる，大量に発熱するGPUを搭載したサーバを，空気冷却よりも少ない消費電力で効率良く冷却できる液体冷却の一つに液浸冷却がある。液体冷却の方法の説明のうちで，液浸冷却の方法の説明に該当するものの組みはどれか。<br>
<br>
〔液体冷却の方法の説明〕<br>
　a　液体を循環させて熱交換器で冷やす単相冷却と，気化熱を利用する二相冷却とがある。<br>
　b　サーバに取り付けた金属板と熱交換してサーバを冷却する。<br>
　c　サーバを<ruby><rb>筐</rb><rp>（</rp><rt>きょう</rt><rp>）</rp></ruby>体ごと液体に漬けて冷却する。<br>
　d　冷媒となる液体として通常は水を使用する。<br>
<br>
ア　a，b<br>
イ　a，c<br>
ウ　b，d<br>
エ　c，d<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
