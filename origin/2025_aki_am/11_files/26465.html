<div class="question-body">
  現状のHPC（High Performance Computing）マシンの構成を，次の条件で更新することにした。更新後の，ノード数と総理論ピーク演算性能はどれか。ここで，総理論ピーク演算性能は，コア数に比例するものとする。<br>
<br>
〔現状の構成〕<br>
　（1）一つのコアの理論ピーク演算性能は10GFLOPSである。<br>
　（2）一つのノードのコア数は8である。<br>
　（3）ノード数は1,000である。<br>
<br>
〔更新条件〕<br>
　（1）一つのコアの理論ピーク演算性能を現状の2倍にする。<br>
　（2）一つのノードのコア数を現状の2倍にする。<br>
　（3）総コア数を現状の4倍にする。<br>
<br>
<img src="./AP2025AA011-01.gif" align="middle" onload="this.width = this.width*0.5" width="428"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
