<div class="question-body">
  誤り検出方式であるCRCに関する記述として，適切なものはどれか。<br>
<br>
ア　検査用のデータは，検査対象のデータを生成多項式で処理して得られる1ビットの値である。<br>
イ　受信側では，付加されてきた検査用のデータで検査対象のデータを割り，余りがなければ送信が正しかったと判断する。<br>
ウ　送信側では，生成多項式を用いて検査対象のデータから検査用のデータを作り，これを検査対象のデータに付けて送信する。<br>
エ　送信側と受信側では，異なる生成多項式が用いられる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
