<div class="question-body">
  システム監査基準（令和5年）において，システム監査で使用される用語の説明として，適切なものはどれか。<br>
<br>
ア　所見とは，他の標準的な監査人が監査を実施した場合であっても同じ検証結果を得られることである。<br>
イ　正当な懐疑心とは，客観性の保持という精神的な態度を堅持できることである。<br>
ウ　正当な注意とは，監査で発見したことに基づく考えや意見のことである。<br>
エ　独立性とは，第三者から不当な影響や圧力等を受けていない状態のことである。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
