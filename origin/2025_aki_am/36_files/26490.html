<div class="question-body">
  サイバー攻撃の攻撃段階をモデル化したサイバーキルチェーンにおいて，“エクスプロイト”に該当する行為はどれか。<br>
<br>
ア　公開情報の閲覧，顧客を装った電子メールでの問合せなどを行い，標的とする組織を調査する。<br>
イ　標的とする組織のPCでOSの<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性を悪用し，攻撃ツールを実行させる。<br>
ウ　標的とする組織のサーバから秘密情報を窃取し，攻撃者が用意したサーバに送信する。<br>
エ　標的とする組織の従業員にマルウェアを添付した電子メールを送りつける。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
