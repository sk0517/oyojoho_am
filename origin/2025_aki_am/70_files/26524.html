  図のアンゾフの成長マトリクスのうち，市場浸透戦略の例として，適切なものはどれか。<br>
<br>
<img src="./AP2025AA070-01.gif" align="middle" onload="this.width = this.width*0.5" width="428"><br>
<br>
ア　ある商品が高いシェアを確保したため，最近の技術開発の成果を取り入れた上位機種を，既存のユーザー向けに販売する。<br>
イ　ある地域において特別価格で販売することで，商品の知名度を上げ，その地域の多くの住民に販売する。<br>
ウ　ある地方で長年販売してきた商品を，今年から他の地方でも販売する。<br>
エ　販売実績がないある国の商習慣に合う製品を一から開発し，その国で販売する。<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
