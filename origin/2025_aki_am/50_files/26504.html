<div class="question-body">
  委託元への著作権の移転に関する条項を含むソフトウェア開発委託契約書に，“委託先は著作者人格権を行使しない”という記載があった。これはどのような問題の発生を防ぐためのものか。<br>
<br>
ア　委託先で当該ソフトウェアを開発した開発者が，技術者倫理に関しての責任を負わなくなることを防ぐ。<br>
イ　委託先で当該ソフトウェアを開発した開発者を，委託元が後で雇用できなくなることを防ぐ。<br>
ウ　納品されたソフトウェアに不具合が発見された場合に，委託先が金銭的補償を負わなくなることを防ぐ。<br>
エ　納品されたソフトウェアを委託先の了解なく委託元で修正できなくなること，又は他の会社に修正を依頼できなくなることを防ぐ。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
