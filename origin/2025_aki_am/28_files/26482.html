<div class="question-body">
  関係データベースのビューに関する記述のうち，適切なものはどれか。<br>
<br>
ア　ビューの列名は，基の表の列名と異なる名称で定義することができる。<br>
イ　ビューは，基の表から指定した列を抜き出すように定義するものであり，行を抜き出すように定義することはできない。<br>
ウ　二つ以上の表の結合によって定義されたビューは，結合の仕方によらず更新操作ができる。<br>
エ　和両立な二つの表に対し，和集合演算を用いてビューを定義することはできない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
