<div class="question-body">
  組込みシステムのプログラムで，放された状態では0になり，押された状態では1になるスイッチの値を読み込んでいる。このプログラムによって，スイッチの値は周期的に適切なタイミングで読み込まれ，チャタリング処理などの適切な処理が行われるものとし，aが今回の値で，bが前回の値とする。このスイッチが放された状態から押された状態に変化したことを検出するための論理式はどれか。ここで，“・”は論理積，“＋”は論理和，“<span style="text-decoration:overline;">　</span>”は論理否定を表す。<br>
<br>
ア　a・<span style="text-decoration:overline;">b</span><br>
イ　<span style="text-decoration:overline;">a</span>・b<br>
ウ　a＋<span style="text-decoration:overline;">b</span><br>
エ　<span style="text-decoration:overline;">a</span>＋b<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
