<div class="question-body">
  AIにおける機械学習において，2クラス分類モデルの評価方法の一つであるROC曲線で用いられる偽陽性率の説明として，最も適切なものはどれか。ここで，分類されるデータには正しいものと間違っているものが含まれるものとする。<br>
<br>
ア　“間違い”と予測したデータのうち，実際は“正しい”データの割合<br>
イ　実際に“間違い”であるデータに対し，誤って“正しい”と予測したデータの割合<br>
ウ　実際に“間違い”であるデータに対し，正しく“間違い”と予測したデータの割合<br>
エ　全データのうち，実際に正しく予測できなかったデータの割合<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
