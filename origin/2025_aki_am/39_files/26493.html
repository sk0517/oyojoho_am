<div class="question-body">
  CRLに関する記述のうち，適切なものはどれか。<br>
<br>
ア　RFC 5280では，認証局は，発行したデジタル証明書のうち失効したものについては，シリアル番号を失効後1年間CRLに記載するよう義務付けている。<br>
イ　Webサイトの利用者のWebブラウザは，そのWebサイトにサーバ証明書を発行した認証局の公開鍵がWebブラウザに組み込まれていれば，CRLを参照しなくてもよい。<br>
ウ　認証局は，発行した全てのデジタル証明書の有効期限をCRLに記載する。<br>
エ　認証局は，有効期限内のデジタル証明書が失効されたとき，そのシリアル番号をCRLに記載する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
