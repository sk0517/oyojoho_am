<div class="question-body">
  JIS Q 27000:2019（情報セキュリティマネジメントシステム−用語）における真正性及び信頼性に対する定義a〜dの組みのうち，適切なものはどれか。<br>
<br>
〔定義〕<br>
　a　意図する行動と結果とが一貫しているという特性<br>
　b　エンティティは，それが主張するとおりのものであるという特性<br>
　c　認可されたエンティティが要求したときに，アクセス及び使用が可能であるという特性<br>
　d　認可されていない個人，エンティティ又はプロセスに対して，情報を使用させず，また，開示しないという特性<br>
<br>
<img src="./AP2025AA041-01.gif" align="middle" onload="this.width = this.width*0.5" width="222"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
