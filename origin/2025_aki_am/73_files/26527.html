<div class="question-body">
  IoTで活用されているLPWAの特徴として，適切なものはどれか。<br>
<br>
ア　GHz帯を使う近距離無線通信であり，4K，8Kの映像などの大容量のデータを高速伝送することに適している。<br>
イ　電力線を通信に使う有線通信技術であり，スマートメーターの自動検針などに適している。<br>
ウ　一つの基地局で広範囲をカバーできる低消費電力の無線通信技術であり，複数の機器がつながるネットワークに適している。<br>
エ　有線のシリアル通信であり，同じ基板上の回路及びLSI間の通信に適している。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
