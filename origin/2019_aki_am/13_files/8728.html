<div class="question-body">
  システムの性能を向上させるための方法として，スケールアウトが適しているシステムはどれか。<br>
<br>
ア　一連の大きな処理を一括して実行しなければならないので，並列処理が困難な処理が中心のシステム<br>
イ　参照系のトランザクションが多いので，複数のサーバで分散処理を行っているシステム<br>
ウ　データを追加するトランザクションが多いので，データの整合性を取るためのオーバヘッドを小さくしなければならないシステム<br>
エ　同一のマスタデータベースがシステム内に複数配置されているので，マスタを更新する際にはデータベース間で整合性を保持しなければならないシステム<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
