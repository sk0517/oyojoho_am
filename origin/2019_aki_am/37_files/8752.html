<div class="question-body">
  インターネットとの接続において，ファイアウォールのNAPT機能によるセキュリティ上の効果はどれか。<br>
<br>
ア　DMZ上にある公開Webサーバの<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性を悪用する攻撃から防御できる。<br>
イ　インターネットから内部ネットワークへの侵入を検知し，検知後の通信を遮断できる。<br>
ウ　インターネット上の特定のWebサービスを利用するHTTP通信を検知し，遮断できる。<br>
エ　内部ネットワークからインターネットにアクセスする利用者PCについて，インターネットからの不正アクセスを困難にすることができる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
