<div style="height: 5px;"></div>
<div class="question-body">
  データベースに媒体障害が発生したときのデータベースの回復法はどれか。<br>
<br>
ア　障害発生時，異常終了したトランザクションをロールバックする。<br>
イ　障害発生時点でコミットしていたがデータベースの実更新がされていないトランザクションをロールフォワードする。<br>
ウ　障害発生時点でまだコミットもアボートもしていなかった全てのトランザクションをロールバックする。<br>
エ　バックアップコピーでデータベースを復元し，バックアップ取得以降にコミットした全てのトランザクションをロールフォワードする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
