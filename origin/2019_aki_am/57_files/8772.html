<div class="question-body">
  ITサービスマネジメントの活動のうち，インシデント及びサービス要求管理として行うものはどれか。<br>
<br>
ア　サービスデスクに対する顧客満足度が合意したサービス目標を満たしているかどうかを評価し，改善の機会を特定するためにレビューする。<br>
イ　ディスクの空き容量がしきい値に近づいたので，対策を検討する。<br>
ウ　プログラムを変更した場合の影響度を調査する。<br>
エ　利用者からの障害報告を受けて，既知の誤りに該当するかどうかを照合する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
