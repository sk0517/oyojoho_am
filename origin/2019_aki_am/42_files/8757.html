<div class="question-body">
  エクスプロイトキットの説明はどれか。<br>
<br>
ア　JPEGデータを読み込んで表示する機能をもつ製品に対して，セキュリティ上の問題を発生させる可能性のある値を含んだJPEGデータを読み込ませることによって，<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性がないかをテストするツール<br>
イ　JVNなどに掲載された脆弱性情報の中に，利用者自身がPC又はサーバにインストールした製品に関する情報が含まれているかどうかを確認するツール<br>
ウ　OSやアプリケーションソフトウェアの脆弱性を悪用して攻撃するツール<br>
エ　Webサイトのアクセスログから，Webサイトの脆弱性を悪用した攻撃を検出するツール<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
