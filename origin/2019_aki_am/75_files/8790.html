<div class="question-body">
  ワークサンプリング法の説明はどれか。<br>
<br>
ア　観測回数・観測時刻を設定し，実地観測によって観測された要素作業数の比率などから，統計的理論に基づいて作業時間を見積もる。<br>
イ　作業動作を基本動作にまで分解して，基本動作の時間標準テーブルから，構成される基本動作の時間を合計して作業時間を求める。<br>
ウ　作業票や作業日報などから各作業の実績時間を集計し，作業ごとに平均して標準時間を求める。<br>
エ　実際の作業動作そのものをストップウォッチで数回反復測定して，作業時間を調査する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
