<div class="question-body">
  ページング方式の仮想記憶において，主記憶に存在しないページをアクセスした場合の処理や状態の順番として，適切なものはどれか。ここで，現在主記憶には，空きページはないものとする。<br>
<br>
ア　置換え対象ページの決定 → ページイン → ページフォールト → ページアウト<br>
イ　置換え対象ページの決定 → ページフォールト → ページアウト → ページイン<br>
ウ　ページフォールト → 置換え対象ページの決定 → ページアウト → ページイン<br>
エ　ページフォールト → 置換え対象ページの決定 → ページイン → ページアウト<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
