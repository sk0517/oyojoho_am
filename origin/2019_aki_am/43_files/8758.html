<div class="question-body">
  ダークネットは，インターネット上で到達可能であるが，使われていないIPアドレス空間を示す。このダークネットにおいて観測されるものはどれか。<br>
<br>
ア　インターネット上で公開されているWebサイトに対してWebブラウザから送信するパケット<br>
イ　インターネットにつながっており，実在するIoT機器から実在するサーバに送信されるパケット<br>
ウ　マルウェアがIoT機器やサーバなどの攻撃対象を探すために送信するパケット<br>
エ　有効な電子メールアドレスに対して攻撃者が標的型攻撃メールを送信するSMTPのパケット<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
