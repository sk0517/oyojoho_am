<div class="question-body">
  技術基準適合証明として用いられる技適マークの説明として，適切なものはどれか。<br>
<br>
ア　EU加盟国で販売する製品が，EUの安全規制に適合していることを証明する。<br>
イ　電波を発する通信機器が，日本の電波法で定められた条件に適合していることを証明する。<br>
ウ　日本国内で販売する電気用品が，日本の電気用品安全法の基準に適合していることを証明する。<br>
エ　米国で設置する通信機器が，米国の規則に適合していることを証明する。<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
