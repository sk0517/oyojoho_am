<div class="question-body">
  イーサネットで使用されるメディアアクセス制御方式であるCSMA/CDに関する記述として，適切なものはどれか。<br>
<br>
ア　それぞれのステーションがキャリア検知を行うとともに，送信データの衝突が起きた場合は再送する。<br>
イ　タイムスロットと呼ばれる単位で分割して，同一周波数において複数の通信を可能にする。<br>
ウ　データ送受信の開始時にデータ送受信のネゴシエーションとしてRTS/CTS方式を用い，受信の確認はACKを使用する。<br>
エ　伝送路上にトークンを巡回させ，トークンを受け取った端末だけがデータを送信できる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
