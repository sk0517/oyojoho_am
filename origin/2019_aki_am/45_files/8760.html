<div class="question-body">
  <ruby><rb>虹</rb><rp>（</rp><rt>こう</rt><rp>）</rp></ruby>彩認証に関する記述のうち，最も適切なものはどれか。<br>
<br>
ア　経年変化による認証精度の低下を防止するために，利用者の虹彩情報を定期的に登録し直さなければならない。<br>
イ　赤外線カメラを用いると，照度を高くするほど，目に負担を掛けることなく認証精度を向上させることができる。<br>
ウ　他人受入率を顔認証と比べて低くすることが可能である。<br>
エ　本人が装置に接触したあとに残された遺留物を採取し，それを加工することによって認証データを偽造し，本人になりすますことが可能である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
