<div style="height: 5px;"></div>
<div class="question-body">
  全体集合<i>S</i>内に異なる部分集合<i>A</i>と<i>B</i>があるとき，<span style="text-decoration:overline;"><i>A</i></span>∩<span style="text-decoration:overline;"><i>B</i></span>に等しいものはどれか。ここで，<i>A</i>∪<i>B</i>は<i>A</i>と<i>B</i>の和集合，<i>A</i>∩<i>B</i>は<i>A</i>と<i>B</i>の積集合，<span style="text-decoration:overline;"><i>A</i></span>は<i>S</i>における<i>A</i>の補集合，<i>A</i>−<i>B</i>は<i>A</i>から<i>B</i>を除いた差集合を表す。<br>
<br>
ア　<span style="text-decoration:overline;"><i>A</i></span>−<i>B</i><br>
イ　（<span style="text-decoration:overline;"><i>A</i></span>∪<span style="text-decoration:overline;"><i>B</i></span>）−（<i>A</i>∩<i>B</i>）<br>
ウ　（<i>S</i>−<i>A</i>）∪（<i>S</i>−<i>B</i>）<br>
エ　<i>S</i>−（<i>A</i>∩<i>B</i>）<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
