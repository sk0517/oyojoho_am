<div style="height: 5px;"></div>
<div class="question-body">
  インターネット広告の効果指標として用いられるコンバージョン率の説明はどれか。<br>
<br>
ア　Webサイト上で広告が表示された回数に対して，その広告がクリックされた回数の割合を示す指標である。<br>
イ　Webサイト上の広告から商品購入に至った顧客の1人当たりの広告コストを示す指標である。<br>
ウ　Webサイト上の広告に掛けた費用の何倍の収益をその広告から得ることができたかを示す指標である。<br>
エ　Webサイト上の広告をクリックして訪れた人のうち会員登録や商品購入などに至った顧客数の割合を示す指標である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
