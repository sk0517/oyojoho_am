<div class="question-body">
  CRMを説明したものはどれか。<br>
<br>
ア　卸売業者・メーカが，小売店の経営活動を支援してその売上と利益を伸ばすことによって，自社との取引拡大につなげる方法である。<br>
イ　企業全体の経営資源を有効かつ総合的に計画して管理し，経営の高効率化を図るための手法である。<br>
ウ　企業内の全ての顧客チャネルで情報を共有し，サービスのレベルを引き上げて顧客満足度を高め，顧客ロイヤルティの最大化に結び付ける考え方である。<br>
エ　生産，在庫，購買，販売，物流などの全ての情報をリアルタイムに交換することによって，サプライチェーン全体の効率を大幅に向上させる経営手法である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
