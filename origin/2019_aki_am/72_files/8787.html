<div class="question-body">
  フィンテックのサービスの一つであるアカウントアグリゲーションの特徴はどれか。<br>
<br>
ア　各金融機関のサービスに用いる，利用者のID・パスワードなどの情報をあらかじめ登録し，複数の金融機関の口座取引情報を一括表示できる。<br>
イ　資金移動業者として登録された企業は，少額の取引に限り，国内・海外送金サービスを提供できる。<br>
ウ　電子手形の受取り側が早期に債権回収することが容易になり，また，必要な分だけ債権の一部を分割して譲渡できる。<br>
エ　ネットショップで商品を購入した者に与信チェックを行い，問題がなければ商品代金の立替払いをすることによって，購入者は早く商品を入手できる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
