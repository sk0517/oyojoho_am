<div class="question-body">
  Webアプリケーションにおけるセキュリティ上の脅威と対策の適切な組合せはどれか。<br>
<br>
ア　OSコマンドインジェクションを防ぐために，Webアプリケーションが発行するセッションIDを推測困難なものにする。<br>
イ　SQLインジェクションを防ぐために，Webアプリケーション内でデータベースへの問合せを作成する際にバインド機構を使用する。<br>
ウ　クロスサイトスクリプティングを防ぐために，外部から渡す入力データをWebサーバ内のファイル名として直接指定しない。<br>
エ　セッションハイジャックを防ぐために，Webアプリケーションからシェルを起動できないようにする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
