<div class="question-body">
  コンピュータによる伝票処理システムがある。このシステムは，伝票データをためる待ち行列をもち，M/M/1の待ち行列モデルが適用できるものとする。平均待ち時間が<i>T</i>秒以上となるのは，処理装置の利用率が少なくとも何％以上となったときか。ここで，伝票データをためる待ち行列の特徴は次のとおりである。<br>
・伝票データは，ポアソン分布に従って発生する。<br>
・伝票データのたまる数に制限はない。<br>
・1件の伝票データの処理時間は，平均<i>T</i>秒の指数分布に従う。<br>
<br>
ア　33<br>
イ　50<br>
ウ　67<br>
エ　80<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
