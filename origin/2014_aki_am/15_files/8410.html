<div class="question-body">
  プログラムの実行時に利用される記憶領域にスタック領域とヒープ領域がある。それらの領域に関する記述のうち，適切なものはどれか。<br>
<br>
ア　サブルーチンからの戻り番地の退避にはスタック領域が使用され，割当てと解放の順序に関連がないデータの格納にはヒープ領域が使用される。<br>
イ　スタック領域には未使用領域が存在するが，ヒープ領域には未使用領域は存在しない。<br>
ウ　ヒープ領域はスタック領域の予備領域であり，スタック領域が一杯になった場合にヒープ領域が動的に使用される。<br>
エ　ヒープ領域も構造的にはスタックと同じプッシュとポップの操作によって，データの格納と取出しを行う。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
