<div class="question-body">
  通信を要求したPCに対し，ARPの仕組みを利用して実現できる通信可否の判定方法のうち，最も適切なものはどれか。<br>
<br>
ア　PCにインストールされているソフトウェアを確認し，事前に許可されているソフトウェア以外がインストールされていない場合だけ通信を許可する。<br>
イ　PCのMACアドレスを確認し，事前に登録されているMACアドレスである場合だけ通信を許可する。<br>
ウ　PCのOSのパッチ適用状況を確認し，最新のパッチが適用されている場合だけ通信を許可する。<br>
エ　PCのウイルス対策ソフトの定義ファイルを確認し，最新になっている場合だけ通信を許可する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
