<div class="question-body">
  組込み機器用のソフトウェアを開発委託する契約書に開発成果物の著作権の帰属先が記載されていない場合，委託元であるソフトウェア発注者に発生するおそれがある問題はどれか。ここで，ソフトウェアは委託先が全て自主開発するものとする。<br>
<br>
ア　開発成果物を，委託元で開発する別のソフトウェアに適用できなくなる。<br>
イ　ソースコードを公開することが義務付けられる。<br>
ウ　ソフトウェアをバイナリ形式でしか販売できなくなる。<br>
エ　ハードウェアと合わせて，アルゴリズムに関する特許を取得できなくなる。<br>
<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
