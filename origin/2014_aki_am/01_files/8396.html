<body marginwidth="0" marginheight="0">
<div style="height: 5px;"></div>
<div class="question-body">
  <i>A</i>，<i>B</i>，<i>C</i>，<i>D</i>を論理変数とするとき，次のカルノー図と等価な論理式はどれか。ここで，・は論理積，＋は論理和，<span style="text-decoration:overline;">X</span>はXの否定を表す。<br>
<br>
<img src="./AP2014AA001-01.gif" align="middle" onload="this.width = this.width*0.4" width="226"><br>
<br>
ア　<i>A</i>・<i>B</i>・<i><span style="text-decoration:overline;">C</span></i>・<i>D</i>＋<i><span style="text-decoration:overline;">B</span></i>・<i><span style="text-decoration:overline;">D</span></i><br>
イ　<i><span style="text-decoration:overline;">A</span></i>・<i><span style="text-decoration:overline;">B</span></i>・<i><span style="text-decoration:overline;">C</span></i>・<i><span style="text-decoration:overline;">D</span></i>＋<i>B</i>・<i>D</i><br>
ウ　<i>A</i>・<i>B</i>・<i>D</i>＋<i><span style="text-decoration:overline;">B</span></i>・<i><span style="text-decoration:overline;">D</span></i><br>
エ　<i><span style="text-decoration:overline;">A</span></i>・<i><span style="text-decoration:overline;">B</span></i>・<i><span style="text-decoration:overline;">D</span></i>＋<i>B</i>・<i>D</i><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
