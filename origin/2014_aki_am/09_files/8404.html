<div class="question-body">
  キャッシュの書込み方式には，ライトスルー方式とライトバック方式がある。ライトバック方式を使用する目的として，適切なものはどれか。<br>
<br>
ア　キャッシュと主記憶の一貫性（コヒーレンシ）を保ちながら，書込みを行う。<br>
イ　キャッシュミスが発生したときに，キャッシュの内容の主記憶への書き戻しを不要にする。<br>
ウ　個々のプロセッサがそれぞれのキャッシュをもつマルチプロセッサシステムにおいて，キャッシュ管理をライトスルー方式よりも簡単な回路構成で実現する。<br>
エ　プロセッサから主記憶への書込み頻度を減らす。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
