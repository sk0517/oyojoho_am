<div class="question-body">
  4<i>n</i>ビットを用いて整数を表現するとき，符号なし固定小数点表示法で表現できる最大値を<i>a</i>とし，BCD（2進化10進符号）で表現できる最大値を<i>b</i>とする。<i>n</i>が大きくなると<i>a</i>／<i>b</i>はどれに近づくか。<br>
<br>
ア　(15／9)×<i>n</i><br>
イ　(15／9)<sup><i>n</i></sup><br>
ウ　(16／10)×<i>n</i><br>
エ　(16／10)<sup><i>n</i></sup><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
