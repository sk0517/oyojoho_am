<div class="question-body">
  受注管理システムにおける要件のうち，非機能要件に該当するものはどれか。<br>
<br>
ア　顧客から注文を受け付けるとき，与信残金額を計算し，結果がマイナスになった場合は，入力画面に警告メッセージを表示すること<br>
イ　受注管理システムの稼働率を決められた水準に維持するために，障害発生時は半日以内に回復できること<br>
ウ　受注を処理するとき，在庫切れの商品であることが分かるように担当者に警告メッセージを出力すること<br>
エ　出荷できる商品は，顧客から受注した情報を受注担当者がシステムに入力し，営業管理者が受注承認入力を行ったものに限ること<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
