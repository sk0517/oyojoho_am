  図の論理回路において，<i>S</i>＝1，<i>R</i>＝1，<i>X</i>＝0，<i>Y</i>＝1のとき，<i>S</i>を一旦0にした後，再び1に戻した。この操作を行った後の<i>X</i>，<i>Y</i>の値はどれか。<br>
<br>
<img src="./AP2014AA020-01.gif" align="middle" onload="this.width = this.width*0.4" width="179"><br>
<br>
ア　<i>X</i>＝0，<i>Y</i>＝0<br>
イ　<i>X</i>＝0，<i>Y</i>＝1<br>
ウ　<i>X</i>＝1，<i>Y</i>＝0<br>
エ　<i>X</i>＝1，<i>Y</i>＝1<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
