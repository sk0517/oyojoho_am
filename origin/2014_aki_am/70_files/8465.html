  コア技術の事例として適切なものはどれか。<br>
<br>
ア　アライアンスを組んでインタフェースなどを策定し，共通で使うことを目的とした技術<br>
イ　競合他社がまねできないような，自動車エンジンのアイドリングストップ技術<br>
ウ　競合他社と同じCPUコアを採用し，ソフトウェアの移植性を生かす技術<br>
エ　製品の早期開発，早期市場投入を目的として，汎用部品を組み合わせて開発する技術<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
