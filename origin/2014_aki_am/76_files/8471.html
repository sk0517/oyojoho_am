<div class="question-body">
  図は，定量発注方式の在庫モデルを表している。発注aの直後に資材使用量の予測が変わって，納品aの直前の時点における在庫量予測が安全在庫量Sから①で示されるXになるとき，発注a時点での発注量Eに対する適切な変更はどれか。ここで，発注直後の発注量の変更は可能であり，納品直後の在庫量は最大在庫量を超えないものとする。<br>
<br>
<img src="./AP2014AA076-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　E＋S－Xを追加発注する。<br>
イ　K＋S－Xを追加発注する。<br>
ウ　K－Xの発注取消を行う。<br>
エ　X－Sの発注取消を行う。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
