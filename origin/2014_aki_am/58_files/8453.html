<div class="question-body">
  システム監査人による監査手法の適用方法として，適切なものはどれか。<br>
<br>
ア　アンケート調査では，被監査部門から要望が多かった項目を指摘事項にする。<br>
イ　現場調査では，監査人が見た実態と被監査部門からの説明を総合的に判断して，監査証拠とする。<br>
ウ　チェックリストを用いた調査では，被監査部門がチェックして記入した内容に限定して，監査意見を表明する。<br>
エ　文書確認調査では，未作成であった証<ruby><rb>憑</rb><rp>（</rp><rt>ひょう</rt><rp>）</rp></ruby>を，調査が完了するまでに被監査部門に作成させる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
