<div style="height: 5px;"></div>
<div class="question-body">
  グラフに示される頂点<i>V</i><sub>1</sub>から<i>V</i><sub>4</sub>，<i>V</i><sub>5</sub>，<i>V</i><sub>6</sub>の各点への最短所要時間を求め，短い順に並べたものはどれか。ここで，グラフ中の数値は各区間の所要時間を表すものとし，最短所要時間が同一の場合には添字の小さい順に並べるものとする。<br>
<br>
<img src="./AP2014AA005-01.gif" align="middle" onload="this.width = this.width*0.4" width="246"><br>
<br>
ア　<i>V</i><sub>4</sub>，<i>V</i><sub>5</sub>，<i>V</i><sub>6</sub><br>
イ　<i>V</i><sub>4</sub>，<i>V</i><sub>6</sub>，<i>V</i><sub>5</sub><br>
ウ　<i>V</i><sub>5</sub>，<i>V</i><sub>4</sub>，<i>V</i><sub>6</sub><br>
エ　<i>V</i><sub>5</sub>，<i>V</i><sub>6</sub>，<i>V</i><sub>4</sub><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
