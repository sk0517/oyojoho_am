<div class="question-body">
  JIS X 0160におけるソフトウェア実装プロセスの下位レベルのプロセスのうち，次のタスクを実施するものはどれか。<br>
<br>
〔タスク〕<br>
　・ソフトウェア品目の外部インタフェース，及びソフトウェアコンポーネント間のインタフェースについて最上位レベルの設計を行う。<br>
　・データベースについて最上位レベルの設計を行う。<br>
　・ソフトウェア結合のために暫定的なテスト要求事項及びスケジュールを定義する。<br>
<br>
ア　ソフトウェア結合プロセス<br>
イ　ソフトウェア構築プロセス<br>
ウ　ソフトウェア詳細設計プロセス<br>
エ　ソフトウェア方式設計プロセス<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
