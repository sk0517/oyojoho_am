<div class="question-body">
  BI（Business Intelligence）の活用事例として，適切なものはどれか。<br>
<br>
ア　競合する他社が発行するアニュアルレポートなどの刊行物を入手し，経営戦略や財務状況を把握する。<br>
イ　業績の評価や経営戦略の策定を行うために，業務システムなどに蓄積された膨大なデータを分析する。<br>
ウ　電子化された学習教材を社員がネットワーク経由で利用することを可能にし，学習・成績管理を行う。<br>
エ　りん議や決裁など，日常の定型的業務を電子化することによって，手続を確実に行い，処理を迅速化する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
