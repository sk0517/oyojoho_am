<div class="question-body">
  故障率曲線において，図中のAの期間に実施すべきことはどれか。<br>
<br>
<img src="./AP2016AA075-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　設計段階では予想できなかった設計ミス，生産工程では発見できなかった欠陥などによって故障が発生するので，出荷前に試運転を行う。<br>
イ　対象の機器・部品が，様々な環境条件の下で使用されているうちに，偶発的に故障が発生するので，予備部品などを用意しておく。<br>
ウ　疲労・摩耗・劣化などの原因によって故障が発生するので，部品交換などの保全作業を行い，故障率を下げる。<br>
エ　摩耗故障が多く発生してくるので，定期的に適切な保守を行うことによって事故を未然に防止する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
