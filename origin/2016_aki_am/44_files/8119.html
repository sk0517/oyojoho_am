<div class="question-body">
  サンドボックス機構に該当するものはどれか。<br>
<br>
ア　OS，データベース，アプリケーション，ネットワーク機器など多様なソフトウェアや機器が出力する大量のログデータを分析する。<br>
イ　Webアプリケーションの入力フォームの入力データに含まれるHTMLタグ，JavaScript，SQL文などを他の文字列に置き換えることによって，入力データ中に含まれる悪意のあるプログラムの実行を防ぐ。<br>
ウ　Webサーバの前段に設置し，不特定多数のPCから特定のWebサーバへのリクエストに代理応答する。<br>
エ　不正な動作の可能性があるプログラムを特別な領域で動作させることによって，他の領域に悪影響が及ぶのを防ぐ。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
