<div class="question-body">
  リサイクル法に基づく規制に準拠した使用済PCの回収・再資源化に関する記述のうち，適切なものはどれか。<br>
<br>
ア　回収・再資源化の対象は，ディスプレイ以外のデスクトップPC，及びノートブックPC本体である。<br>
イ　家庭から廃棄される際に，PCリサイクルマーク付きのPCは，メーカや輸入販売業者の責任で回収・再資源化する。<br>
ウ　家庭から廃棄される自作PC又は倒産したメーカ若しくは輸入販売業者のPCは，回収・再資源化の対象外である。<br>
エ　企業から廃棄されるPCは，メーカによる回収・再資源化の対象外であり，企業によって産業廃棄物として処理される必要がある。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
