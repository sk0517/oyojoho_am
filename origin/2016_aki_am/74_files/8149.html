<div class="question-body">
  ガントチャートを説明したものはどれか。<br>
<br>
ア　作業別に作業内容とその実施期間を棒状に図示したものであり，作業の予定や実績を示す場合に効果的である。<br>
イ　散点グラフにプロットされた要素の，比較的短期間での座標上の移動変化を示す場合に効果的である。<br>
ウ　複数の属性項目の値を線で結び，その値のバランスを評価する場合に効果的である。<br>
エ　棒グラフと折れ線グラフを組み合わせ，管理上の優先度を明示する場合に効果的である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
