<div class="question-body">
  プログラムで使用可能な実メモリ枠が3ページである仮想記憶システムにおいて，大きさ6ページのプログラムが実行されたとき，ページフォールトは何回発生するか。ここで，プログラム実行時のページ読込み順序は，0，1，2，3，4，0，2，4，3，1，4，5とする。ページング方式は，LRU（Least Recently Used）とし，初期状態では，実メモリにはいずれのページも読み込まれていないものとする。<br>
<br>
ア　9<br>
イ　10<br>
ウ　11<br>
エ　12<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
