<div class="question-body">
  “情報システム・モデル取引・契約書”によれば，要件定義工程を実施する際に，ユーザ企業がベンダと締結する契約の形態について適切なものはどれか。<br>
<br>
ア　構築するシステムがどのような機能となるか明確になっていないので準委任契約にした。<br>
イ　仕様の決定権はユーザ側ではなくベンダ側にあるので準委任契約にした。<br>
ウ　ベンダに委託する作業の成果物が具体的に想定できないので請負契約にした。<br>
エ　ユーザ内のステークホルダとの調整を行う責任が曖昧にならないように請負契約にした。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
