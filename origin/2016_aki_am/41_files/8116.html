<div class="question-body">
  アクセス制御に用いる認証デバイスの特徴に関する記述のうち，適切なものはどれか。<br>
<br>
ア　USBメモリにディジタル証明書を組み込み，認証デバイスとする場合は，利用するPCのMACアドレスを組み込む必要がある。<br>
イ　成人には<ruby><rb>虹</rb><rp>（</rp><rt>こう</rt><rp>）</rp></ruby>彩の経年変化がなく，虹彩認証では，認証デバイスでのパターン更新がほとんど不要である。<br>
ウ　静電容量方式の指紋認証デバイスでは，LED照明を設置した室内において正常に認証できなくなる可能性がある。<br>
エ　認証に利用する接触型ICカードは，カード内のコイルの誘導起電力を利用している。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
