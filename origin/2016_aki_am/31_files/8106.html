<div class="question-body">
  ルータの機能に関する記述のうち，適切なものはどれか。<br>
<br>
ア　MACアドレステーブルの登録情報によって，データフレームをあるポートだけに中継するか，全てのポートに中継するかを判断する。<br>
イ　OSI基本参照モデルのデータリンク層において，ネットワーク同士を接続する。<br>
ウ　OSI基本参照モデルのトランスポート層からアプリケーション層までの階層で，プロトコル変換を行う。<br>
エ　伝送媒体やアクセス制御方式が異なるネットワークの接続が可能であり，送信データのIPアドレスを識別し，データの転送経路を決定する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
