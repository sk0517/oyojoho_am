<div class="question-body">
  タイムクウォンタムが2秒のラウンドロビン方式で処理されるタイムシェアリングシステムにおいて，プロセス1〜3が逐次生成されるとき，プロセス2が終了するのはプロセス2の生成時刻から何秒後か。ここで，各プロセスはCPU処理だけで構成され，OSのオーバヘッドは考慮しないものとする。また，新しいプロセスの生成と中断されたプロセスの再開が同時に生じた場合には，新しく生成されたプロセスを優先するものとする。<br>
<br>
<img src="./AP2016AA019-01.gif" align="middle" onload="this.width = this.width*0.4" width="334"><br>
<br>
ア　12<br>
イ　14<br>
ウ　16<br>
エ　17<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
