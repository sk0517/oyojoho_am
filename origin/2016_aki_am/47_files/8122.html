<div class="question-body">
  オブジェクト指向言語のクラスに関する記述のうち，適切なものはどれか。<br>
<br>
ア　インスタンス変数には共有データが保存されているので，クラス全体で使用できる。<br>
イ　オブジェクトに共通する性質を定義したものがクラスであり，クラスを集めたものがクラスライブラリである。<br>
ウ　オブジェクトはクラスによって定義され，クラスにはメソッドと呼ばれる共有データが保存されている。<br>
エ　スーパクラスはサブクラスから独立して定義し，サブクラスの性質を継承する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
