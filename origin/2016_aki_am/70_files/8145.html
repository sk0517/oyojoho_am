<div class="question-body">
  技術経営における課題のうち，“死の谷”を説明したものはどれか。<br>
<br>
ア　コモディティ化が進んでいる分野で製品を開発しても，他社との差別化ができず，価値利益化ができない。<br>
イ　製品が市場に浸透していく過程において，実用性を重んじる顧客が受け入れず，より大きな市場を形成できない。<br>
ウ　先進的な製品開発に成功しても，事業化するためには更なる困難が立ちはだかっている。<br>
エ　プロジェクトのマネジメントが適切に行われないために，研究開発の現場に過大な負担を強いて，プロジェクトのメンバが過酷な状態になり，失敗に向かってしまう。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
