<div class="question-body">
  五つのタスクを単独で実行した場合のCPUと入出力装置（I/O）の動作順序と処理時間は，表のとおりである。優先度“高”のタスクと，優先度“低”のタスクのうち一つだけを同時に実行する。実行を開始してから，両方のタスクの実行が完了するまでの間のCPUの遊休時間が最も短いのは，どの優先度“低”のタスクとの組合せか。ここで，I/Oは競合せず，OSのオーバヘッドは考慮しないものとする。<br>
　また，表の（）内の数字は処理時間を示すものとする。<br>
<br>
<img src="./AP2016AA017-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
