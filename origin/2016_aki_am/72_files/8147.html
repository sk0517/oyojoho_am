<div class="question-body">
  クラウドソーシングの説明はどれか。<br>
<br>
ア　インターネット上での商取引の決済手段として，ディジタルデータ化された貨幣を使用する。<br>
イ　企業や起業家がインターネット上で事業資金を必要とする目的や内容を告知し，資金提供者を募集する。<br>
ウ　商品の売手がインターネット上で対象商品の内容や希望する販売条件を告知し，入札者が価格を競い落札する。<br>
エ　発注者がインターネット上で発注対象の業務内容や発注条件を告知し，受注者を募集する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
