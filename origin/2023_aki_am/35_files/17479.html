<div class="question-body">
  IPv4ネットワークにおけるマルチキャストの使用例に関する記述として，適切なものはどれか。<br>
<br>
ア　LANに初めて接続するPCが，DHCPプロトコルを使用して，自分自身に割り当てられるIPアドレスを取得する際に使用する。<br>
イ　ネットワーク機器が，ARPプロトコルを使用して，宛先IPアドレスからMACアドレスを得るためのリクエストを送信する際に使用する。<br>
ウ　メーリングリストの利用者が，SMTPプロトコルを使用して，メンバー全員に対し，同一内容の電子メールを一斉送信する際に使用する。<br>
エ　ルータがRIP-2プロトコルを使用して，隣接するルータのグループに，経路の更新情報を送信する際に使用する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
