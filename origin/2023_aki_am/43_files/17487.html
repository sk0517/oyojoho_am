<div class="question-body">
  PCのストレージ上の重要なデータを保護する方法のうち，ランサムウェア感染による被害の低減に効果があるものはどれか。<br>
<br>
ア　WORM（Write Once Read Many）機能を有するストレージを導入して，そこに重要なデータをバックアップする。<br>
イ　ストレージをRAID5構成にして，1台のディスク故障時にも重要なデータを利用可能にする。<br>
ウ　内蔵ストレージを増設して，重要なデータを常時レプリケーションする。<br>
エ　ネットワーク上のストレージの共有フォルダをネットワークドライブに割り当てて，そこに重要なデータをバックアップする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
