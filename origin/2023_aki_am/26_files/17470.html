<div class="question-body">
  “売上”表への次の検索処理のうち，B<sup>＋</sup>木インデックスよりもハッシュインデックスを設定した方が適切なものはどれか。ここで，インデックスを設定する列を＜＞内に示す。<br>
<br>
　　　　売上（伝票番号，売上年月日，商品名，利用者ID，店舗番号，売上金額）<br>
<br>
ア　売上金額が1万円以上の売上を検索する。＜売上金額＞<br>
イ　売上年月日が今月の売上を検索する。＜売上年月日＞<br>
ウ　商品名が‘DB’で始まる売上を検索する。＜商品名＞<br>
エ　利用者IDが‘1001’の売上を検索する。＜利用者ID＞<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
