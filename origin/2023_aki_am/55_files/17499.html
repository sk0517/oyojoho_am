<div class="question-body">
  サービスマネジメントシステム（SMS）における是正処置の説明はどれか。<br>
<br>
ア　検出された不適合又はほかの望ましくない状況の原因を除去する，又は再発の起こりやすさを低減するための処置<br>
イ　構成品目の変更の展開に伴って，構成情報を更新する処置<br>
ウ　パフォーマンスを向上するために繰り返し行われる活動であって，SMS及びサービスの適切性，妥当性及び有効性を継続的に改善するための処置<br>
エ　問題を“記録・分類”し，“優先度付け”し，“必要ならばエスカレーション”し，“可能ならば解決する”一連の処置<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
