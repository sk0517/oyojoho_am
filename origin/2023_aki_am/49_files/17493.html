<div class="question-body">
  アジャイルソフトウェア開発宣言では，“あることがらに価値があることを認めながらも別のことがらにより価値をおく”としている。“別のことがら”に該当するものの組みはどれか。<br>
<br>
ア　個人と対話，動くソフトウェア，顧客との協調，変化への対応<br>
イ　個人と対話，包括的なドキュメント，顧客との協調，計画に従うこと<br>
ウ　プロセスやツール，動くソフトウェア，契約交渉，変化への対応<br>
エ　プロセスやツール，包括的なドキュメント，契約交渉，計画に従うこと<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
