<div class="question-body">
  MOSトランジスタの説明として，適切なものはどれか。<br>
<br>
ア　pn接合における電子と正孔の再結合によって光を放出するという性質を利用した半導体素子<br>
イ　pn接合部に光が当たると電流が発生するという性質を利用した半導体素子<br>
ウ　金属と半導体との間に酸化物絶縁体を挟んだ構造をもつことが特徴の半導体素子<br>
エ　逆方向電圧をある電圧以上印加すると，電流だけが増加し電圧がほぼ一定に保たれるという特性をもつ半導体素子<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
