<div class="question-body">
  Linuxカーネルの説明として，適切なものはどれか。<br>
<br>
ア　CUIによるコマンド入力のためのシェルと呼ばれるソフトウェアが組み込まれていて，文字での操作が可能である。<br>
イ　GUIを利用できるデスクトップ環境が組み込まれていて，マウスを使った直感的な操作が可能である。<br>
ウ　Webブラウザ，ワープロソフト，表計算ソフトなどが含まれており，Linuxカーネルだけで多くの業務が行える。<br>
エ　プロセス管理やメモリ管理などの，アプリケーションソフトウェアが動作するための基本機能を提供する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
