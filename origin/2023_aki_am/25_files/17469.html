<div class="question-body">
  バーチャルリアリティに関する記述のうち，レンダリングの説明はどれか。<br>
<br>
ア　ウェアラブルカメラ，慣性センサーなどを用いて非言語情報を認識する処理<br>
イ　仮想世界の情報をディスプレイに描画可能な形式の画像に変換する処理<br>
ウ　視覚的に現実世界と仮想世界を融合させるために，それぞれの世界の中に定義された3次元座標を一致させる処理<br>
エ　時間経過とともに生じる物の移動などの変化について，モデル化したものを物理法則などに当てはめて変化させる処理<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
