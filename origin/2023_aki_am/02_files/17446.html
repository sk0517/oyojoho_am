<div class="question-body">
  複数の変数をもつデータに対する分析手法の記述のうち，主成分分析はどれか。<br>
<br>
ア　変数に共通して影響を与える新たな変数を計算して，データの背後にある構造を取得する方法<br>
イ　変数の値からほかの変数の値を予測して，データがもつ変数間の関連性を確認する方法<br>
ウ　変数の値が互いに類似するものを集めることによって，データを分類する方法<br>
エ　変数を統合した新たな変数を使用して，データがもつ変数の数を減らす方法<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
