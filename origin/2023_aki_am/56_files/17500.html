<div class="question-body">
  Y社は，受注管理システムを運用し，顧客に受注管理サービスを提供している。日数が30日，月曜日の回数が4回である月において，サービス提供条件を達成するために許容されるサービスの停止時間は最大何時間か。ここで，サービスの停止時間は，小数第1位を切り捨てるものとする。<br>
<br>
〔サービス提供条件〕<br>
・サービスは，計画停止時間を除いて，毎日0時から24時まで提供する。<br>
・計画停止は，毎週月曜日の0時から6時まで実施する。<br>
・サービスの可用性は99％以上とする。<br>
<br>
ア　0<br>
イ　6<br>
ウ　7<br>
エ　13<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
