  H. I. アンゾフが提唱した成長マトリクスを説明したものはどれか。<br>
<br>
ア　既存製品か新製品かという製品軸と既存市場か新市場かという市場軸の両軸で捉え，事業成長戦略を考える。<br>
イ　コストで優位に立つかコスト以外で差別化するか，ターゲットを広くするか集中するかによって戦略を考える。<br>
ウ　市場成長率が高いか低いか，相対的市場シェアが大きいか小さいかによって事業を捉え，資源配分の戦略を考える。<br>
エ　自社の内部環境の強みと弱み，取り巻く外部環境の機会と脅威を抽出し，取組方針を整理して戦略を考える。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
