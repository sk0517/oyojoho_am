<div style="height: 5px;"></div>
<div class="question-body">
  JIS X 9303-1:2006（ユーザシステムインタフェース及びシンボル−アイコン及び機能−アイコン一般）で規定されているアイコンの習得性の説明はどれか。<br>
<br>
ア　アイコンによって表現されたシステム機能が，それが理解された後に，どれだけ容易に思い出すことができるかを示す。<br>
イ　アイコンの図柄の詳細を，どれだけ容易に区別できるかを示す。<br>
ウ　同じ又は類似したアイコンによる以前の経験に基づいて，どれだけ容易にアイコンを識別できるかを示す。<br>
エ　空間的，時間的又は文脈的に近くに表示された別のアイコンから，与えられたアイコンをどれだけ容易に区別できるかを示す。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
