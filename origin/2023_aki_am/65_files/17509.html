<div class="question-body">
  システム開発の成果物が利害関係者の要件（要求事項）を満たしているという客観的な証拠を得るための検証手法として，JIS X 0166:2021（システム及びソフトウェア技術−ライフサイクルプロセス−要求エンジニアリング）では，インスペクション，分析又はシミュレーション，デモンストレーション，テストを挙げている。これらのうち，成果物となる文書について要件（要求事項）への遵守度合いを検査するものはどれか。<br>
<br>
ア　インスペクション<br>
イ　テスト<br>
ウ　デモンストレーション<br>
エ　分析又はシミュレーション<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
