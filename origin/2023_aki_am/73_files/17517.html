<div class="question-body">
  スマートファクトリーで使用されるAIを用いたマシンビジョンの目的として，適切なものはどれか。<br>
<br>
ア　作業者が装着したVRゴーグルに作業プロセスを表示することによって，作業効率を向上させる。<br>
イ　従来の人間の目視検査を自動化し，検査効率を向上させる。<br>
ウ　需要予測を目的として，クラウドに蓄積した入出荷データを用いて機械学習を行い，生産数の最適化を行う。<br>
エ　設計変更内容を，AIを用いて吟味して，製造現場に正確に伝達する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
