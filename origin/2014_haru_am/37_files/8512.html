<div class="question-body">
  A社のWebサーバは，認証局で生成したWebサーバ用のディジタル証明書を使ってSSL/TLS通信を行っている。A社のWebサーバにSSL/TLSを用いてアクセスしたときのPCがサーバのディジタル証明書を入手した後に，認証局の公開鍵を利用して行うものはどれか。<br>
<br>
ア　暗号化通信に利用する共通鍵を生成し，認証局の公開鍵を使って暗号化する。<br>
イ　暗号化通信に利用する共通鍵を認証局の公開鍵を使って復号する。<br>
ウ　ディジタル証明書の正当性を認証局の公開鍵を使って検証する。<br>
エ　利用者が入力して送付する秘匿データを認証局の公開鍵を使って暗号化する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
