<div class="question-body">
  0Sのプロセス制御におけるプリエンプティブ方式に関する記述のうち，適切なものはどれか。<br>
<br>
ア　各プロセスがシステム資源を自主管理できるので，マルチプログラミングに向いている。<br>
イ　ノンプリエンプティブ方式に比べて，コンテキスト切替えのためのオーバヘッドが小さい。<br>
ウ　ノンプリエンプティブ方式に比べて，特定のプロセスがプロセッサを独占することが多い。<br>
エ　プリエンプティブ方式を実現するには，OSがプロセスを強制的に切り替えて実行する機構が必要になる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
