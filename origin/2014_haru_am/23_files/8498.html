  ワンチップマイコンにおける内部クロック発生器のブロック図を示す。15MHzの発振器と，内部のPLL1，PLL2及び分周器の組合せでCPUに240MHz，シリアル通信（SIO）に115kHzのクロック信号を供給する場合の分周器の値は幾らか。ここで，シリアル通信のクロック精度は±5％以内に収まればよいものとする。<br>
<br>
<img src="./AP2014SA023-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>

イ　1／2<sup>6</sup><br>
ウ　1／2<sup>8</sup><br>
エ　1／2<sup>10</sup><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
