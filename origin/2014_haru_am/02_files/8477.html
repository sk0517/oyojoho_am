<div class="question-body">
  三つのグラフA〜Cの同形関係に関する記述のうち，適切なものはどれか。ここで，二つのグラフが同形であるとは，一方のグラフの頂点を他方のグラフの頂点と1対1に漏れなく対応付けることができ，一方のグラフにおいて辺でつながれている頂点同士は他方のグラフにおいても辺でつながれていて，一方のグラフにおいて辺でつながれていない頂点同士は他方のグラフにおいても辺でつながれていないことをいう。<br>
<br>
<img src="./AP2014SA002-01.gif" align="middle" onload="this.width = this.width*0.4" width="131">　<img src="./AP2014SA002-02.gif" align="middle" onload="this.width = this.width*0.4" width="130">　<img src="./AP2014SA002-03.gif" align="middle" onload="this.width = this.width*0.4" width="131"><br>
<br>
ア　AはCと同形であるが，Bとは同形でない。<br>
イ　BはCと同形であるが，Aとは同形でない。<br>
ウ　どの二つのグラフも同形である。<br>
エ　どの二つのグラフも同形でない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
