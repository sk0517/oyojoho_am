<div class="question-body">
  ダイバーシティマネジメントの説明はどれか。<br>
<br>
ア　従業員が仕事と生活の調和を図り，やりがいをもって業務に取り組み，組織の活力を向上させることである。<br>
イ　性別や年齢，国籍などの面で従業員の多様性を尊重することによって，組織の活力を向上させることである。<br>
ウ　自ら設定した目標の達成を目指して従業員が主体的に業務に取り組み，その達成度に応じて評価が行われることである。<br>
エ　労使双方が労働条件についての合意を形成し，協調して収益の増大を目指すことである。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
