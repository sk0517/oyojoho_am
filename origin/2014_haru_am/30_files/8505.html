<div class="question-body">
  トランザクションの原子性（atomicity）の説明として，適切なものはどれか。<br>
<br>
ア　データの物理的格納場所やアプリケーションプログラムの実行場所を意識することなくトランザクション処理が行える。<br>
イ　トランザクションが終了したときの状態は，処理済みか未処理のどちらかしかない。<br>
ウ　トランザクション処理においてデータベースの一貫性が保てる。<br>
エ　複数のトランザクションを同時に処理した場合でも，個々の処理結果は正しい。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
