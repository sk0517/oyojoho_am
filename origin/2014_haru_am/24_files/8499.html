<div class="question-body">
  PDFの特徴として，適切なものはどれか。<br>
<br>
ア　インターネットでの電子文書の配布に適しており，CSSによって表示や印刷のレイアウト制御が行える。<br>
イ　使用するフォントを文書ファイルに埋め込むことができ，閲覧や印刷時に使用するコンピュータ環境が異なっても，作成時と同じ字形で表示できる。<br>
ウ　一つのファイルの中に複数のページが格納でき，各ページは印刷再現性を重視した高解像度のビットマップ画像である。<br>
エ　ファイル構造はXMLの記述形式を用いてレイアウトなどの表示情報をもっており，特定の閲覧ソフトを必要としない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
