<div class="question-body">
  キャパシティプランニングで行うことはどれか。<br>
<br>
ア　コンピュータシステムで，操作ミスや設計上の不具合などによる障害が発生することをあらかじめ想定し，被害が最小限になるように対策を検討する。<br>
イ　コンピュータシステムに効率よく投資するために，性能，経済性及び拡張性を考えてシステムの構成を決定する。<br>
ウ　コンピュータシステムのデータを適切に保護する観点から，誰にデータのアクセスを許可するか，データを暗号化して格納するか否かなどを決める。<br>
エ　コンピュータシステムを複数台の機器で構成し，機器のうちの1台が故障しても処理を続行したままで修理や故障した機器の交換ができるようにする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
