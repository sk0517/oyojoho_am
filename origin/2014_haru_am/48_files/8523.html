<div class="question-body">
  プログラムのテストに関する記述のうち，適切なものはどれか。<br>
<br>
ア　静的テストとは，プログラムを実行することなくテストする手法であり，コード検査，静的解析などがある。<br>
イ　単体テストでは，スタブから被検査モジュールを呼び出し，被検査モジュールから呼び出されるモジュールの代わりにドライバを使用する。<br>
ウ　トップダウンテストは，仮の下位モジュールとしてのスタブを結合してテストするので，テストの最終段階になるまで全体に関係するような欠陥が発見されにくい。<br>
エ　ブラックボックステストでは，分岐，反復などの内部構造を検証するので，全ての経路を通過するように，テストケースを設定する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
