<div class="question-body">
  業務プロセスを可視化する手法としてUMLを採用した場合の活用シーンはどれか。<br>
<br>
ア　対象をエンティティとその属性及びエンティティ間の関連で捉え，データ中心アプローチの表現によって図に示す。<br>
イ　データの流れによってプロセスを表現するために，データの発生，吸収の場所，蓄積場所，データの処理をデータの流れを示す矢印でつないで表現する。<br>
ウ　複数の観点でプロセスを表現するために，目的に応じたモデル図法を使用し，オブジェクトモデリングのために標準化された記述ルールで表現する。<br>
エ　プロセスの機能を網羅的に表現するために，一つの要件に対して発生する事象を条件分岐の形式で記述する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
