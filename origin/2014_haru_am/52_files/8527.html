<div style="height: 5px;"></div>
<div class="question-body">
  システム開発のプロジェクトにおいて，EVMを活用したパフォーマンス管理をしている。開発途中のある時点でCV（コスト差異）の値が正，SV（スケジュール差異）の値が負であるとき，プロジェクトはどのような状況か。<br>
<br>
ア　開発コストが超過し，さらに進捗も遅れているので，双方について改善するための対策が必要である。<br>
イ　開発コストと進捗がともに良好なので，今のパフォーマンスを維持すればよい。<br>
ウ　開発コストは問題ないが，進捗に遅れが出ているので，遅れを改善するための対策が必要である。<br>
エ　進捗は問題ないが，開発コストが超過しているので，コスト効率を改善するための対策が必要である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
