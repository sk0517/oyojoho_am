<div class="question-body">
  モジュール分割の良否を，モジュール結合度の視点から評価する場合，最も適切な記述はどれか。<br>
<br>
ア　共通データ領域は，全てのモジュールからアクセスできるようになっていることが望ましい。<br>
イ　ソフトウェア全体のモジュール分割の良否は，モジュール間の結合度のうちで最も強いものがどのように分布しているかで判断するのが望ましい。<br>
ウ　直接の呼出し関係になっていないモジュール間で情報を交換するには，共通データ領域を用いるのが最も望ましい。<br>
エ　呼び出す側と呼び出される側のモジュール間のデータの受渡しは，引数としてデータ項目を列挙するのが最も望ましい。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
