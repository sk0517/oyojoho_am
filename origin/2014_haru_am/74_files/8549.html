<div class="question-body">
  職能部門別組織を説明したものはどれか。<br>
<br>
ア　業務遂行に必要な機能と利益責任を，製品別，顧客別又は地域別にもつことによって，自己完結的な経営活動が展開できる組織である。<br>
イ　構成員が，自己の専門とする職能部門と特定の事業を遂行する部門の両方に所属する組織である。<br>
ウ　購買・生産・販売・財務などの仕事の特性によって，部門を編成した組織である。<br>
エ　特定の問題を解決するために各部門から専門家を集めて編成し，期間と目標を定めて活動する一時的かつ柔軟な組織である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
