<div class="question-body">
  データの追加・変更・削除が，少ないながらも一定の頻度で行われるデータベースがある。このデータベースのフルバックアップを磁気テープに取得する時間間隔を今までの2倍にした。このとき，データベースのバックアップ又は復旧に関する記述のうち，適切なものはどれか。<br>
<br>
ア　フルバックアップ1回当たりの磁気テープ使用量が約2倍になる。<br>
イ　フルバックアップ1回当たりの磁気テープ使用量が約半分になる。<br>
ウ　フルバックアップ取得の平均実行時間が約2倍になる。<br>
エ　ログ情報によって復旧するときの処理時間が平均して約2倍になる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
