<div class="question-body">
  労働基準法において，36協定の説明はどれか。<br>
<br>
ア　業務遂行の手段，時間配分の決定などを大幅に労働者に委ねる業務に適用され，労働時間の算定は，労使協定で定めた労働時間の労働とみなす制度<br>
イ　業務の繁閑に応じた労働時間の配分などを行い，労使協定によって1か月以内の期間を平均して1週の法定労働時間を超えないようにする制度<br>
ウ　時間外労働，休日労働についての労使協定を書面で締結し，行政官庁に届け出ることによって，法定労働時間外の労働が認められる制度<br>
エ　労使協定によって1か月以内の一定期間の総労働時間を定め，1日の固定勤務時間以外では，労働者に始業・終業時刻の決定を委ねる制度<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
