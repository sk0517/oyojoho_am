<div class="question-body">
  スコープを縮小せずにプロジェクト全体のスケジュールを短縮する技法の一つである“クラッシング”では，メンバの時間外勤務を増やしたり，業務内容に精通したメンバを新たに増員したりする。“クラッシング”を行う際に，優先的に資源を投入すべきスケジュールアクティビティはどれか。<br>
<br>
ア　業務の難易度が最も高いスケジュールアクティビティ<br>
イ　クリティカルパス上のスケジュールアクティビティ<br>
ウ　資源が確保できる時期に開始するスケジュールアクティビティ<br>
エ　所要期間を最も長く必要とするスケジュールアクティビティ<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
