<div class="question-body">
  UMLを用いて表した部門と社員の関係を表すデータモデルの説明のうち，適切なものはどれか。<br>
<br>
<img src="./AP2014SA026-01.gif" align="middle" onload="this.width = this.width*0.4" width="292"><br>
<br>
ア　社員が1人も所属していない部門は登録できない。<br>
イ　社員は複数の部門に所属することができる。<br>
ウ　どの部門にも所属しない社員は登録できない。<br>
エ　一つの部門に複数の社員は所属できない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
