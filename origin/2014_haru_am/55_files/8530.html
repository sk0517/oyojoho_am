<div class="question-body">
  ITサービスマネジメントにおける回避策（ワークアラウンド）の説明として，適切なものはどれか。<br>
<br>
ア　インシデント対応手順として採られる，サービスへの影響を低減又は除去する方法のこと<br>
イ　検出したイベントを情報，警告又は例外のカテゴリに分類すること<br>
ウ　特定の期間に発生したインシデントや問題に対して，影響を受けた人数，停止時間の長さなどを考慮に入れて事業への影響を分析すること<br>
エ　特定のサービス又は作業負荷をピーク時間外の時間帯に移動させて，作業負荷の平準化を図ること<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
