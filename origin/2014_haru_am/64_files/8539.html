<div class="question-body">
  IT投資効果の評価に用いられる手法のうち，ROIによるものはどれか。<br>
<br>
ア　一定期間のキャッシュフローを，時間的変化に割引率を設定して現在価値に換算した上で，キャッシュフローの合計値を求め，その大小で評価する。<br>
イ　キャッシュフロー上で初年度の投資によるキャッシュアウトフローが何年後に回収できるかによって評価する。<br>
ウ　金銭価値の時間的変化を考慮して，現在価値に換算されたキャッシュフローの一定期間の合計値がゼロとなるような割引率を求め，その大小で評価する。<br>
エ　投資額を分母に，投資による収益を分子とした比率を算出し，投資に値するかどうかを評価する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
