<div class="question-body">
  A社は，自社がオンプレミスで運用している業務システムを，クラウドサービスへ段階的に移行する。段階的移行では，初めにネットワークとサーバをIaaSに移行し，次に全てのミドルウェアをPaaSに移行する。A社が行っているシステム運用作業のうち，この移行によって不要となるシステム運用作業の組合せはどれか。<br>
<br>
〔A社が行っているシステム運用作業〕<br>
　① 業務システムのバッチ処理のジョブ監視<br>
　② 物理サーバの起動，停止のオペレーション<br>
　③ ハードウェアの異常を警告する保守ランプの目視監視<br>
　④ ミドルウェアへのパッチ適用<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
