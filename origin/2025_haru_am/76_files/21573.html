<div class="question-body">
  表から，卸売業A社と小売業B社の財務指標を比較したとき，卸売業A社について適切な記述はどれか。<br>
<br>
<img src="./AP2025SA076-01.gif" align="middle" onload="this.width = this.width*0.5" width="368"><br>
<br>
ア　売上高，総資産の額がともに低く，総資産回転率も低い。<br>
イ　売上高営業利益率が高く，総資産営業利益率も高い。<br>
ウ　営業利益，総資産の額がともに低く，総資産営業利益率も低い。<br>
エ　総資産回転率が高く，総資産営業利益率も高い。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
