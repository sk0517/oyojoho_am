<div class="question-body">
  fact（n）は，非負の整数nに対してnの階乗を返す。fact（n）の再帰的な定義はどれか。<br>
<br>
ア　if　n＝0　then　return　0　else　return　n×fact（n−1）<br>
イ　if　n＝0　then　return　0　else　return　n×fact（n＋1）<br>
ウ　if　n＝0　then　return　1　else　return　n×fact（n−1）<br>
エ　if　n＝0　then　return　1　else　return　n×fact（n＋1）<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
