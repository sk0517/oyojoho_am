<div style="height: 5px;"></div>
<div class="question-body">
  二つのシステムA，Bの稼働率をそれぞれα<sub>A</sub>（0＜α<sub>A</sub>＜1），α<sub>B</sub>（0＜α<sub>B</sub>＜1），MTBFをそれぞれMTBF<sub>A</sub>，MTBF<sub>B</sub>，MTTRをそれぞれMTTR<sub>A</sub>，MTTR<sub>B</sub>としたとき，これらの関係として，常に成り立つものはどれか。<br>
<br>
ア　α<sub>A</sub>＝α<sub>B</sub>ならば，MTBF<sub>A</sub>＝MTBF<sub>B</sub>であり，かつMTTR<sub>A</sub>＝MTTR<sub>B</sub>である。<br>
イ　α<sub>A</sub>＝α<sub>B</sub>ならば，MTTR<sub>A</sub>／MTBF<sub>A</sub>＝MTTR<sub>B</sub>／MTBF<sub>B</sub>である。<br>
ウ　α<sub>A</sub>＞α<sub>B</sub>ならば，MTBF<sub>A</sub>＞MTBF<sub>B</sub>であり，かつMTTR<sub>A</sub>＞MTTR<sub>B</sub>である。<br>
エ　α<sub>A</sub>＞α<sub>B</sub>ならば，MTTR<sub>A</sub>／MTBF<sub>A</sub>＞MTTR<sub>B</sub>／MTBF<sub>B</sub>である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
