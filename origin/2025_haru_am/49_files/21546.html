<div class="question-body">
  分散システムの<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性を実験によって発見する手法であるカオスエンジニアリングには，五つの原則がある。この原則のうちの三つは，“定常状態における振る舞いの仮説を立てる”，“実世界の事象を多様化させる”，“継続的に実行できるよう実験を自動化する”である。あと二つの原則の組みはどれか。<br>
<br>
ア　“開発環境で実験を行う”，“影響範囲を局所化する”<br>
イ　“開発環境で実験を行う”，“影響範囲を広く捉える”<br>
ウ　“本番環境で実験を行う”，“影響範囲を局所化する”<br>
エ　“本番環境で実験を行う”，“影響範囲を広く捉える”<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
