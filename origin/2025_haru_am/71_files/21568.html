<div class="question-body">
  クラウドで学習し，エッジデバイスで推論する機械学習ベースのエッジAIにおいて，エッジデバイスで行われる推論処理として，適切なものはどれか。<br>
<br>
ア　一定の環境の中で試行錯誤を行い，行動に報酬を与えることで学習するプロセス<br>
イ　学習したモデルに従い，実際にデータの識別などを行うプロセス<br>
ウ　識別などを行うためのモデルを，正解のラベルを付けたデータによって作成するプロセス<br>
エ　識別などを行うためのモデルを，正解のラベルを付けないデータによって作成するプロセス<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
