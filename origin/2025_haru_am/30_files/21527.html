<div class="question-body">
  MTU（Maximum Transmission Unit）が1,500バイトに設定されたIPv4ネットワークで，2,000バイトのデータをTCPを用いて送信するときに，二つ目に送信されるパケットに含まれるデータは何バイトか。ここで，TCPヘッダー長は20バイト，IPへッダー長は20バイト，イーサネットのヘッダー長とトレーラー長は，それぞれ14バイトと4バイトとする。また，データを複数パケットに分割して送信するときは，先に送信するパケットに格納できる上限までデータを含めて送信するものとする。<br>
<br>
ア　500<br>
イ　540<br>
ウ　580<br>
エ　598<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
