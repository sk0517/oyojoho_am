<div class="question-body">
  パスワードクラックの対策のうち，ストレッチングに該当するものはどれか。<br>
<br>
ア　あらかじめ利用者だけが知っている質問と答えをシステムに登録しておき，普段と異なるログイン方法の場合に追加で質問を行う。<br>
イ　一定時間内にパスワードを一定回数誤ったとき，それ以降のログインを試行できないようにする。<br>
ウ　パスワードの照合のためのハッシュ値を，パスワードに対してハッシュ化を繰り返して，求める。<br>
エ　パスワードの照合のためのハッシュ値を，パスワードに利用者IDごとに異なる文字列を付加してからハッシュ化して，求める。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
