<div class="question-body">
  あるサービスでは〔サービス可用性のSLA〕に基づき，サービス可用性の目標値の遵守状況を月ごとに測定して評価している。ある月の実績値は99.3％だった。この月にサービス可用性の目標値を達成するためには，サービス停止時間は，最低，何時間少なければよかったか。<br>
<br>
〔サービス可用性のSLA〕<br>
　・サービス可用性の目標値：99.5％以上<br>
　・サービス提供時間帯：7時〜22時<br>
　・サービス提供日数：20日／月<br>
<br>
ア　0.4<br>
イ　0.6<br>
ウ　1.3<br>
エ　1.95<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
