<div class="question-body">
  マルチプロセッサによる並列処理で得られる高速化率（単一プロセッサのときと比べた倍率）Eを，次の式によって評価する。r＝0.9のアプリケーションの高速化率がr＝0.3のものの3倍となるのは，プロセッサが何台のときか。<br>
<br>
<img src="./AP2025SA011-01.gif" align="middle" onload="this.width = this.width*0.5" width="113"><br>
<br>
　ここで，<br>
　　n：プロセッサの台数（1≦n）<br>
　　r：対象とする処理のうち，並列化が可能な部分の割合（0≦r≦1）<br>
とし，並列化に伴うオーバーヘッドは考慮しないものとする。<br>
<br>
ア　3<br>
イ　4<br>
ウ　5<br>
エ　6<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
