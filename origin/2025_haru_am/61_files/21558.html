<div class="question-body">
  DX認定制度における認定基準に含まれている事項はどれか。<br>
<br>
ア　経営ビジョン及びDX戦略を策定して対外発信を行うことに加えて，ビジネスモデルの革新などデジタル技術活用の成果目標も既に達成していること<br>
イ　経営ビジョン及びビジネスモデルの方向性を公表するとともに，策定したビジネスモデルを実現するための方策として，DX戦略を公表していること<br>
ウ　申請対象が，中小企業基本法で定められた中小企業であること<br>
エ　デジタルガバナンス・コード3.0の全項目に対応していること<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
