<div class="question-body">
  システム管理基準（令和5年）によれば，企画プロセスにおけるビジネス分析の達成目標の一つとして，適切なものはどれか。<br>
<br>
ア　あるべきビジネスモデル及び業務プロセスによって生じる問題やメリットが明確にされている。<br>
イ　関連する情報システム及び情報システムの構成要素間のインタフェースが特定されている。<br>
ウ　重要な情報システムの遂行能力・性能・稼動率などの実績の測定量が明確にされている。<br>
エ　優先順位付けされた要望が業務要件として明確にされ，利用者及び関係者と合意されている。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
