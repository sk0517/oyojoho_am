  システムをバージョンアップするとき，システムの稼働環境を二つ用意しておき，一方の環境で現バージョンのシステムを稼働させた状態のままで他方の環境のシステムをバージョンアップし，ロードバランサーなどを使って稼働環境を切り替える。これによって，切替えに伴うシステムのダウンタイムを短くするとともに，バージョンアップしたシステムで不具合が発生したときには，元のバージョンに切り戻す時間を短くすることができる。この手法を何というか。<br>
<br>
ア　ブルーグリーンデプロイメント<br>
イ　ホットスタンバイ<br>
ウ　ホットスワップ<br>
エ　ローリングアップデート<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
