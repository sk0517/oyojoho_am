<div class="question-body">
  様々な需要予測モデルのもととなっている時系列モデルに関する記述として，適切なものはどれか。<br>
<br>
ア　移動平均法では，平均する期間を長くするほど，短期的な需要の変化の影響が大きくなる。<br>
イ　移動平均法は，長期的な需要のトレンドを把握するのには向かないが，直近の需要の変化を把握するのには向いている。<br>
ウ　指数平滑法では，平滑化定数の値が0％に近いほど直前の実績値を重視し，100％に近いほど過去の実績値を重視する。<br>
エ　指数平滑法は，過去の実績値よりも直近の実績値を用いるほど予測の精度が向上すると考えられる場合に有効な手法である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
