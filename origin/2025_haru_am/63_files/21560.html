<div class="question-body">
  クラウドサービスなどの提供を迅速に実現するためのプロビジョニングの説明はどれか。<br>
<br>
ア　企業の情報システムの企画，設計，開発，導入，保守などのサービスを，一貫して又は工程の幾つかを部分的に提供する。<br>
イ　業種や事業内容などで共通する複数の企業や組織が共同でデータセンターを運用して，それぞれがインターネットを通して各種サービスを利用する。<br>
ウ　自社でハードウェア，ネットワークなどの環境を用意し，業務パッケージなどを導入して利用する運用形態にする。<br>
エ　利用者の需要を予想し，ネットワーク設備やシステムリソースなどを計画的に調達して強化し，利用者の要求に応じたサービスを提供できるように備える。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
