<div class="question-body">
  フェールソフトの説明として，適切なものはどれか。<br>
<br>
ア　システムの一部に故障や異常が発生したとき，データの消失，装置の損傷及びオペレータに対する危害が起こらないように安全な状態に保つ。<br>
イ　システムの運用中でも故障部分の修復が可能で，24時間365日の連続運転を可能にする。<br>
ウ　装置の一部が故障しても，システムの全面的なサービス停止にならないようにする。<br>
エ　利用者が決められた順序でしか入力できないようにするなどして，単純なミスが起こらないようにする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
