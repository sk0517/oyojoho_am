<div class="question-body">
  クロックの立上りエッジで，データを入力の最下位ビットに取り込んで上位方向へシフトし，ストローブの立上りエッジで値を確定する8ビットのシリアル入力パラレル出力シフトレジスタがある。各信号の波形を観測した結果が図のとおりであるとき，確定後のシフトレジスタの値はどれか。ここで，数値は16進数で表記している。<br>
<br>
<img src="./AP2018SA022-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　63<br>
イ　8D<br>
ウ　B1<br>
エ　C6<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
