<div class="question-body">
  PMBOKガイド第5版によれば，プロジェクトのコスト見積り技法の説明のうち，パラメトリック見積りの説明はどれか。<br>
<br>
ア　WBSの下位レベルの構成要素単位の見積り結果を集計して，プロジェクトのコストを見積もる。<br>
イ　関連する過去のデータとその他の変数との統計的関係を用いて，プロジェクトにおける作業のコストを見積もる。<br>
ウ　楽観値，悲観値，最可能値を使って，個々のアクティビティのコストを見積もる。<br>
エ　類似のプロジェクトにおける過去のコスト実績を使って，プロジェクトのコストを見積もる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
