<div class="question-body">
  三つのタスクA〜Cの優先度と各タスクを単独で実行した場合のCPUと入出力（I/O）装置の動作順序と処理時間は，表のとおりである。優先順位方式のタスクスケジューリングを行うOSの下で，三つのタスクが同時に実行可能状態になってから，タスクCが終了するまでに，タスクCが実行可能状態にある時間は延べ何ミリ秒か。ここで，I/Oは競合せず，OSのオーバヘッドは考慮しないものとする。また，表中の（）内の数字は処理時間を示すものとする。<br>
<br>
<img src="./AP2018SA017-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　6<br>
イ　8<br>
ウ　10<br>
エ　12<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
