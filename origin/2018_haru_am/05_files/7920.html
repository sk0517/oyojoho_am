  非負の整数<i>m</i>，<i>n</i>に対して次のとおりに定義された関数Ack(<i>m</i>, <i>n</i>)がある。Ack(1, 3)の値はどれか。<br>
<br>

<table>

    <td>(<i>m</i>＞0かつ<i>n</i>＞0のとき)</td></tr><tr><td>Ack(<i>m</i>−1, 1)</td>
    <td>(<i>m</i>＞0かつ<i>n</i>＝0のとき)</td>
  </tr>
  <tr>
    <td><i>n</i>＋1</td>
    <td>(<i>m</i>＝0のとき)</td>
  </tr>
</tbody></table>

<br>
