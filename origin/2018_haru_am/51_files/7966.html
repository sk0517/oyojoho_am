<div class="question-body">
  プロジェクトマネジメントにおけるスコープコントロールの活動はどれか。<br>
<br>
ア　開発ツールの新機能の教育が不十分と分かったので，開発ツールの教育期間を2日間延長した。<br>
イ　要件定義完了時に再見積りをしたところ，当初見積もった開発コストを超過することが判明したので，追加予算を確保した。<br>
ウ　連携する計画であった外部システムのリリースが延期になったので，この外部システムとの連携に関わる作業は別プロジェクトで実施することにした。<br>
エ　割り当てたテスト担当者が期待した成果を出せなかったので，経験豊富なテスト担当者と交代した。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
