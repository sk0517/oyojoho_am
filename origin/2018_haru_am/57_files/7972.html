<div style="height: 5px;"></div>
<div class="question-body">
  業務部門が起票した入力原票を，情報システム部門でデータ入力する場合，情報システム部門の業務として，適切なものはどれか。<br>
<br>
ア　業務部門が入力原票ごとの処理結果を確認できるように，処理結果リストを業務部門に送付する。<br>
イ　入力原票の記入内容に誤りがある場合は，誤りの内容が明らかなときに限り，情報システム部門の判断で入力原票を修正し，入力処理する。<br>
ウ　入力原票はデータ入力処理の期日まで情報システム部門で保管し，受領枚数の点検などの授受確認は，データ入力処理の期日直前に一括して行う。<br>
エ　入力済みの入力原票は，不正使用や機密情報の漏えいなどを防止するために，入力後直ちに廃棄する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
