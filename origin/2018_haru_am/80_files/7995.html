<div class="question-body">
  資金決済法で定められている仮想通貨の特徴はどれか。<br>
<br>
ア　金融庁の登録を受けていなくても，外国の事業者であれば，法定通貨との交換は，日本国内において可能である。<br>
イ　日本国内から外国へ国際送金をする場合には，各国の銀行を経由して送金しなければならない。<br>
ウ　日本国内の事業者が運営するオンラインゲームでだけ流通する通貨である。<br>
エ　不特定の者に対する代金の支払に使用可能で，電子的に記録・移転でき，法定通貨やプリペイドカードではない財産的価値である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
