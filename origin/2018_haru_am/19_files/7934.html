<div class="question-body">
  ページング方式の仮想記憶における主記憶の割当てに関する記述のうち，適切なものはどれか。<br>
<br>
ア　プログラム実行時のページフォールトを契機に，ページをロードするのに必要な主記憶が割り当てられる。<br>
イ　プログラムで必要なページをロードするための主記憶の空きが存在しない場合には，実行中のプログラムのどれかが終了するまで待たされる。<br>
ウ　プログラムに割り当てられる主記憶容量は一定であり，プログラムの進行によって変動することはない。<br>
エ　プログラムの実行開始時には，プログラムのデータ領域とコード領域のうち，少なくとも全てのコード領域に主記憶が割り当てられる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
