<div class="question-body">
  物理サーバのスケールアウトに関する記述として，適切なものはどれか。<br>
<br>
ア　サーバのCPUを高性能なものに交換することによって，サーバ当たりの処理能力を向上させること<br>
イ　サーバの台数を増やして負荷分散することによって，サーバ群としての処理能力を向上させること<br>
ウ　サーバのディスクを増設して冗長化することによって，サーバ当たりの信頼性を向上させること<br>
エ　サーバのメモリを増設することによって，単位時間当たりの処理能力を向上させること<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
