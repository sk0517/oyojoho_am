<div class="question-body">
  図は，ある製品ロットの抜取り検査の結果を表すOC曲線（検査特性曲線）である。この図に関する記述のうち，適切なものはどれか。<br>
<br>
<img src="./AP2018SA074-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　p1％よりも大きい不良率のロットが合格する確率は，L1よりも大きい。<br>
イ　p1％よりも小さい不良率のロットが不合格となる確率は，（1.0−L1）よりも大きい。<br>
ウ　p2％よりも大きい不良率のロットが合格する確率は，L2よりも小さい。<br>
エ　p2％よりも小さい不良率のロットが不合格となる確率は，L2よりも小さい。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
