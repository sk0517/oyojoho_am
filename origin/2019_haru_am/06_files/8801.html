<div class="question-body">
  次の手順はシェルソートによる整列を示している。データ列7，2，8，3，1，9，4，5，6を手順（1）〜（4）に従って整列するとき，手順（3）を何回繰り返して完了するか。ここで，[　]は小数点以下を切り捨てた結果を表す。<br>
<br>
〔手順〕<br>
（1）“<i>H</i> ← [データ数÷3]”とする。<br>
（2）データ列を，互いに<i>H</i>要素分だけ離れた要素の集まりから成る部分列とし，それぞれの部分列を，挿入法を用いて整列する。<br>
（3）“<i>H</i> ← [<i>H</i>÷3]”とする。<br>
（4）<i>H</i>が0であればデータ列の整列は完了し，0でなければ（2）に戻る。<br>
<br>
ア　2<br>
イ　3<br>
ウ　4<br>
エ　5<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
