  IoT活用におけるディジタルツインの説明はどれか。<br>
<br>
ア　インターネットを介して遠隔地に設置した3Dプリンタへ設計データを送り，短時間に複製物を製作すること<br>
イ　システムを正副の二重に用意し，災害や故障時にシステムの稼働の継続を保証すること<br>
ウ　自宅の家電機器とインターネットでつながり，稼働監視や操作を遠隔で行うことができるウェアラブルデバイスのこと<br>
エ　ディジタル空間に現実世界と同等な世界を，様々なセンサで収集したデータを用いて構築し，現実世界では実施できないようなシミュレーションを行うこと<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
