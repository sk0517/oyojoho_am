<div class="question-body">
  フェールセーフの考えに基づいて設計したものはどれか。<br>
<br>
ア　乾電池のプラスとマイナスを逆にすると，乾電池が装填できないようにする。<br>
イ　交通管制システムが故障したときには，信号機に赤色が点灯するようにする。<br>
ウ　ネットワークカードのコントローラを二重化しておき，片方のコントローラが故障しても運用できるようにする。<br>
エ　ハードディスクにRAID1を採用して，MTBFで示される信頼性が向上するようにする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
