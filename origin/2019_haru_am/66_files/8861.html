  サブスクリプション方式のソフトウェア調達はどれか。<br>
<br>
ア　ERPソフトウェアの利用人数分の永続使用ライセンスをイニシャルコストとして購入し，必要に応じてライセンスを追加購入する。<br>
イ　新しいOS上で動作する最新バージョンのソフトウェアパッケージを販売代理店から購入する。<br>
ウ　新規開発した業務システムのソフトウェア開発費を無形固定資産として計上して，自社で利用する。<br>
エ　ベンダが提供するソフトウェアを，利用料金を支払うことによって一定期間の利用権を得て利用する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
