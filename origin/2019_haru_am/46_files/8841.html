<div class="question-body">
  ソフトウェアの分析・設計技法の特徴のうち，データ中心分析・設計技法の特徴として，最も適切なものはどれか。<br>
<br>
ア　機能を詳細化する過程で，モジュールの独立性が高くなるようにプログラムを分割していく。<br>
イ　システムの開発後の仕様変更は，データ構造や手続の局所的な変更で対応可能なので，比較的容易に実現できる。<br>
ウ　対象業務領域のモデル化に当たって，情報資源であるデータの構造に着目する。<br>
エ　プログラムが最も効率よくアクセスできるようにデータ構造を設計する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
