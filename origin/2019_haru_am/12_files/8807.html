<div class="question-body">
  Webサーバ，アプリケーション（AP）サーバ及びデータベース（DB）サーバが各1台で構成されるWebシステムにおいて，次の3種類のタイムアウトを設定した。タイムアウトに設定する時間の長い順に並べたものはどれか。ここで，トランザクションはWebリクエスト内で処理を完了するものとする。<br>
<br>
〔タイムアウトの種類〕<br>
①　APサーバのAPが，処理を開始してから終了するまで<br>
②　APサーバのAPにおいて，DBアクセスなどのトランザクションを開始してから終了するまで<br>
③　Webサーバが，APサーバにリクエストを送信してから返信を受けるまで<br>
<br>
ア　①，③，②<br>
イ　②，①，③<br>
ウ　③，①，②<br>
エ　③，②，①<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
