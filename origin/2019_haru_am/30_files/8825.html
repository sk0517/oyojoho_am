<div style="height: 5px;"></div>
<div class="question-body">
  トランザクションのACID特性のうち，一貫性（consistency）の説明はどれか。<br>
<br>
ア　整合性の取れたデータベースに対して，トランザクション実行後も整合性が取れている性質である。<br>
イ　同時実行される複数のトランザクションは互いに干渉しないという性質である。<br>
ウ　トランザクションは，完全に実行が完了するか，全く実行されなかったかの状態しかとらない性質である。<br>
エ　ひとたびコミットすれば，その後どのような障害が起こっても状態の変更が保たれるという性質である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
