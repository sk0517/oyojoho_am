<div class="question-body">
  システム監査基準（平成30年）に基づいて，監査報告書に記載された指摘事項に対応する際に，<b>不適切なもの</b>はどれか。<br>
<br>
ア　監査対象部門が，経営者の指摘事項に対するリスク受容を理由に改善を行わないこととする。<br>
イ　監査対象部門が，自発的な取組によって指摘事項に対する改善に着手する。<br>
ウ　システム監査人が，監査対象部門の改善計画を作成する。<br>
エ　システム監査人が，監査対象部門の改善実施状況を確認する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
