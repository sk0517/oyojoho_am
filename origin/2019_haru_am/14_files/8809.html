<div class="question-body">
  キャッシュサーバを利用した検索処理の平均応答時間は，キャッシュサーバでヒットした場合には0.2秒，ヒットしない場合には2.2秒である。現在の平均検索応答時間は，1.0秒である。3年後のキャッシュサーバのヒット率は，検索量の増加によって現状の半分になると予測されている。3年後の平均検索応答時間は何秒か。ここで，その他のオーバヘッドは考慮しない。<br>
<br>
ア　1.1<br>
イ　1.3<br>
ウ　1.6<br>
エ　1.9<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
