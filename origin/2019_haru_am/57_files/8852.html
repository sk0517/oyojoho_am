<div class="question-body">
  システム開発委託先（受託者）から委託元（委託者）に納品される成果物に対するユーザ受入テストの適切性を確かめるためのシステム監査の要点はどれか。<br>
<br>
ア　委託者が作成したユーザ受入テスト計画書に従って，受託者が成果物に対してユーザ受入テストを実施していること<br>
イ　受託者が成果物と一緒にユーザ受入テスト計画書を納品していること<br>
ウ　受託者から納品された成果物に対して，委託者が要件定義に基づきユーザ受入テストを実施していること<br>
エ　受託者から納品された成果物に対して，監査人がユーザ受入テスト計画を策定していること<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
