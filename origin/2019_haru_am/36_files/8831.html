<div class="question-body">
  情報セキュリティにおけるエクスプロイトコードの説明はどれか。<br>
<br>
ア　同じセキュリティ機能をもつ製品に乗り換える場合に，CSV形式など他の製品に取り込むことができる形式でファイルを出力するプログラム<br>
イ　コンピュータに接続されたハードディスクなどの外部記憶装置や，その中に保存されている暗号化されたファイルなどを閲覧，管理するソフトウェア<br>
ウ　セキュリティ製品を設計する際の早い段階から実際に動作する試作品を作成し，それに対する利用者の反応を見ながら徐々に完成に近づける開発手法<br>
エ　ソフトウェアやハードウェアの<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性を検査するために作成されたプログラム<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
