<div class="question-body">
  二つの独立したテストグループA，Bが，あるシステムについて一定期間並行してテストを行い，それぞれN<sub>A</sub>個及びN<sub>B</sub>個のエラーを検出した。このうち，共通のエラーはN<sub>AB</sub>個であった。このシステムの総エラー数Nを予測する式はどれか。ここで，N<sub>A</sub>＞0，N<sub>B</sub>＞0，N<sub>AB</sub>＞0とする。また，グループA，Bの，エラーを検出する能力及び効率は等しいものとする。<br>
<br>
ア　N＝N<sub>A</sub>＋N<sub>B</sub>−N<sub>AB</sub><br>
イ　N＝N<sub>AB</sub>×N<sub>A</sub>×N<sub>B</sub><br>
ウ　N＝（N<sub>A</sub>＋N<sub>B</sub>）／N<sub>AB</sub><br>
エ　N＝N<sub>A</sub>×N<sub>B</sub>／N<sub>AB</sub><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
