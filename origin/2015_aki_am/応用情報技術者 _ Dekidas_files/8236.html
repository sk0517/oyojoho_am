<div class="question-body">
  0以上255以下の整数<i>n</i>に対して，<br>
<br>
<table>
  <tbody><tr>
    <td rowspan="2">next(<i>n</i>)＝</td>
     <td rowspan="2"><span style="font-size:2em;">{</span></td>
         <td><i>n</i>＋1　</td>
    <td>(0≦<i>n</i>＜255)</td>
  </tr>
  <tr>
    <td>0</td>
    <td>(<i>n</i>＝255)</td>
  </tr>
</tbody></table>
<br>
と定義する。next(<i>n</i>)と等しい式はどれか。ここで，<i>x</i> AND <i>y</i>及び<i>x</i> OR <i>y</i>は，それぞれ<i>x</i>と<i>y</i>を2進数表現にして，桁ごとの論理積及び論理和をとったものとする。<br>
<br>
ア　(<i>n</i>＋1) AND 255<br>
イ　(<i>n</i>＋1) AND 256<br>
ウ　(<i>n</i>＋1) OR 255<br>
エ　(<i>n</i>＋1) OR 256<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
