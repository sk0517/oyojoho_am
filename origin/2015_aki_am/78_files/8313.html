<div class="question-body">
  Webページの著作権に関する記述のうち，適切なものはどれか。<br>
<br>
ア　営利目的ではなく趣味として，個人が開設しているWebページに他人の著作物を無断掲載しても，私的使用であるから著作権の侵害とはならない。<br>
イ　作成したプログラムをインターネット上でフリーウェアとして公開した場合，配布されたプログラムは，著作権法による保護の対象とはならない。<br>
ウ　試用期間中のシェアウェアを使用して作成したデータを，試用期間終了後もWebページに掲載することは，著作権の侵害に当たる。<br>
エ　特定の分野ごとにWebページのURLを収集し，独自の解釈を付けたリンク集は，著作権法で保護される。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
