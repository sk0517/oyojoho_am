<div class="question-body">
  ディジタルシグナルプロセッサ（DSP）の特徴として，適切なものはどれか。<br>
<br>
ア　シリアル入出力ポートに誤り訂正機能を内蔵しているので，通信制御に適している。<br>
イ　積和演算などの機能を内蔵しているので，ディジタルフィルタを実現するのに適している。<br>
ウ　多チャンネルのA/D変換器と大容量の記憶メモリを内蔵しているので，温度を測定し，記録するのに適している。<br>
エ　ベクトル演算機能を内蔵しているので，多数のパラメタを同時に扱う科学技術計算などの大規模な数値計算に適している。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
