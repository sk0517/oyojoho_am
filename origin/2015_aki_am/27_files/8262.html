<div class="question-body">
  社員と年の対応関係をUMLのクラス図で記述する。二つのクラス間の関連が次の条件を満たす場合，a，bに入る多重度の適切な組合せはどれか。ここで，年クラスのインスタンスは毎年存在する。<br>
<br>
〔条件〕<br>
（1）全ての社員は入社年を特定できる。<br>
（2）年によっては社員が入社しないこともある。<br>
<br>

<br>
<img src="./AP2015AA027-02.gif" align="middle" onload="this.width = this.width*0.4" width="206"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
