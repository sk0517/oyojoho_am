<div class="question-body">
  クライアントサーバシステムにおけるストアドプロシージャに関する記述のうち，<b>適切でないもの</b>はどれか。<br>
<br>
ア　機密性が高いデータに対する処理を特定のプロシージャ呼出しに限定することによって，セキュリティを向上させることができる。<br>
イ　システム全体に共通な処理をプロシージャとして格納しておくことによって，処理の標準化を行うことができる。<br>
ウ　データベースへのアクセスを細かい単位でプロシージャ化することによって，処理性能（スループット）を向上させることができる。<br>
エ　複数のSQL文から成る手続を1回の呼出しで実行することによって，クライアントとサーバの間の通信回数を減らすことができる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
