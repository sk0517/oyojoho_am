  ゼロデイ攻撃の特徴はどれか。<br>
<br>
ア　セキュリティパッチが提供される前にパッチが対象とする<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性を攻撃する。<br>
イ　特定のWebサイトに対し，日時を決めて，複数台のPCから同時に攻撃する。<br>
ウ　特定のターゲットに対し，フィッシングメールを送信して不正サイトへ誘導する。<br>
エ　不正中継が可能なメールサーバを見つけた後，それを踏み台にチェーンメールを大量に送信する。<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
