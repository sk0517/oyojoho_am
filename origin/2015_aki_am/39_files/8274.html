<div class="question-body">
  無線LAN環境におけるWPA2-PSKの機能はどれか。<br>
<br>
ア　アクセスポイントに設定されているSSIDを共通鍵とし，通信を暗号化する。<br>
イ　アクセスポイントに設定されているのと同じSSIDとパスワード（Pre-Shared Key）が設定されている端末だけを接続させる。<br>
ウ　アクセスポイントは，IEEE 802.11acに準拠している端末だけに接続を許可する。<br>
エ　アクセスポイントは，利用者ごとに付与されたSSIDを確認し，無線LANへのアクセス権限を識別する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
