<div class="question-body">
  ITILは，各プロセスに対する重要成功要因（CSF）と重要業績評価指標（KPI)を例示している。次のインシデント管理のCSFに対するKPIとして，適切なものはどれか。<br>
<br>
〔CSF〕<br>
インシデントをできるだけ迅速に解決し，事業へのインパクトを最小限にする。<br>
<br>
ア　インシデントの総件数<br>
イ　サービスデスクが他のサポート・レベルに問い合わせずにクローズできたインシデントの割合<br>
ウ　サービスデスク担当者当たりの処理したインシデントの件数<br>
エ　変更とリリースに関連するインシデントの件数と割合<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
