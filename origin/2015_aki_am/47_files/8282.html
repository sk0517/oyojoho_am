<div class="question-body">
  ソフトウェア開発に利用されるピアレビューの説明として，適切なものはどれか。<br>
<br>
ア　同じ職場内の様々なスキルや知識をもつレビューアによって，成果物を検証する。<br>
イ　成果物の内容を審査して，次の開発工程に進むための関門（審査・承認）として実施する。<br>
ウ　早期に成果物から欠陥を取り除くことが目的なので，管理職のメンバの参加が必要である。<br>
エ　プロトタイピングで試作したソフトウェアの動作を，発注元の会社と検証する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
