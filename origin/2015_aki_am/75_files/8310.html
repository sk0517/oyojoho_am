<div class="question-body">
  経営会議で来期の景気動向を議論したところ，景気は悪化する，横ばいである，好転するという三つの意見に完全に分かれてしまった。来期の投資計画について，積極的投資，継続的投資，消極的投資のいずれかに決定しなければならない。表の予想利益については意見が一致した。意思決定に関する記述のうち，適切なものはどれか。<br>
<br>
<img src="./AP2015AA075-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　混合戦略に基づく最適意思決定は，積極的投資と消極的投資である。<br>
イ　純粋戦略に基づく最適意思決定は，積極的投資である。<br>
ウ　マクシマックス原理に基づく最適意思決定は，継続的投資である。<br>
エ　マクシミン原理に基づく最適意思決定は，消極的投資である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
