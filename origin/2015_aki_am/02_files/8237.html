<div class="question-body">
  集合<i>A</i>，<i>B</i>，<i>C</i>に対して<span style="text-decoration:overline;"><i>A</i>∪<i>B</i>∪<i>C</i></span>が空集合であるとき，包含関係として適切なものはどれか。ここで，∪は和集合を，∩は積集合を，<span style="text-decoration:overline;"><i>X</i></span>は<i>X</i>の補集合を，また，<i>X</i>⊆Yは<i>X</i>が<i>Y</i>の部分集合であることを表す。<br>
<br>
ア　（<i>A</i>∩B）⊆C<br>
イ　（<i>A</i>∩<span style="text-decoration:overline;"><i>B</i></span>）⊆C<br>
ウ　（<span style="text-decoration:overline;"><i>A</i></span>∩<i>B</i>）⊆C<br>
エ　（<span style="text-decoration:overline;"><i>A</i></span>∩<span style="text-decoration:overline;"><i>B</i></span>）⊆C<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
