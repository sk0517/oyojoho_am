  次に示すユークリッドの互除法（方法1，方法2）で，正の整数<i>a</i>，<i>b</i>の最大公約数は，それぞれ<i>m</i>と<i>n</i>のどちらの変数に求まるか。ここで，<i>m</i> mod <i>n</i>は，<i>m</i>を<i>n</i>で割った余りを表す。<br>
<br>
<img src="./AP2015AA006-01.gif" align="middle" onload="this.width = this.width*0.4" width="257"><br>
<br>
<img src="./AP2015AA006-02.gif" align="middle" onload="this.width = this.width*0.4" width="214"><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
