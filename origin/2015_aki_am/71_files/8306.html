  アクセシビリティを説明したものはどれか。<br>
<br>
ア　住民基本台帳の情報をコンピュータネットワークで管理することによって，住民サービスの向上と行政事務処理の合理化を図ること<br>
イ　仕様が異なるコンピュータ間で，ネットワークなどを通じてそれぞれが管理するソフトウェアやデータを利用する際の相互運用性のこと<br>
ウ　製品や食料品など，生産段階から最終消費段階又は廃棄段階までの全工程について，履歴の追跡が可能であること<br>
エ　ソフトウェアや情報サービス，Webサイトなどを，高齢者や障害者を含む誰もが利用可能であること<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
