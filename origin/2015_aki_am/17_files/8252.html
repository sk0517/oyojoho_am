<div style="height: 5px;"></div>
<div class="question-body">
  デマンドページング方式による仮想記憶の利点はどれか。<br>
<br>
ア　実際にアクセスが行われたときにだけ主記憶にロードするので，無駄なページをロードしなくて済む。<br>
イ　主記憶に対する仮想記憶の容量比を大きくするほど，ページフォールトの発生頻度を低くできる。<br>
ウ　プロセスが必要とするページを前もって主記憶にロードするので，補助記憶へのアクセスによる遅れを避けることができる。<br>
エ　ページフォールトの発生頻度が極端に高くなっても，必要な場合にしかページを読み込まないのでスラッシング状態を回避できる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
