<div class="question-body">
  システム監査人が，予備調査において実施する作業として，“システム監査基準”に照らして適切なものはどれか。<br>
<br>
ア　監査テーマに基づいて，監査項目を設定し，監査手続を策定し，個別監査計画書に記載する。<br>
イ　経営トップにヒアリングを行い，経営戦略・方針，現在抱えている問題についての認識を確認し，監査テーマを設定する。<br>
ウ　個別監査計画を策定するために，監査スケジュールについて被監査部門と調整を図る。<br>
エ　被監査部門から事前に入手した資料を閲覧し，監査対象の実態を明確に把握する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
