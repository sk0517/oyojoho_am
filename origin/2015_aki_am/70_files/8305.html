<div class="question-body">
  IoT（Internet of Things）の実用例として，<b>適切でないもの</b>はどれか。<br>
<br>
ア　インターネットにおけるセキュリティの問題を回避する目的で，サーバに接続せず，単独でファイルの管理や演算処理，印刷処理などの作業を行うコンピュータ<br>
イ　大型の機械などにセンサと通信機能を内蔵して，稼働状況や故障箇所，交換が必要な部品などを，製造元がインターネットを介してリアルタイムに把握できるシステム<br>
ウ　自動車同士及び自動車と路側機が通信することによって，自動車の位置情報をリアルタイムに収集して，渋滞情報を配信するシステム<br>
エ　検針員に代わって，電力会社と通信して電力使用量を申告する電力メータ<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
