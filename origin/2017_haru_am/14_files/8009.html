<div style="height: 5px;"></div>
<div class="question-body">
  コンピュータシステムの性能評価法の一つであるモニタリングの説明として，適切なものはどれか。<br>
<br>
ア　各プログラムの実行状態や資源の利用状況を測定し，システムの構成や応答性能を改善するためのデータを得る。<br>
イ　システムの各構成要素に関するカタログ性能データを収集し，それらのデータからシステム全体の性能を算出する。<br>
ウ　典型的なプログラムを実行し，入出力や制御プログラムを含めたシステムの総合的な処理性能を測定する。<br>
エ　命令を分類し，それぞれの使用頻度を重みとした加重平均によって全命令の平均実行速度を求める。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
