<div class="question-body">
  事業戦略のうち，浸透価格戦略に該当するものはどれか。<br>
<br>
ア　売上高をできるだけ維持しながら，製品や事業に掛けるコストを徐々に引き下げていくことによって，短期的なキャッシュフローの増大を図る。<br>
イ　事業を分社化し，その会社を売却することによって，投下資金の回収を図る。<br>
ウ　新規事業に進出することによって，企業を成長させ，利益の増大を図る。<br>
エ　低価格戦略と積極的なプロモーションによって，新製品のマーケットシェアの増大を図る。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
