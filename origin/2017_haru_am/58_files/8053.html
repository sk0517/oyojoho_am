<div style="height: 5px;"></div>
<div class="question-body">
  システム監査人が監査報告書に記載する改善勧告に関する説明のうち，適切なものはどれか。<br>
<br>
ア　改善の実現可能性は考慮せず，監査人が改善の必要があると判断した事項だけを記載する。<br>
イ　監査証拠による裏付けの有無にかかわらず，監査人が改善の必要があると判断した事項を記載する。<br>
ウ　監査人が改善の必要があると判断した事項のうち，被監査部門の責任者が承認した事項だけを記載する。<br>
エ　調査結果に事実誤認がないことを被監査部門に確認した上で，監査人が改善の必要があると判断した事項を記載する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
