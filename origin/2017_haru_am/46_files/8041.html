<div style="height: 5px;"></div>
<div class="question-body">
  組込み機器のソフトウェア開発にプラットフォーム開発を適用する利点として，適切なものはどれか。<br>
<br>
ア　機器ごとにソフトウェアを新規に設計するので，最小のコードサイズで最大の性能を実現できる。<br>
イ　機器ごとのハードウェアとソフトウェアの結合テストを不要にできる。<br>
ウ　ソフトウェアを複数の異なる機器に共通して利用することが可能になるので，ソフトウェア開発効率を向上できる。<br>
エ　複数の機器に共通のバグが発生したとき，ソフトウェアのプラットフォーム部分をバグの原因から除外できる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
