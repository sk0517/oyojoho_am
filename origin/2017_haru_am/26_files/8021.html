<div class="question-body">
  データモデルを解釈してオブジェクト図を作成した。解釈の誤りを適切に指摘した記述はどれか。ここで，モデルの表記にはUMLを用い，オブジェクト図の一部の属性の表示は省略した。<br>
<br>
<img src="./AP2017SA026-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
<img src="./AP2017SA026-02.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　“<span style="text-decoration:underline;">123456：注文</span>”が複数の商品にリンクしているのは，誤りである。<br>
イ　“<span style="text-decoration:underline;">2ドア冷蔵庫：商品</span>”が複数の注文にリンクしているのは，誤りである。<br>
ウ　“<span style="text-decoration:underline;">A商店：顧客</span>”が複数の注文にリンクしているのは，誤りである。<br>
エ　“<span style="text-decoration:underline;">ドラム式洗濯機：商品</span>”がどの注文にもリンクしていないのは，誤りである。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
