<div class="question-body">
  ワークシェアリングの説明はどれか。<br>
<br>
ア　企業が継続雇用の前提として，従業員に対して他社でも通用する技術・能力の維持責任を求める一方，企業も従業員の能力開発を積極的に支援する。<br>
イ　従業員1人当たりの労働時間を短縮したり仕事の配分方法を見直したりするなど，労働者間で労働を分かち合うことで雇用維持・創出を図る。<br>
ウ　専門業務や企画業務における労働時間は，実際の労働時間に関係なく，労使協定であらかじめ取り決めた労働時間とみなす。<br>
エ　能力主義と実績主義の徹底，経営参加意識の醸成，業績向上へのインセンティブなどを目的に，職務と能力，業績を基準に報酬を決める。<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
