<div class="question-body">
  プログラムの特性に関する記述のうち，適切なものはどれか。<br>
<br>
ア　再帰的プログラムは，手続の中でそれ自体を呼び出すプログラムであり，再入可能である。<br>
イ　再使用可能プログラムは，一度実行したプログラムを主記憶装置上にロードし直さずに再度実行できるプログラムであり，再入可能である。<br>
ウ　再入可能プログラムは，複数のタスクから同時に呼び出されたときに，並列に実行できるプログラムであるが，再配置可能ではない。<br>
エ　再配置可能プログラムは，主記憶装置上のどの領域にロードされても実行可能なプログラムであるが，再使用可能ではない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
