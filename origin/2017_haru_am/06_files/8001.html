<div class="question-body">
  次の流れ図の処理で，終了時の<i>x</i>に格納されているものはどれか。ここで，与えられた<i>a</i>，<i>b</i>は正の整数であり，mod（<i>x</i>，<i>y</i>）は<i>x</i>を<i>y</i>で割った余りを返す。<br>
<br>
<img src="./AP2017SA006-01.gif" align="middle" onload="this.width = this.width*0.4" width="133"><br>
<br>
ア　<i>a</i>と<i>b</i>の最小公倍数<br>
イ　<i>a</i>と<i>b</i>の最大公約数<br>
ウ　<i>a</i>と<i>b</i>の小さい方に最も近い素数<br>
エ　<i>a</i>を<i>b</i>で割った商<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
