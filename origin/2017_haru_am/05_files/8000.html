<div style="height: 5px;"></div>
<div class="question-body">
  次の数式は，ある細菌の第<i>n</i>世代の個数<i>f</i>（<i>n</i>）が1世代後にどのように変化するかを表現したものである。この漸化式の解釈として，1世代後の細菌の個数が，第<i>n</i>世代と比較してどのようになるかを適切に説明しているものはどれか。<br>
<br>
　　　　<i>f</i>（<i>n</i>＋1）＋0.2×<i>f</i>（<i>n</i>）＝2×<i>f</i>（<i>n</i>）<br>
<br>
ア　1世代後の個数は，第<i>n</i>世代の個数の1.8倍に増える。<br>
イ　1世代後の個数は，第<i>n</i>世代の個数の2.2倍に増える。<br>
ウ　1世代後の個数は，第<i>n</i>世代の個数の2倍になり，更に増殖後の20％が増える。<br>
エ　1世代後の個数は，第<i>n</i>世代の個数の2倍になるが，増殖後の20％が死ぬ。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
