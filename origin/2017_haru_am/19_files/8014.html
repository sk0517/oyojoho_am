<div class="question-body">
  オープンソースライセンスのGNU GPL（GNU General Public License）の説明のうち，適切なものはどれか。<br>
<br>
ア　GPLであるソースコードの実現する機能を利用する，別のプログラムのソースコードを作成すると，GPLが適用される。<br>
イ　GPLであるソースコードの全てを使って派生物を作った場合に限って，GPLが適用される。<br>
ウ　GPLであるソースコードの派生物のライセンスは，無条件にGPLとなる。<br>
エ　GPLであるソースコードを組み込んだ派生物をGPLにするか否かは，派生物の開発者が決める。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
