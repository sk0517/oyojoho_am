<div class="question-body">
  TPM（Trusted Platform Module）に該当するものはどれか。<br>
<br>
ア　PCなどの機器に搭載され，鍵生成，ハッシュ演算及び暗号処理を行うセキュリティチップ<br>
イ　受信した電子メールが正当な送信者から送信されたものであることを保証する，送信ドメイン認証技術<br>
ウ　ファイアウォール，侵入検知，マルウェア対策など，複数のセキュリティ機能を統合したネットワーク監視装置<br>
エ　ログデータを一元的に管理し，セキュリティイベントの監視者への通知及び相関分析を行うシステム<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
