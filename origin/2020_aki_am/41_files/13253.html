<div class="question-body">
  クリプトジャッキングに該当するものはどれか。<br>
<br>
ア　PCにマルウェアを感染させ，そのPCのCPUなどが有する処理能力を不正に利用して，暗号資産の取引承認に必要となる計算を行い，報酬を得る。<br>
イ　暗号資産の取引所から利用者のアカウント情報を盗み出し，利用者になりすまして，取引所から暗号資産を不正に盗みとる。<br>
ウ　カード加盟店に正規に設置されている，カードの磁気ストライプの情報を読み取る機器からカード情報を窃取する。<br>
エ　利用者のPCを利用できなくし，再び利用できるようにするのと引換えに金銭を要求する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
