<div style="height: 5px;"></div>
<div class="question-body">
  複数のサーバを用いて構築されたシステムに対するサーバコンソリデーションの説明として，適切なものはどれか。<br>
<br>
ア　各サーバに存在する複数の磁気ディスクを，特定のサーバから利用できるようにして，資源の有効活用を図る。<br>
イ　仮想化ソフトウェアを利用して元のサーバ数よりも少なくすることによって，サーバ機器の管理コストを削減する。<br>
ウ　サーバのうちいずれかを監視専用に変更することによって，システム全体のセキュリティを強化する。<br>
エ　サーバの故障時に正常なサーバだけで瞬時にシステムを再構成し，サーバ数を減らしてでも運転を継続する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
