<div class="question-body">
  スイッチングハブ（レイヤ2スイッチ）の機能として，適切なものはどれか。<br>
<br>
ア　IPアドレスを解析することによって，データを中継するか破棄するかを判断する。<br>
イ　MACアドレスを解析することによって，必要なLANポートにデータを流す。<br>
ウ　OSI基本参照モデルの物理層において，ネットワークを延長する。<br>
エ　互いに直接，通信ができないトランスポート層以上の二つの異なるプロトコルの翻訳作業を行い，通信ができるようにする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
