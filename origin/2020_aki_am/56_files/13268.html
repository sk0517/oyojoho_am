<div class="question-body">
  サービス提供時間帯が毎日0〜24時のITサービスにおいて，ある年の4月1日0時から6月30日24時までのサービス停止状況は表のとおりであった。システムバージョンアップ作業に伴う停止時間は，計画停止時間として顧客との間で合意されている。このとき，4月1日から6月30日までのITサービスの可用性は何％か。ここで，可用性（％）は小数第3位を四捨五入するものとする。<br>
<br>
<img src="./AP2020AA056-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　95.52<br>
イ　95.70<br>
ウ　99.52<br>
エ　99.63<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
