<div class="question-body">
  A社はB社に対して業務システムの開発を委託し，A社とB社は請負契約を結んでいる。作業の実態から，偽装請負とされる事象はどれか。<br>
<br>
ア　A社の従業員が，B社を作業場所として，A社の責任者の指揮命令に従ってシステムの検証を行っている。<br>
イ　A社の従業員が，B社を作業場所として，B社の責任者の指揮命令に従ってシステムの検証を行っている。<br>
ウ　B社の従業員が，A社を作業場所として，A社の責任者の指揮命令に従って設計書を作成している。<br>
エ　B社の従業員が，A社を作業場所として，B社の責任者の指揮命令に従って設計書を作成している。<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
