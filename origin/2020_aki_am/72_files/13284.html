<div class="question-body">
  企業システムにおけるSoE（Systems of Engagement）の説明はどれか。<br>
<br>
ア　高可用性，拡張性，セキュリティを確保しながら情報システムを稼働・運用するためのハードウェア，ソフトウェアから構成されるシステム基盤<br>
イ　社内業務プロセスに組み込まれ，定型業務を処理し，結果を記録することによって省力化を実現するためのシステム<br>
ウ　データの活用を通じて，消費者や顧客企業とのつながりや関係性を深めるためのシステム<br>
エ　日々の仕訳伝票を入力した上で，データの改ざん，消失を防ぎながら取引データベースを維持・管理することによって，財務報告を行うためのシステム<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
