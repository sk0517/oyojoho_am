<div style="height: 5px;"></div>
<div class="question-body">
  UMLを用いて表した図のデータモデルから，“部品”表，“納入”表及び“メーカ”表を関係データベース上に定義するときの解釈のうち，適切なものはどれか。<br>
<br>
<img src="./AP2020AA027-01.gif" align="middle" onload="this.width = this.width*0.4" width="336"><br>
<br>
ア　同一の部品を同一のメーカから複数回納入することは許されない。<br>
イ　“納入”表に外部キーは必要ない。<br>
ウ　部品番号とメーカ番号の組みを“納入”表の候補キーの一部にできる。<br>
エ　“メーカ”表は，外部キーとして部品番号をもつことになる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
