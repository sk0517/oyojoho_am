<div class="question-body">
  システム監査のフォローアップにおいて，監査対象部門による改善が計画よりも遅れていることが判明した際に，システム監査人が採るべき行動はどれか。<br>
<br>
ア　遅れの原因に応じた具体的な対策の実施を，監査対象部門の責任者に指示する。<br>
イ　遅れの原因を確かめるために，監査対象部門に対策の内容や実施状況を確認する。<br>
ウ　遅れを取り戻すために，監査対象部門の改善活動に参加する。<br>
エ　遅れを取り戻すための監査対象部門への要員の追加を，人事部長に要求する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
