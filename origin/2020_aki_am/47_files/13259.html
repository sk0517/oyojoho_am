  次の流れ図において，<br>
　　　　① → ② → ③ → ⑤ → ② → ③ → ④ → ② → ⑥<br>
の順に実行させるために，①においてmとnに与えるべき初期値aとbの関係はどれか。ここで，a，bはともに正の整数とする。<br>
<br>
<img src="./AP2020AA047-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>

イ　2a＝b<br>
ウ　2a＝3b<br>
エ　3a＝2b<br>
<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
