  表は，現行プロジェクトにおけるソフトウェア誤りの発生・除去の実績，及び次期プロジェクトにおける誤り除去の目標を記述したものである。誤りは，設計とコーディングの作業で埋め込まれ，デザインレビュー，コードレビュー及びテストで全て除去されるものとする。次期プロジェクトにおいても，ソフトウェアの規模と誤りの発生状況は変わらないと仮定したときに，テストで除去すべきソフトウェア誤りの比率は全体の何％となるか。<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
