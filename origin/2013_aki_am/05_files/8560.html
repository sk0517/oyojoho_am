<div class="question-body">
  通信回線を使用したデータ伝送システムにM/M/1の待ち行列モデルを適用すると，平均回線待ち時間，平均伝送時間，回線利用率の関係は，次の式で表すことができる。<br>
<br>
<span class="p-divition-number-text">　　　　平均回線待ち時間＝平均伝送時間×</span><table class="p-division-number"><tbody><tr><td rowspan="3"></td><td align="center">回線利用率</td><td rowspan="3"></td></tr><tr><td><img src="./fracline-981fd2d098cf512c40e13b08340b3413a19bfa43ed45cbbf7a0505d00a8462d5.gif" width="105" height="1"></td></tr><tr><td align="center">1−回線利用率</td></tr></tbody></table><br>
<br>
　回線利用率が0％から徐々に上がっていく場合，平均回線待ち時間が平均伝送時間よりも最初に長くなるのは，回線利用率が何％を超えたときか。<br>
<br>
ア　40<br>
イ　50<br>
ウ　60<br>
エ　70<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
