<div style="height: 5px;"></div>
<div class="question-body">
  論理式<i>P</i>，<i>Q</i>がいずれも真であるとき，論理式<i>R</i>の真偽にかかわらず真になる式はどれか。ここで，“￣”は否定，“∨”は論理和，“∧”は論理積，“→”は含意（“真→偽”となるときに限り偽となる演算）を表す。<br>
<br>
ア　((<i>P</i>→<i>Q</i>)∧(<i>Q</i>→<i>P</i>))→(<i>R</i>→<span style="text-decoration:overline;"><i>Q</i></span>）<br>
イ　((<i>P</i>→<i>Q</i>)∧(<span style="text-decoration:overline;"><i>Q</i>→</span><i>P</i><span style="text-decoration:overline;"></span>))→(<i>Q</i>→<i>R</i>）<br>
ウ　((<i>P</i>→<span style="text-decoration:overline;"><i>Q</i></span>)∨(<i>Q</i>→<i>P</i>))→(<i>R</i>→<span style="text-decoration:overline;"><i>Q</i></span>）<br>
エ　((<i>P</i>→<span style="text-decoration:overline;"><i>Q</i></span>)∨(Q→<span style="text-decoration:overline;"><i>P</i></span>))→(<i>Q</i>→<i>R</i>)<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
