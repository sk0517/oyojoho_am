<div class="question-body">
  RDBMSのコストベースのオプティマイザの機能の説明として，適切なものはどれか。<br>
<br>
ア　RDBMSが収集した統計情報を基に予測した実行計画を比較して，アクセスパスを選択する。<br>
イ　アプリケーションプログラムの動きを基に予測したアプリケーション全体の実行計画を比較して，アクセスパスを選択する。<br>
ウ　インデックスが定義された列では，必ずいずれかのインデックスを用いたアクセスパスを選択する。<br>
エ　複数のアクセスパスが使用可能な場合は，ルールの優先度が上位のアクセスパスを選択する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
