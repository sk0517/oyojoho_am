<div class="question-body">
  ISMSにおいて定義することが求められている情報セキュリティ基本方針に関する記述のうち，適切なものはどれか。<br>
<br>
ア　重要な基本方針を定めた機密文書であり，社内の関係者以外の目に触れないようにする。<br>
イ　情報セキュリティの基本方針を述べたものであり，ビジネス環境や技術が変化しても変更してはならない。<br>
ウ　情報セキュリティのための経営陣の方向性及び支持を規定する。<br>
エ　特定のシステムについてリスク分析を行い，そのセキュリティ対策とシステム運用の詳細を記述する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
