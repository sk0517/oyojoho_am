<div class="question-body">
  E-R図の解釈として，適切なものはどれか。ここで，<span style="text-decoration:underline;">＊ ＊</span>は多対多の関連を表し，自己参照は除くものとする。<br>
<br>
<img src="./AP2013AA045-01.gif" align="middle" onload="this.width = this.width*0.4" width="140"><br>
<br>
ア　ある組織の親組織の数が，子組織の数より多い可能性がある。<br>
イ　全ての組織は必ず子組織をもつ｡<br>
ウ　組織は2段階の階層構造である。<br>
エ　組織はネットワーク構造になっていない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
