<div class="question-body">
  システム監査実施体制のうち，システム監査人の独立性の観点から<b>避けるべきもの</b>はどれか。<br>
<br>
ア　監査チームメンバに任命された総務部のAさんが，他のメンバと一緒に，総務部の入退室管理の状況を監査する。<br>
イ　監査部のBさんが，個人情報を取り扱う業務を委託している外部企業の個人情報管理状況を監査する。<br>
ウ　情報システム部の開発管理者から5年前に監査部に異動したCさんが，マーケティング部におけるインターネットの利用状況を監査する。<br>
エ　法務部のDさんが，監査部からの依頼によって，外部委託契約の妥当性の監査において，監査人に協力する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
