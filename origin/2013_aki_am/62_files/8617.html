<div class="question-body">
  エンタープライズアーキテクチャを説明したものはどれか。<br>
<br>
ア　企業が競争優位性の構築を目的にIT戦略の策定・実行をコントロールし，あるべき方向へ導く組織能力のことである。<br>
イ　業務を管理するシステムにおいて，承認された業務が全て正確に処理，記録されることを確保するために，業務プロセスに組み込まれた内部統制のことである。<br>
ウ　組織全体の業務とシステムを統一的な手法でモデル化し，業務とシステムを同時に改善することを目的とした，業務とシステムの最適化手法である。<br>
エ　プロジェクトの進捗や作業のパフォーマンスを，出来高の価値によって定量化し，プロジェクトの現在及び今後の状況を評価する手法である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
