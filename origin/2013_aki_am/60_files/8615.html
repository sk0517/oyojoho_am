<div class="question-body">
  システム開発計画の策定におけるコントロールのうち，適切なものはどれか。<br>
<br>
ア　システムの機能が利用者の立場に基づいて実装されるよう，全体最適よりも業務上の利便性を優先し，利用部門の要望に基づいて策定する。<br>
イ　状況の変化に合わせて柔軟に内容の変更が行えるよう，開発計画は開発作業に着手してから組織内での承認を得て策定する。<br>
ウ　不必要なシステム開発コストを抑制するよう，情報システムの目的を達成するための複数の代替案を作成し，比較検討する。<br>
エ　利用部門，システム部門の分け隔てなく自由な議論が行われるよう，開発計画の策定は，利用部門とシステム部門の役割分担を決めずに実行する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
