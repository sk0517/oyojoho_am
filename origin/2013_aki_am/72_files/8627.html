<div class="question-body">
  インターネットオークションにおいて，出品者と落札者の間の決済で使用されるエスクローサービスはどれか。<br>
<br>
ア　決済に関する情報の利用に関して，第三者機関によって情報の保護基準が守られているかを監視する仕組みのこと<br>
イ　決済に関する電子メールなどの情報交換において，送信元とメールアドレスが正常であることを認証する仕組みのこと<br>
ウ　決済に使用されるクレジットカード情報を暗号化したり，正規のショップであることを認証局によって確認したりすることで，取引の安全を確保する仕組みのこと<br>
エ　決済を仲介し，落札者から送金を受け，商品の受渡し完了後に出品者へ送金を行う仕組みのこと<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
