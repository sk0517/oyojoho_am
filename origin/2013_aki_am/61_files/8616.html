<div class="question-body">
  ITポートフォリオの説明はどれか。<br>
<br>
ア　管理費などの間接コストを，業務区分ごとのアクティビティの種別に着目して，製品やサービスの原価に割り振る手法である。<br>
イ　企業の経営戦略を，多面的な視点で体系立てて立案し，実行を管理し，業績を評価する手法である。<br>
ウ　業界ごとなどで統一的に策定された評価尺度（指標値群）を用いて，企業全体の投資効果を測定する手法である。<br>
エ　情報化投資をリスクや投資価値の類似性で幾つかのカテゴリに整理し，ビジネス戦略実現のための最適な資源配分を管理する手法である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
