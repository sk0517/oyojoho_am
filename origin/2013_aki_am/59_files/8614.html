<div class="question-body">
  販売管理システムにおいて，起票された受注伝票が漏れなく，重複することなく入力されていることを確かめる監査手続のうち，適切なものはどれか。<br>
<br>
ア　受注データから値引取引データなどの例外取引データを抽出し，承認の記録を確かめる。<br>
イ　受注伝票の入力時に論理チェック及びフォーマットチェックが行われているか，テストデータ法で確かめる。<br>
ウ　プルーフリストと受注伝票との照合が行われているか，プルーフリスト又は受注伝票上の照合印を確かめる。<br>
エ　並行シミュレーション法を用いて，受注伝票を処理するプログラムの論理の正当性を確かめる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
