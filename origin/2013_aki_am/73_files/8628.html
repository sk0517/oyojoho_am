<div class="question-body">
  VICS（Vehicle Information and Communication System）の説明として，適切なものはどれか。<br>
<br>
ア　エンジン，ブレーキなどの制御情報及びセンサからの情報によって車両の制御を行うシステム<br>
イ　自動車メーカが自社のユーザ向けに提供しているサービスで，インターネットに接続して天気予報，渋滞情報などを表示するシステム<br>
ウ　道路上に設置したビーコン又はFM多重放送から情報を受信し，渋滞情報，事故情報，工事情報などを表示するシステム<br>
エ　料金所に設置した路側無線装置と車載器との間で，無線通信によって自動的に通行料金の支払を行うシステム<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
