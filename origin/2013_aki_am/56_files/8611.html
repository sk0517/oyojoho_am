<div class="question-body">
  データベースのバックアップ処理には，フルバックアップ方式と差分バックアップ方式がある。差分バックアップ方式による運用に関する記述のうち，適切なものはどれか。<br>
<br>
ア　障害からの回復時に差分だけ処理すればよいので，フルバックアップ方式に比べて復旧時間が短い。<br>
イ　フルバックアップのデータで復元した後に，差分を加えて復旧する。<br>
ウ　フルバックアップ方式と交互に運用することはできない。<br>
エ　フルバックアップ方式に比べ，バックアップに要する時間が長い。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
