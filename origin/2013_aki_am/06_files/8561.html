<div class="question-body">
  葉以外の節点は全て二つの子をもち，根から葉までの深さが全て等しい木を考える。この木に関する記述のうち，適切なものはどれか。ここで，深さとは根から葉に至るまでの枝の個数を表す。また，節点には根及び葉も含まれる。<br>
<br>
ア　枝の個数が<i>n</i>ならば，節点の個数も<i>n</i>である。<br>
イ　木の深さが<i>n</i>ならば，葉の個数は2<sup><i>n</i>−1</sup>である。<br>
ウ　節点の個数が<i>n</i>ならば，深さはlog<sub>2</sub><i>n</i>である。<br>
エ　葉の個数が<i>n</i>ならば，葉以外の節点の個数は<i>n</i>−1である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
