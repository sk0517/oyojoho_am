<div class="question-body">
  テレワークで活用しているVDIに関する記述として，適切なものはどれか。<br>
<br>
ア　PC環境を仮想化してサーバ上に置くことで，社外から端末の種類を選ばず自分のデスクトップPC環境として利用できるシステム<br>
イ　インターネット上に仮想の専用線を設定し，特定の人だけが利用できる専用ネットワーク<br>
ウ　紙で保管されている資料を，ネットワークを介して遠隔地からでも参照可能な電子書類に変換・保存することができるツール<br>
エ　対面での会議開催が困難な場合に，ネットワークを介して対面と同じようなコミュニケーションができるツール<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
