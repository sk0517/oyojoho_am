  IoT推進コンソーシアム，総務省，経済産業省が策定した“IoTセキュリティガイドライン（Ver1.0）”における“要点 17.出荷・リリース後も安全安心な状態を維持する”に対策例として挙げられているものはどれか。<br>
<br>
ア　IoT機器及びIoTシステムが収集するセンサデータ，個人情報などの情報の洗い出し，並びに保護すべきデータの特定<br>
イ　IoT機器のアップデート方法の検討，アップデートなどの機能の搭載，アップデートの実施<br>
ウ　IoT機器メーカ，IoTシステムやサービスの提供者，利用者の役割の整理<br>
エ　PDCAサイクルの実施，組織としてIoTシステムやサービスのリスクの認識，対策を行う体制の構築<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
