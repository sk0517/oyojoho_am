<div class="question-body">
  PMBOKガイド第6版によれば，プロジェクトの各フェーズが終了した時点で実施する“フェーズ・ゲート”の目的として，適切なものはどれか。<br>
<br>
ア　現在のプロジェクトのパフォーマンスを測定し，ベースラインと比較してプロジェクトの状況を把握する。<br>
イ　第三者がプロジェクトの成果物をレビューすることによって，設計の不具合の有無を確認する。<br>
ウ　プロジェクトの全体リスク及び特定された個別リスクについて，リスク対応策の有効性を評価する。<br>
エ　プロジェクトのパフォーマンスや進捗状況を評価して，プロジェクトの継続や中止を判断する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
