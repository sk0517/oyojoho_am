<div class="question-body">
  非線形方程式<i>f</i>(<i>x</i>)＝0の近似解法であり，次の手順によって解を求めるものはどれか。ここで，<i>y</i>＝<i>f</i>(<i>x</i>)には接線が存在するものとし，（3）で<i>x</i><sub>0</sub>と新たな<i>x</i><sub>0</sub>の差の絶対値がある値以下になった時点で繰返しを終了する。<br>
<br>
〔手順〕<br>
（1）解の近くの適当な<i>x</i>軸の値を定め，<i>x</i><sub>0</sub>とする。<br>
（2）曲線<i>y</i>＝<i>f</i>(<i>x</i>)の，点（<i>x</i><sub>0</sub>，<i>f</i>(<i>x</i><sub>0</sub>)）における接線を求める。<br>
（3）求めた接線と，x軸の交点を新たな<i>x</i><sub>0</sub>とし，手順（2）に戻る。<br>
<br>
ア　オイラー法<br>
イ　ガウスの消去法<br>
ウ　シンプソン法<br>
エ　ニュートン法<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
