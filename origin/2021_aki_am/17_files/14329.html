<div class="question-body">
  主記憶へのアクセスを1命令当たり平均2回行い，ページフォールトが発生すると1回当たり40ミリ秒のオーバヘッドを伴うシステムがある。ページフォールトによる命令実行の遅れを1命令当たり平均0.4マイクロ秒以下にするために許容できるページフォールト発生率は最大幾らか。ここで，他のオーバヘッドは考慮しないものとする。<br>
<br>
ア　5×10<sup>−6</sup><br>
イ　1×10<sup>−5</sup><br>
ウ　5×10<sup>−5</sup><br>
エ　1×10<sup>−4</sup><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
