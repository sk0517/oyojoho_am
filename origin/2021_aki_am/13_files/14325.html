<div class="question-body">
  信頼性設計においてフールプルーフを実現する仕組みの一つであるインタロックの例として，適切なものはどれか。<br>
<br>
ア　ある機械が故障したとき，それを停止させて代替の機械に自動的に切り替える仕組み<br>
イ　ある条件下では，特定の人間だけが，システムを利用することを可能にする仕組み<br>
ウ　システムの一部に不具合が生じたとき，その部分を停止させて機能を縮小してシステムを稼働し続ける仕組み<br>
エ　動作中の機械から一定の範囲内に人間が立ち入ったことをセンサが感知したとき，機械の動作を停止させる仕組み<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
