<div class="question-body">
  CRUDマトリクスの説明はどれか。<br>
<br>
ア　ある問題に対して起こり得る全ての条件と，各条件に対する動作の関係を表形式で表現したものである。<br>
イ　各機能が，どのエンティティに対して，どのような操作をするかを一覧化したものであり，操作の種類には生成，参照，更新及び削除がある。<br>
ウ　システムやソフトウェアを構成する機能（又はプロセス）と入出力データとの関係を記述したものであり，データの流れを明確にすることができる。<br>
エ　データをエンティティ，関連及び属性の三つの構成要素でモデル化したものであり，業務で扱うエンティティの相互関係を示すことができる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
