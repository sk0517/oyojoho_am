<div class="question-body">
  受注入力システムによって作成される次の表に関する記述のうち，適切なものはどれか。受注番号は受注ごとに新たに発行される番号であり，項番は1回の受注で商品コード別に連番で発行される番号である。<br>
　なお，単価は商品コードによって一意に定まる。<br>
<br>
<img src="./AP2021AA028-01.gif" align="middle" onload="this.width = this.width*0.5" width="428"><br>
<br>
ア　第1正規形でない。<br>
イ　第1正規形であるが第2正規形でない。<br>
ウ　第2正規形であるが第3正規形でない。<br>
エ　第3正規形である。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
