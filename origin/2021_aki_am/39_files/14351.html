<div class="question-body">
  JIS Q 27000:2019（情報セキュリティマネジメントシステム—用語）において定義されている情報セキュリティの特性に関する説明のうち，否認防止の特性に関するものはどれか。<br>
<br>
ア　ある利用者があるシステムを利用したという事実が証明可能である。<br>
イ　認可された利用者が要求したときにアクセスが可能である。<br>
ウ　認可された利用者に対してだけ，情報を使用させる又は開示する。<br>
エ　利用者の行動と意図した結果とが一貫性をもつ。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
