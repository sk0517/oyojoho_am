<div class="question-body">
  IoTの技術として注目されている，エッジコンピューティングの説明として，適切なものはどれか。<br>
<br>
ア　演算処理のリソースをセンサ端末の近傍に置くことによって，アプリケーション処理の低遅延化や通信トラフィックの最適化を行う。<br>
イ　人体に装着して脈拍センサなどで人体の状態を計測して解析を行う。<br>
ウ　ネットワークを介して複数のコンピュータを結ぶことによって，全体として処理能力が高いコンピュータシステムを作る。<br>
エ　周りの環境から微小なエネルギーを収穫して，電力に変換する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
