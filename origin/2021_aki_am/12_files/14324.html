<div class="question-body">
  システムが使用する物理サーバの処理能力を，負荷状況に応じて調整する方法としてのスケールインの説明はどれか。<br>
<br>
ア　システムを構成する物理サーバの台数を増やすことによって，システムとしての処理能力を向上する。<br>
イ　システムを構成する物理サーバの台数を減らすことによって，システムとしてのリソースを最適化し，無駄なコストを削減する。<br>
ウ　高い処理能力のCPUへの交換やメモリの追加などによって，システムとしての処理能力を向上する。<br>
エ　低い処理能力のCPUへの交換やメモリの削減などによって，システムとしてのリソースを最適化し，無駄なコストを削減する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
