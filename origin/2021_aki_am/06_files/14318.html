<div class="question-body">
  プログラム特性に関する記述のうち，適切なものはどれか。<br>
<br>
ア　再帰的プログラムは再入可能な特性をもち，呼び出されたプログラムの全てがデータを共用する。<br>
イ　再使用可能プログラムは実行の始めに変数を初期化する，又は変数を初期状態に戻した後にプログラムを終了する。<br>
ウ　再入可能プログラムは，データとコードの領域を明確に分離して，両方を各タスクで共用する。<br>
エ　再配置可能なプログラムは，実行の都度，主記憶装置上の定まった領域で実行される。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
