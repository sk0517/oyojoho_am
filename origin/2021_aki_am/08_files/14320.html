<div class="question-body">
  演算レジスタが16ビットのCPUで符号付き16ビット整数<i>x1</i>，<i>x2</i>を16ビット符号付き加算（<i>x1</i>＋<i>x2</i>）するときに，全ての<i>x1</i>，<i>x2</i>の組合せにおいて加算結果がオーバフロー<b>しないもの</b>はどれか。ここで，｜<i>x</i>｜は<i>x</i>の絶対値を表し，負数は2の補数で表すものとする。<br>
<br>
ア　｜<i>x1</i>｜＋｜<i>x2</i>｜≦32,768の場合<br>
イ　｜<i>x1</i>｜及び｜<i>x2</i>｜がともに32,767未満の場合<br>
ウ　<i>x1</i>×<i>x2</i>＞0の場合<br>
エ　<i>x1</i>と<i>x2</i>の符号が異なる場合<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
