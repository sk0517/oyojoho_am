<div class="question-body">
  アジャイル開発を対象とした監査の着眼点として，システム管理基準（平成30年）に照らして，適切なものはどれか。<br>
<br>
ア　ウォータフォール型開発のように，要件定義，設計，プログラミングなどの工程ごとの完了基準に沿って，開発作業を逐次的に進めていること<br>
イ　業務システムの開発チームが，情報システム部門の要員だけで構成されていること<br>
ウ　業務システムの開発チームは，実装された機能について利害関係者へのデモンストレーションを実施し，参加者からフィードバックを得ていること<br>
エ　全ての開発作業が完了した後に，本番環境へのリリース計画を策定していること<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
