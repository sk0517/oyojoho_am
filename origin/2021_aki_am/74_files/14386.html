<div class="question-body">
  リーダシップ論のうち，ハーシイ＆ブランチャードが提唱するSL理論の特徴はどれか。<br>
<br>
ア　優れたリーダシップを発揮する，リーダ個人がもつ性格，知性，外観などの個人的資質の分析に焦点を当てている。<br>
イ　リーダシップのスタイルについて，目標達成能力と集団維持能力の二つの次元に焦点を当てている。<br>
ウ　リーダシップの有効性は，部下の成熟（自律性）の度合いという状況要因に依存するとしている。<br>
エ　リーダシップの有効性は，リーダがもつパーソナリティと，リーダがどれだけ統制力や影響力を行使できるかという状況要因に依存するとしている。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
