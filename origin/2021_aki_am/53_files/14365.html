<div class="question-body">
  PMBOKガイド第6版によれば，リスクの定量的分析で実施することはどれか。<br>
<br>
ア　発生の可能性や影響のみならず他の特性を評価することによって，さらなる分析や行動のためにプロジェクトの個別リスクに優先順位を付ける。<br>
イ　プロジェクトの個別の特定した個別リスクと，プロジェクト目標全体における他の不確実性要因が複合した影響を数量的に分析する。<br>
ウ　プロジェクトの全体リスクとプロジェクトの個別リスクに対処するために，選択肢の策定，戦略の選択，及び対応処置を合意する。<br>
エ　プロジェクトの全体リスクの要因だけでなくプロジェクトの個別リスクの要因も特定し，それぞれの特性を文書化する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
