  <span style="border-top:solid; border-top-width:1px; padding-top:3px">（<i>A</i>∪<i>B</i>）∩（<i><span style="text-decoration:overline;">A</span></i>∪<i><span style="text-decoration:overline;">B</span></i>）</span>と等価な集合はどれか。ここで，∪は和集合，∩は積集合，<i><span style="text-decoration:overline;">X</span></i>は<i>X</i>の補集合を表す。<br>
<br>
ア　（<i><span style="text-decoration:overline;">A</span></i>∪<i>B</i>）∩（<i>A</i>∪<i><span style="text-decoration:overline;">B</span></i>）<br>
イ　（<i><span style="text-decoration:overline;">A</span></i>∪<i><span style="text-decoration:overline;">B</span></i>）∩（<i>A</i>∪<i>B</i>）<br>
ウ　（<i><span style="text-decoration:overline;">A</span></i>∩<i>B</i>）∪（<i>A</i>∩<i><span style="text-decoration:overline;">B</span></i>）<br>
エ　（<i><span style="text-decoration:overline;">A</span></i>∩<i><span style="text-decoration:overline;">B</span></i>）∩（<i>A</i>∪<i>B</i>）<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
