  e-ビジネス分野で提唱されているロングテールの考え方を説明したものはどれか。<br>
<br>
ア　売れ筋商品に絞り込んで販売するのではなく，多品種少量販売によって大きな売上や利益を得ることができる。<br>
イ　業界標準を確立した製品・サービスは生産規模が2倍になると生産性が更に向上し，収益が2倍以上になる。<br>
ウ　全体の2割の優良顧客が全体の売上の8割を占め，全商品の上位2割が8割の売上を占める。<br>
エ　利用者が増えるほど，個々の利用者の便益が増加し，その結果，ますます利用者が増えることで寡占化が進む。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
