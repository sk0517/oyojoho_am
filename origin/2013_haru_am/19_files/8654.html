<div class="question-body">
  仮想記憶方式におけるプログラムやデータの格納方法に関する記述のうち，適切なものはどれか。<br>
<br>
ア　一つのプログラムや一連のデータは，主記憶装置及び補助記憶装置で必ず連続した領域に格納される。<br>
イ　頻繁に参照されるプログラムやデータが主記憶装置に格納されているので，仮想記憶を用いない場合に比べて主記憶の平均アクセス時間が短くなる。<br>
ウ　プログラムやデータを補助記憶装置に格納し，必要に応じて主記憶に読み込むので，主記憶の見かけの容量を拡大できる。<br>
エ　ページアウトされたプログラムやデータがシステムの停止後も補助記憶装置に保持されるので，再起動後に主記憶の内容が復元される。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
