<div class="question-body">
  要件定義段階において，要求品質の向上のために発注者が留意すべきことはどれか。<br>
<br>
ア　現行システムと同じ機能の要求であっても，現行システムの機能や使われ方を調査して，要件定義を実施する。<br>
イ　ビジネス要求の視点よりも，現行業務で使用されている機能が盛り込まれているか否かの視点で，要件定義の妥当性を検証する。<br>
ウ　要件定義書はあくまでも利用者ニーズの大枠を定めたものとして，実際には設計段階以降に，受注者と議論して具体的な要件を確定していく。<br>
エ　要件定義段階では業務要件を整理し，システムの移行方法・運用方法など非機能要件は，システム稼働前に洗い出す。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
