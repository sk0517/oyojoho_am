<div style="height: 5px;"></div>
<div class="question-body">
  ページング方式の仮想記憶において，ページフォールト発生時のオーバヘッドによる1命令当たりの平均遅れ時間を求める式はどれか。<br>
<br>
〔記号の説明〕<br>
<i>t</i>：1回当たりのページフォールト処理時間<br>
<i>f</i>：ページフォールト発生率<br>
<i>m</i>：1命令当たりの平均主記憶アクセス回数<br>
<br>
ア　<i>t</i>−<i>f</i>×<i>m</i><br>
イ　<i>t</i>×<i>f</i>×<i>m</i><br>
ウ　<i>t</i>×<i>f</i>÷<i>m</i><br>
エ　<i>t</i>÷<i>f</i>÷<i>m</i><br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
