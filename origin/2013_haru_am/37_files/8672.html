<div class="question-body">
  暗号アルゴリズムの危<ruby><rb>殆</rb><rp>（</rp><rt>たい</rt><rp>）</rp></ruby>化を説明したものはどれか。<br>
<br>
ア　外国の輸出規制によって，十分な強度をもつ暗号アルゴリズムを実装した製品が利用できなくなること<br>
イ　鍵の不適切な管理によって，鍵が漏えいする危険性が増すこと<br>
ウ　計算能力の向上などによって，鍵の推定が可能になり，暗号の安全性が低下すること<br>
エ　最高性能のコンピュータを用い，膨大な時間とコストを掛けて暗号強度をより確実なものにすること<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
