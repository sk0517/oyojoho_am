<div class="question-body">
  ある会社の生産計画部では，毎月25日に次の手続で翌月分の計画生産量を決定している。8月分の計画生産量を求める式はどれか。<br>
<br>
〔手続〕<br>
（1）当月末の予想在庫量を，前月末の実在庫量と当月分の計画生産量と予想販売量から求める。<br>
（2）当月末の予想在庫量と，翌月分の予想販売量から，翌月末の予想在庫量が翌々月から3か月間の予想販売量と等しくなるように翌月分の計画生産量を決定する。<br>
<br>
<img src="./AP2013SA072-01.gif" align="middle" onload="this.width = this.width*0.4" width="342"><br>
<br>
ア　I6＋P7−S7＋S8<br>
イ　S8＋S9＋S10＋S11−I7<br>
ウ　S8＋S9＋S10＋S11−I8<br>
エ　S9＋S10＋S11−I7<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
