<div class="question-body">
  流れ図に示す処理の動作の記述として，適切なものはどれか。ここで，二重線は並列処理の同期を表す。<br>
<br>
<img src="./AP2013SA008-01.gif" align="middle" onload="this.width = this.width*0.4" width="167"><br>
<br>
ア　ABC又はACBを実行してデッドロックになる。<br>
イ　AB又はACを実行してデッドロックになる。<br>
ウ　Aの後にBC又はCB，BC又はCB，…と繰り返して実行する。<br>
エ　Aの後にBの無限ループ又はCの無限ループになる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
