<div class="question-body">
  情報システム部が開発し，経理部が運用している会計システムの運用状況を監査するシステム監査チームの体制についての記述のうち，適切なものはどれか。<br>
<br>
ア　会計システムは企業会計に関する各種基準に準拠しているので，システム監査チームには公認会計士を含めなければならない。<br>
イ　会計システムは機密性の高い情報を扱うので，システム監査チームは経理部長直属としなければならない。<br>
ウ　経理部との癒着を防ぐために，システム監査チームのメンバは毎年入れ替えなければならない。<br>
エ　独立性を担保するために，システム監査チームは情報システム部にも経理部にも所属しない者で組織しなければならない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
