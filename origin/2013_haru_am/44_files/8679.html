<div class="question-body">
  サンドボックスの仕組みについて述べたものはどれか。<br>
<br>
ア　Webアプリケーションの<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性を悪用する攻撃に含まれる可能性が高い文字列を定義し，攻撃であると判定した場合には，その通信を遮断する。<br>
イ　侵入者をおびき寄せるために本物そっくりのシステムを設置し，侵入者の挙動などを監視する。<br>
ウ　プログラムの影響がシステム全体に及ぶことを防止するために，プログラムが実行できる機能やアクセスできるリソースを制限して動作させる。<br>
エ　プログラムのソースコードでSQL文の<ruby><rb>雛</rb><rp>（</rp><rt>ひな</rt><rp>）</rp></ruby>形の中に変数の場所を示す記号を置いた後，実際の値を割り当てる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
