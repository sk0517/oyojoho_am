<div class="question-body">
  情報セキュリティに関する従業員の責任について，“情報セキュリティ管理基準”に基づいて監査を行った。指摘事項に該当するものはどれか。<br>
<br>
ア　雇用の終了をもって守秘責任が解消されることが，雇用契約に定められている。<br>
イ　定められた勤務時間以外においても守秘責任を負うことが，雇用契約に定められている。<br>
ウ　定められた守秘責任を果たさなかった場合，相応の措置がとられることが，雇用契約に定められている。<br>
エ　定められた内容の守秘義務契約書に署名することが，雇用契約に定められている。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
