<div class="question-body">
  “プログラマは全て社員であり，社員の約10％を占める。社員は社員番号と氏名をもち，職種がプログラマである場合は，使用できるプログラム言語を一つ以上もつ。”という状況を記録するデータベース設計案として，適切なものはどれか。ここで，実線の下線は主キーを，破線の下線は外部キーを表す。<br>
<br>
ア　社員（<span style="text-decoration:underline;">社員番号</span>，氏名，職種，プログラム言語）<br>
イ　社員（<span style="text-decoration:underline;">社員番号</span>，氏名，プログラム言語）<br>
ウ　社員（<span style="text-decoration:underline;">社員番号</span>，氏名）<br>
　　プログラマ（<span style="text-decoration:underline;"><span style="border-bottom: dashed 1px;">社員番号</span></span>，プログラム言語）<br>
エ　社員（<span style="text-decoration:underline;">社員番号</span>，氏名）<br>
　　プログラマ（<span style="text-decoration:underline;"><span style="border-bottom: dashed 1px;">社員番号</span></span>，<span style="text-decoration:underline;">プログラム言語</span>）<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
