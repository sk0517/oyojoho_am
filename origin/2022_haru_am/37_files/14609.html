  サイバーキルチェーンの偵察段階に関する記述として，適切なものはどれか。<br>
<br>
ア　攻撃対象企業の公開Webサイトの<ruby><rb>脆</rb><rp>（</rp><rt>ぜい</rt><rp>）</rp></ruby>弱性を悪用してネットワークに侵入を試みる。<br>
イ　攻撃対象企業の社員に標的型攻撃メールを送ってPCをマルウェアに感染させ，PC内の個人情報を入手する。<br>
ウ　攻撃対象企業の社員のSNS上の経歴，肩書などを足がかりに，関連する組織や人物の情報を洗い出す。<br>
エ　サイバーキルチェーンの2番目の段階をいい，攻撃対象に特化したPDFやドキュメントファイルにマルウェアを仕込む。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
