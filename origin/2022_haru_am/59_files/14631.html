<div class="question-body">
  監査調書に関する記述のうち，適切なものはどれか。<br>
<br>
ア　監査調書には，監査対象部門以外においても役立つ情報があるので，全て企業内で公開すべきである。<br>
イ　監査調書の役割として，監査実施内容の客観性を確保し，監査の結論を支える合理的な根拠とすることなどが挙げられる。<br>
ウ　監査調書は，通常，電子媒体で保管されるが，機密保持を徹底するためバックアップは作成すべきではない。<br>
エ　監査調書は監査の過程で入手した客観的な事実の記録なので，監査担当者の所見は記述しない。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
