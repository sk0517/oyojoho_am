<div class="question-body">
  不正アクセス禁止法で規定されている，“不正アクセス行為を助長する行為の禁止”規定によって規制される行為はどれか。<br>
<br>
ア　業務その他正当な理由なく，他人の利用者IDとパスワードを正規の利用者及びシステム管理者以外の者に提供する。<br>
イ　他人の利用者IDとパスワードを不正に入手する目的で，フィッシングサイトを開設する。<br>
ウ　不正アクセスの目的で，他人の利用者IDとパスワードを不正に入手する。<br>
エ　不正アクセスの目的で，不正に入手した他人の利用者IDとパスワードをPCに保管する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
