<div class="question-body">
  ホットスタンバイシステムにおいて，現用系に障害が発生して待機系に切り替わる契機として，最も適切な例はどれか。<br>
<br>
ア　現用系から待機系へ定期的に送信され，現用系が動作中であることを示すメッセージが途切れたとき<br>
イ　現用系の障害をオペレータが認識し，コンソール操作を行ったとき<br>
ウ　待機系が現用系にたまった処理の残量を定期的に監視していて，残量が一定量を上回ったとき<br>
エ　待機系から現用系に定期的にロードされ実行される診断プログラムが，現用系の障害を検出したとき<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
