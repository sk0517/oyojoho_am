<div class="question-body">
  全体集合S内に異なる部分集合AとBがあるとき，<span style="text-decoration:overline;">A</span>∩<span style="text-decoration:overline;">B</span>に等しいものはどれか。ここで，A∪BはAとBの和集合，A∩BはAとBの積集合，<span style="text-decoration:overline;">A</span>はSにおけるAの補集合，A−BはAからBを除いた差集合を表す。<br>
<br>
ア　<span style="text-decoration:overline;">A</span>−B<br>
イ　（<span style="text-decoration:overline;">A</span>∪<span style="text-decoration:overline;">B</span>）−（A∩B）<br>
ウ　（S−A）∪（S−B）<br>
エ　S−（A∩B）<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
