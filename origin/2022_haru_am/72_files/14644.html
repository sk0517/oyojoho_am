<div class="question-body">
  “かんばん方式”を説明したものはどれか。<br>
<br>
ア　各作業の効率を向上させるために，仕様が統一された部品，半製品を調達する。<br>
イ　効率よく部品調達を行うために，関連会社から部品を調達する。<br>
ウ　中間在庫を極力減らすために，生産ラインにおいて，後工程が必要とする部品を自工程で生産できるように，必要な部品だけを前工程から調達する。<br>
エ　より品質が高い部品を調達するために，部品の納入指定業者を複数定め，競争入札で部品を調達する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
