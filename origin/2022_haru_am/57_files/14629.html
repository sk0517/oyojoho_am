<div class="question-body">
  基幹業務システムの構築及び運用において，データ管理者（DA）とデータベース管理者（DBA）を別々に任命した場合のDAの役割として，適切なものはどれか。<br>
<br>
ア　業務データ量の増加傾向を把握し，ディスク装置の増設などを計画して実施する。<br>
イ　システム開発の設計工程では，主に論理データベース設計を行い，データ項目を管理して標準化する。<br>
ウ　システム開発のテスト工程では，主にパフォーマンスチューニングを担当する。<br>
エ　システム障害が発生した場合には，データの復旧や整合性のチェックなどを行う。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
