<div class="question-body">
  システム管理基準（平成30年）によれば，ITシステムの運用・利用におけるログ管理に関する記述のうち，適切なものはどれか。<br>
<br>
ア　取得したログは，不正なアクセスから保護し，内容が改ざんされないように保管する。<br>
イ　通常の運用範囲を超えたアクセスや違反行為に関するログを除外し，運用の作業ログ，利用部門の活動ログを記録し，保管する。<br>
ウ　特権的アクセスのログは，あまり重要ではないので，分析対象から除外する。<br>
エ　保管したログは，情報セキュリティインシデントが発生した場合にだけ分析し，分析結果に応じて必要な対策を講じる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
