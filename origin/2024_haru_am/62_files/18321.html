  “デジタルガバナンス・コード2.0”の説明として，適切なものはどれか。<br>
<br>
ア　企業の自主的なDX推進を促すために，デジタル技術による社会変革を踏まえた経営ビジョン策定など経営者に求められる対応を，経済産業省がまとめたもの<br>
イ　教育委員会に対して，教育情報セキュリティポリシーの基本理念や情報セキュリティ対策基準の記述例を，文部科学省がまとめたもの<br>
ウ　全国どこでも誰もが便利で快適に暮らせる社会を目指し，自治体が重点的に取組むべき事項を，総務省がまとめたもの<br>
エ　デジタル社会形成のために政府が迅速かつ重点的に実施すべき施策などを，デジタル庁がまとめたもの<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
