<div style="height: 5px;"></div>
<div class="question-body">
  複数の袋からそれぞれ白と赤の玉を幾つかずつ取り出すとき，ベイズの定理を利用して事後確率を求める場合はどれか。<br>
<br>
ア　ある袋から取り出した二つの玉の色が同じと推定することができる確率を求める場合<br>
イ　異なる袋から取り出した玉が同じ色であると推定することができる確率を求める場合<br>
ウ　玉を一つ取り出すために，ある袋が選ばれると推定することができる確率を求める場合<br>
エ　取り出した玉の色から，どの袋から取り出されたのかを推定するための確率を求める場合<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
