<div class="question-body">
  JIS Q 21500:2018（プロジェクトマネジメントの手引）によれば，プロセス“リスクの管理”の目的はどれか。<br>
<br>
ア　特定したリスクに適切な処置を行うためにリスクを測定して，その優先順位を定める。<br>
イ　発生した場合に，プロジェクトの目標にプラス又はマイナスの影響を与えることがある潜在的リスク事象及びその特性を決定する。<br>
ウ　プロジェクトの目標への機会を高めて脅威を軽減するために，選択肢を作成して対策を決定する。<br>
エ　リスクへの対応を実行するかどうか及びそれが期待する効果を上げられるかどうかを明らかにし，プロジェクトの混乱を最小限にする。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
