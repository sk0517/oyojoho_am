  トランザクションTはチェックポイント後にコミットしたが，その後にシステム障害が発生した。トランザクションTの更新内容をその終了直後の状態にするために用いられる復旧技法はどれか。ここで，トランザクションはWALプロトコルに従い，チェックポイントの他に，トランザクションログを利用する。<br>
<br>
ア　2相ロック<br>
イ　シャドウページ<br>
ウ　ロールバック<br>
エ　ロールフォワード<br>
<br>
<br>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
