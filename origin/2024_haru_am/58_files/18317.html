<div class="question-body">
  システム監査基準（令和5年）が規定している監査調書の説明として，最も適切なものはどれか。<br>
<br>
ア　監査の結論に至った過程を明らかにし，監査の結論を支える合理的な根拠とするための記録<br>
イ　監査の目的に応じた適切な形式によって作成し，監査依頼者に提出する，監査の概要と監査の結論を記載した要約版の報告書<br>
ウ　システム監査対象ごとに，具体的な監査スケジュールを定めた詳細計画<br>
エ　システム監査の中長期における方針等を明らかにすることを目的として作成する文書<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
