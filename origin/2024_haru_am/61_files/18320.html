<div class="question-body">
  エンタープライズアーキテクチャの参照モデルのうち，BRM（Business Reference Model）として提供されるものはどれか。<br>
<br>
ア　アプリケーションサービスを機能的な観点から分類・体系化したサービスコンポーネント<br>
イ　サービスコンポーネントを実際に活用するためのプラットフォームやテクノロジの標準仕様<br>
ウ　参照モデルの中で最も業務に近い階層として提供される，業務分類に従った業務体系及びシステム体系と各種業務モデル<br>
エ　組織間で共有される可能性の高い情報について，名称，定義及び各種属性を総体的に記述したモデル<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
