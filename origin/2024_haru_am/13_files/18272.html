<div class="question-body">
  オブジェクトストレージの記述として，最も適切なものはどれか。<br>
<br>
ア　更新頻度の少ない非構造型データの格納に適しており，大容量で拡張性のあるストレージ空間を仮想的に実現することができる。<br>
イ　高速のストレージ専用ネットワークを介して，複数のサーバからストレージを共有することによって，高速にデータを格納することができる。<br>
ウ　サーバごとに割り当てられた専用ストレージであり，容量が不足したときにはストレージを追加することができる。<br>
エ　複数のストレージを組み合わせることによって，仮想的な1台のストレージとして運用することができる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
