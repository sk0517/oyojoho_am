<div class="question-body">
  ビッグデータの基盤技術として利用されるNoSQLに分類されるデータベースはどれか。<br>
<br>
ア　関係データモデルをオブジェクト指向データモデルに拡張し，操作の定義や型の継承関係の定義を可能としたデータベース<br>
イ　経営者の意思決定を支援するために，ある主題に基づくデータを現在の情報とともに過去の情報も蓄積したデータベース<br>
ウ　様々な形式のデータを一つのキーに対応付けて管理するキーバリュー型データベース<br>
エ　データ項目の名称，形式など，データそのものの特性を表すメタ情報を管理するデータベース<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
