<div class="question-body">
  ドキュメンテーションジェネレーターの説明として，適切なものはどれか。<br>
<br>
ア　HTML，CSSなどのリソースを読み込んで，画面などに描画又は表示するソフトウェア<br>
イ　ソースコード中にある，フォーマットに従って記述されたコメント文などから，プログラムのドキュメントを生成するソフトウェア<br>
ウ　動的にWebページを生成するために，文書のテンプレートと埋込み入力データを合成して出力するソフトウェア<br>
エ　文書構造がマーク付けされたテキストファイルを読み込んで，印刷可能なドキュメントを組版するソフトウェア<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
