<div class="question-body">
  サービスマネジメントにおけるサービスレベル管理の活動はどれか。<br>
<br>
ア　現在の資源の調整と最適化とを行い，将来の資源要件に関する予測を記載した計画を作成する。<br>
イ　サービスの提供に必要な予算に応じて，適切な資金を確保する。<br>
ウ　災害や障害などで事業が中断しても，要求されたサービス機能を合意された期間内に確実に復旧できるように，事業影響度の評価や復旧優先順位を明確にする。<br>
エ　提供するサービス及びサービスレベル目標を決定し，サービス提供者が顧客との間で合意文書を交わす。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
