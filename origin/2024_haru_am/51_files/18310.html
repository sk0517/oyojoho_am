<div class="question-body">
  EVMで管理しているプロジェクトがある。図は，プロジェクトの開始から完了予定までの期間の半分が経過した時点での状況である。コスト効率，スケジュール効率がこのままで推移すると仮定した場合の見通しのうち，適切なものはどれか。<br>
<br>
<img src="./AP2024SA051-01.gif" align="middle" onload="this.width = this.width*0.5" width="363"><br>
<br>
ア　計画に比べてコストは多くなり，プロジェクトの完了は遅くなる。<br>
イ　計画に比べてコストは多くなり，プロジェクトの完了は早くなる。<br>
ウ　計画に比べてコストは少なくなり，プロジェクトの完了は遅くなる。<br>
エ　計画に比べてコストは少なくなり，プロジェクトの完了は早くなる。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
