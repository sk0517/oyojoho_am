<div class="question-body">
  EMS（Electronics Manufacturing Services）の説明として，適切なものはどれか。<br>
<br>
ア　相手先ブランドで販売する電子機器の設計だけを受託し，製造は相手先で行う。<br>
イ　外部から調達した電子機器に付加価値を加えて，自社ブランドで販売する。<br>
ウ　自社ブランドで販売する電子機器のソフトウェア開発だけを外部に委託し，ハードウェアは自社で設計製造する。<br>
エ　生産設備をもつ企業が，他社からの委託を受けて電子機器を製造する。<br>
<br>
<br>

</div>

<script>
    window.onload = function () {
        if (window.matchMedia && window.matchMedia('(max-device-width: 1024px)').matches) {
            var images = document.getElementsByTagName("img")
            for (var i = 0; i < images.length; i++) {
                var image = images[i];
                var re = /\d+(\.\d+)?/
                var matches = image.onload.toString().match(re);
                var rate = parseFloat(matches[0])
                image.width = image.naturalWidth * 0.9 * rate;
            }
        }
    }
</script>
